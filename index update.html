<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ATLAS v2.0 — Balance. Structure. Progress.</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#c9a84c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ATLAS">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
:root{--bg:#f8fafc;--surf:#fff;--surf2:#f8fafc;--surf3:#f1f5f9;--brd:#e2e8f0;--txt:#1e293b;--txt2:#64748b;--txt3:#94a3b8;--nav:#fff;--hdr:#fff;--inp:#fff;--shadow:rgba(0,0,0,.06)}
[data-theme=dark]{--bg:#0b1120;--surf:#162032;--surf2:#0f172a;--surf3:#1e293b;--brd:#2d3f55;--txt:#f1f5f9;--txt2:#94a3b8;--txt3:#475569;--nav:#162032;--hdr:#162032;--inp:#1e293b;--shadow:rgba(0,0,0,.3)}
*{box-sizing:border-box;margin:0;padding:0;transition:background .15s,border-color .15s,color .15s}
body{font-family:Inter,-apple-system,sans-serif;font-size:13px;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}

/* ── HEADER ── */
.hdr{background:var(--hdr);border-bottom:1px solid var(--brd);padding:0 16px;display:flex;align-items:center;height:48px;gap:10px;flex-shrink:0;z-index:150}
.hdr-burger{display:none;background:none;border:none;cursor:pointer;font-size:20px;color:var(--txt2);padding:4px;line-height:1}

/* ── LAYOUT ── */
.body{display:flex;flex:1;overflow:hidden;position:relative}

/* ── NAV SIDEBAR ── */
.nav{width:212px;background:var(--nav);border-right:1px solid var(--brd);padding:10px 0;flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column;z-index:120}
.nav-top{flex:1}
.nav-bottom{padding:8px 0 4px;border-top:1px solid var(--brd);flex-shrink:0}
.nav-sec{font-size:10px;font-weight:600;color:var(--txt3);padding:10px 16px 3px;letter-spacing:.7px;text-transform:uppercase}
.nav-btn{width:100%;padding:9px 16px;border:none;cursor:pointer;text-align:left;font-size:13px;background:transparent;color:var(--txt2);display:block}
.nav-btn:hover{background:var(--surf2)}
.nav-btn.active{background:var(--surf2);color:var(--txt);font-weight:600}

/* Mobile nav overlay backdrop */
.nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:110}
.nav-overlay.open{display:block}

/* ── MAIN ── */
.main{flex:1;padding:24px;overflow-y:auto;overflow-x:hidden}

/* ── COMMON COMPONENTS ── */
.sh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.sh h2{font-size:17px;font-weight:600}
.sh p{font-size:12px;color:var(--txt2);margin-top:3px}
.btn-p{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:var(--txt);color:var(--surf)}
.btn-g{padding:6px 12px;border-radius:8px;border:1px solid var(--brd);cursor:pointer;font-size:13px;background:transparent;color:var(--txt2)}
.btn-g:hover{background:var(--surf2)}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:14px}
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--surf2);color:var(--txt2)}
.pill-red{display:inline-flex;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.pill-blue{display:inline-flex;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.tag-blue{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;white-space:nowrap}
.tag-red{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;white-space:nowrap}
.warn-box{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;font-size:12px;color:#b91c1c;margin-bottom:10px}
.info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px 12px;font-size:12px;color:#1d4ed8;margin-bottom:10px}
.fl{display:block;font-size:10px;font-weight:600;color:var(--txt2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;margin-bottom:10px;padding:9px 10px;font-size:14px;border:1px solid var(--brd);border-radius:8px;outline:none;background:var(--inp);color:var(--txt)}
.fi:focus{border-color:#64748b}
.row2{display:flex;gap:10px}.row2>div{flex:1;min-width:0}
.hp{position:relative;display:inline-block}
.hp .hp-pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;cursor:default;user-select:none;display:inline-flex;align-items:center}
.hp .hp-tip{display:none;position:absolute;top:calc(100% + 6px);left:0;background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:9px 11px;font-size:12px;z-index:100;box-shadow:0 4px 14px var(--shadow);min-width:160px;white-space:nowrap;color:var(--txt)}
.hp:hover .hp-tip,.hp.open .hp-tip{display:block}
.hp .hp-tip{max-width:260px;white-space:nowrap}
.hp .hp-tip.cal{width:244px;white-space:normal}
.cal-q{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;margin-top:8px}
.cal-q:first-child{margin-top:0}
.cal-weeks{display:flex;gap:3px;flex-wrap:wrap}
.wk-c{width:28px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;background:var(--surf2);color:var(--txt3)}
.wk-c.on{background:#dbeafe;color:#1d4ed8;font-weight:500}
.wk-c.dl{background:#fee2e2;color:#b91c1c;font-weight:600}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-start;justify-content:center;padding:16px;padding-top:40px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--surf);border-radius:16px;padding:20px;width:100%;max-width:440px;box-shadow:0 20px 40px var(--shadow)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-hdr strong{font-size:14px;color:var(--txt)}
.x-btn{background:none;border:none;cursor:pointer;font-size:22px;color:var(--txt3);line-height:1;padding:4px}
.tab-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:5px 10px;border-radius:20px;border:1px solid var(--brd);cursor:pointer;font-size:11px;font-weight:500;background:transparent;color:var(--txt2)}
.tab.active{background:var(--txt);color:var(--surf);border-color:var(--txt)}
.fd-tbl{width:100%;border-collapse:collapse;font-size:12px}
.fd-tbl th{padding:7px 10px;text-align:left;font-size:11px;font-weight:500;color:var(--txt2);border-bottom:1px solid var(--brd)}
.fd-tbl td{padding:4px 8px;border-bottom:1px solid var(--surf2)}
.q-month-hdr{padding:7px;background:var(--txt);color:var(--surf);font-size:12px;font-weight:600;text-align:center}
.q-wk-hdr{padding:4px;background:var(--surf2);border-bottom:1px solid var(--brd);font-size:10px;font-weight:700;color:var(--txt3);text-align:center}
.ms-chip{border-radius:6px;padding:5px 7px;cursor:pointer;border:1px solid;margin-bottom:3px;font-size:10px;font-weight:600;text-align:left;width:100%;line-height:1.3;display:block}
.eq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.edit-btn{background:none;border:1px solid var(--brd);border-radius:5px;cursor:pointer;font-size:12px;color:var(--txt3);padding:3px 7px;margin-left:4px}
.edit-btn:hover{background:var(--surf2);color:var(--txt2)}
.tour-box{position:fixed;bottom:16px;right:16px;width:280px;background:var(--txt);border-radius:12px;padding:16px;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.25);display:none}
/* WELCOME */
.w-hero{border-radius:16px;padding:48px 40px;margin-bottom:24px;background:linear-gradient(145deg,#0a1628 0%,#0d1f3c 50%,#081420 100%);position:relative;overflow:hidden;text-align:center}
.w-atlas-title{font-size:64px;font-weight:800;letter-spacing:-2px;color:#c9a84c;margin-bottom:8px;text-shadow:0 2px 20px rgba(201,168,76,.3)}
.w-tagline{font-size:13px;letter-spacing:4px;text-transform:uppercase;color:#7fa8d4;margin-bottom:20px;font-weight:500}
.w-desc{font-size:17px;color:#e2e8f0;line-height:1.7;max-width:560px;margin:0 auto 28px}
.w-start-btn{padding:12px 32px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:700;background:#c9a84c;color:#0a1628;letter-spacing:.5px}
.w-start-btn:hover{background:#d4b55e}
.persona-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px}
.persona-card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:16px;text-align:center}
.persona-icon{font-size:28px;margin-bottom:10px}
.persona-name{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:6px}
.persona-desc{font-size:12px;color:var(--txt2);line-height:1.5}
.step-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.step-row{display:flex;gap:14px;align-items:flex-start;background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:14px 16px}
.step-num{width:30px;height:30px;border-radius:50%;background:#0d1f3c;color:#c9a84c;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.step-title{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:4px}
.step-body{font-size:12px;color:var(--txt2);line-height:1.6}
.anchor-row{display:flex;gap:10px;margin-top:10px}
.anchor-card{flex:1;border-radius:8px;padding:10px 12px;border-left:3px solid}
.artefact-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.artefact-item{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:12px 14px}
.artefact-name{font-size:12px;font-weight:700;color:var(--txt);margin-bottom:4px}
.artefact-def{font-size:11px;color:var(--txt2);line-height:1.5}
/* THEME TOGGLE */
.theme-toggle{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;width:100%;border:none;background:transparent;color:var(--txt2);font-size:13px}
.theme-toggle:hover{background:var(--surf2)}
.toggle-track{width:36px;height:20px;border-radius:20px;background:var(--brd);position:relative;transition:background .2s;flex-shrink:0}
.toggle-thumb{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
[data-theme=dark] .toggle-track{background:#3b82f6}
[data-theme=dark] .toggle-thumb{transform:translateX(16px)}

/* ── MOBILE STYLES (≤ 680px) ─────────────────────────────────────────── */
@media(max-width:680px){
  .hdr-burger{display:block}
  .nav{position:fixed;top:0;left:-212px;height:100vh;transition:left .25s ease;z-index:120;border-right:1px solid var(--brd)}
  .nav.open{left:0}
  .main{padding:14px}
  .sh h2{font-size:15px}
  .sh{margin-bottom:14px}
  .btn-p,.btn-g{padding:8px 12px;font-size:13px}
  .row2{flex-direction:column;gap:0}
  .w-hero{padding:32px 20px}
  .w-atlas-title{font-size:44px}
  .w-desc{font-size:15px}
  .persona-grid{grid-template-columns:1fr}
  .anchor-row{flex-direction:column}
  .artefact-grid{grid-template-columns:1fr}
  .feat-row{flex-direction:column!important;padding:28px 20px!important}
  .feat-row .feat-txt{padding-right:0!important;padding-left:0!important;margin-bottom:20px}
  .feat-row .feat-mock{justify-content:flex-start!important;max-width:100%!important}
  .eq-grid{grid-template-columns:1fr}
  /* Quarter grid: stack months vertically on mobile */
  .q-scroll{overflow-x:hidden}
  .q-month-col{flex-direction:column!important;width:100%!important}
  .q-month-col>div{width:100%!important}
  .q-month-row{display:block!important;margin-bottom:10px;border:1px solid var(--brd);border-radius:10px;overflow:hidden}
  .q-wk-row{display:flex!important;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .q-wk-cell{min-width:80px!important;flex:0 0 80px!important}
  .fd-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .modal-bg{padding:12px;padding-top:24px}
  .modal{padding:16px;border-radius:12px}
  .tour-box{left:12px;right:12px;width:auto;bottom:12px}
  /* hp-tip: on mobile show on tap not hover */
  .hp .hp-tip{white-space:normal;max-width:85vw}
  [style*="padding:40px 32px"]{padding:24px 16px!important}
  [style*="padding:48px"]{padding:28px 16px!important}
  [style*="padding:72px 48px"]{padding:40px 20px!important}
}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <button class="hdr-burger" onclick="toggleNav()" id="burger-btn">☰</button>
    <span style="font-size:15px;font-weight:700">⚓ ATLAS</span>
    <span style="font-size:11px;background:var(--surf2);color:var(--txt3);border-radius:20px;padding:2px 8px">v2.0</span>
    <span style="flex:1"></span>
    <button class="btn-g" style="font-size:12px;padding:5px 12px" onclick="startTour()">Tour ATLAS</button>
  </header>
  <div class="nav-overlay" id="nav-overlay" onclick="closeNav()"></div>
  <div class="body">
    <nav class="nav">
      <div class="nav-top" id="nav-top"></div>
      <div class="nav-bottom">
        <button class="theme-toggle" onclick="toggleTheme()">
          <span id="theme-icon">🌙</span>
          <span id="theme-label">Dark mode</span>
          <span style="flex:1"></span>
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
        </button>
        <button onclick="clearAllData()" style="width:100%;padding:7px 16px;border:none;cursor:pointer;text-align:left;font-size:12px;background:transparent;color:var(--txt3);display:block">🗑 Clear all my data</button>
      </div>
    </nav>
    <main class="main" id="main"></main>
  </div>
</div>
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner"></div>
</div>
<div class="tour-box" id="tour-box">
  <div id="t-title" style="font-size:13px;font-weight:600;color:#f1f5f9;margin-bottom:5px"></div>
  <div id="t-body" style="font-size:12px;color:#94a3b8;line-height:1.6;margin-bottom:12px"></div>
  <div style="display:flex;gap:7px;align-items:center">
    <span id="t-step" style="font-size:11px;color:#64748b;flex:1"></span>
    <button id="t-back" onclick="tourBack()" style="font-size:11px;padding:4px 9px;border-radius:7px;border:1px solid #475569;background:transparent;color:#94a3b8;cursor:pointer">← Back</button>
    <button id="t-next" onclick="tourNext()" style="font-size:11px;padding:5px 12px;border-radius:7px;border:none;font-weight:600;cursor:pointer;background:#3b82f6;color:#fff">Next →</button>
  </div>
</div>
<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const CATS=[{id:'CAR',name:'Career',c:'#3b82f6'},{id:'BUS',name:'Business',c:'#10b981'},{id:'EDU',name:'Education',c:'#8b5cf6'},{id:'FIN',name:'Finance',c:'#f59e0b'},{id:'HLT',name:'Health',c:'#22c55e'},{id:'CRT',name:'Creative',c:'#ef4444'},{id:'SOC',name:'Social Impact',c:'#a855f7'},{id:'DEV',name:'Personal Dev',c:'#f97316'},{id:'LIF',name:'Lifestyle',c:'#eab308'},{id:'FTH',name:'Faith',c:'#d97706'},{id:'HOM',name:'Home/Family',c:'#ec4899'},{id:'TRV',name:'Travel',c:'#06b6d4'}];
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const WHS=['Sunrise','Midday','Sunset'];
const WH_C={Sunrise:'#3b82f6',Midday:'#f59e0b',Sunset:'#8b5cf6'};
const WH_BG={Sunrise:'#eff6ff',Midday:'#fffbeb',Sunset:'#f5f3ff'};
const DURS=['15 min','20 min','25 min','30 min','45 min','1 hour','2 hours'];
const STATUS=['Not Started','In Progress','Half-done','Still Open','Not Done','Completed','Remove'];
// Today/week helpers
const TODAY_NAME=new Date().toLocaleDateString('en-US',{weekday:'long'}); // e.g. "Friday"
const TODAY_ISO=new Date().toISOString().slice(0,10); // e.g. '2026-03-24'
const TODAY_DATE=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'}); // e.g. "Friday, 20 March"
const QS=[{id:'Q1',name:'The Harbor',e:'⚓',months:['January','February','March']},{id:'Q2',name:'The Open Sea',e:'🌊',months:['April','May','June']},{id:'Q3',name:'The Crossing',e:'⛵',months:['July','August','September']},{id:'Q4',name:'The Final Lap',e:'🏁',months:['October','November','December']}];
const MW={January:[1,4],February:[5,8],March:[9,12],April:[1,4],May:[5,8],June:[9,12],July:[1,4],August:[5,8],September:[9,12],October:[1,4],November:[5,8],December:[9,12]};
const EQUAD=[{u:true,i:true,label:'Do Now',c:'#ef4444',bg:'#fef2f2',desc:'Important + Urgent'},{u:false,i:true,label:'Schedule',c:'#3b82f6',bg:'#eff6ff',desc:'Important, not urgent'},{u:true,i:false,label:'Delegate',c:'#f59e0b',bg:'#fffbeb',desc:'Urgent, not important'},{u:false,i:false,label:'Eliminate',c:'#94a3b8',bg:'#f8fafc',desc:'Neither urgent nor important'}];

// ── STATE ─────────────────────────────────────────────────────────────────────
// ── SAMPLE DATA (used only on very first load) ────────────────────────────────
const DEFAULTS={
  vault:[{id:'CAR-001',cat:'CAR',title:'Get promoted to senior engineer',note:'Leadership and team impact'},{id:'HLT-001',cat:'HLT',title:'Build consistent workout routine',note:'5 days a week'},{id:'BUS-001',cat:'BUS',title:'Launch freelance design business',note:'First client by Q2'}],
  cfd:{CAR:['Monday','Wednesday'],HLT:['Tuesday','Thursday','Saturday'],BUS:['Friday','Saturday']},
  whc:Object.fromEntries(DAYS.map(d=>[d,{Sunrise:{t:'06:00',d:'45 min'},Midday:{t:'12:30',d:'30 min'},Sunset:{t:'18:00',d:'1 hour'}}])),
  goals:[{id:'g1',cat:'CAR',title:'Get promoted to senior engineer',q:'Q2',months:['April','May'],dlWk:8,tgt:'2026-05-30'},{id:'g2',cat:'HLT',title:'Build consistent workout routine',q:'Q3',months:['July','August'],dlWk:12,tgt:'2026-09-30'}],
  ms:[{id:'ms1',gid:'g1',cat:'CAR',title:'Complete leadership self-assessment',dlWk:4,dlQ:'Q2',fwk:12,fq:'Q1',status:'In Progress'},{id:'ms2',gid:'g1',cat:'CAR',title:'Secure 3 peer endorsements',dlWk:7,dlQ:'Q2',fwk:3,fq:'Q2',status:'Not Started'},{id:'ms3',gid:'g2',cat:'HLT',title:'Run 5K without stopping',dlWk:6,dlQ:'Q3',fwk:2,fq:'Q3',status:'Not Started'}],
  tasks:[{id:'mt1',msid:'ms1',gid:'g1',cat:'CAR',title:'Review 1-on-1 feedback notes',day:'Monday',dur:'25 min',wh:'Sunrise',status:'Still Open'},{id:'mt2',msid:'ms1',gid:'g1',cat:'CAR',title:'Write leadership values statement',day:'Wednesday',dur:'45 min',wh:'Sunset',status:'Not Started'}],
  sq:[{id:'sq1',title:'Reply to investor inquiry email',note:'From John at XYZ Capital',u:true,i:true},{id:'sq2',title:'Clean home office desk',note:'',u:false,i:false}],
  anchors:{chart:{day:'Saturday',time:'10:00'},align:{day:'Wednesday',time:'20:00'},reset:{time:'21:00'}},
  user:{name:'',email:'',loggedIn:false},
  dark:false,
  trash:[],
  lastActiveDate:'',
  lastDate:'',
  loopTasks:[]
};

// ── LOAD FROM localStorage (falls back to sample data on first visit) ─────────
function loadState(){
  try{
    const saved=localStorage.getItem('atlas_v2');
    if(saved){
      const p=JSON.parse(saved);
      return{...DEFAULTS,...p};
    }
  }catch(e){}
  return{...DEFAULTS};
}

// ── SAVE TO localStorage (called after every change) ─────────────────────────
function save(){
  try{
    localStorage.setItem('atlas_v2',JSON.stringify({
      vault:S.vault,cfd:S.cfd,whc:S.whc,
      goals:S.goals,ms:S.ms,tasks:S.tasks,
      sq:S.sq,anchors:S.anchors,user:S.user,deleted:S.deleted,dark:S.dark,trash:S.trash,lastActiveDate:S.lastActiveDate,lastDate:S.lastDate,loopTasks:S.loopTasks
    }));
  }catch(e){}
}

const _loaded=loadState();
const S={
  view:'today', vaultCat:'CAR', brkQ:'Q1', expGoal:null, msDetail:null,
  editId:null, editType:null,
  vault:_loaded.vault,
  cfd:_loaded.cfd,
  whc:_loaded.whc,
  goals:_loaded.goals,
  ms:_loaded.ms,
  tasks:_loaded.tasks,
  sq:_loaded.sq,
  anchors:_loaded.anchors||DEFAULTS.anchors,
  user:_loaded.user||DEFAULTS.user,
  deleted:_loaded.deleted||[],

function getQW(){const d=new Date();const m=d.getMonth();const qn=Math.floor(m/3)+1;const qs=new Date(d.getFullYear(),(qn-1)*3,1);return{q:'Q'+qn,w:Math.min(12,Math.floor((d-qs)/86400000/7)+1)};}
function bridge(gq,dlwk){const{q:sq,w:sw}=getQW();let q=parseInt(sq[1]),w=sw;const out=[];while(q<parseInt(gq[1])||(q===parseInt(gq[1])&&w<=dlwk)){out.push({q:'Q'+q,w});if(++w>12){w=1;q++;}if(q>4)break;}return out;}
function byQ(br){const g={};br.forEach(b=>{(g[b.q]=g[b.q]||[]).push(b.w);});return g;}

function wkDates(qid,wk){
  const yr=new Date().getFullYear();
  const qm={Q1:0,Q2:3,Q3:6,Q4:9}[qid]??0;
  const qStart=new Date(yr,qm,1);
  const dow=qStart.getDay();
  const toMon=dow===1?0:dow===0?1:(8-dow)%7||7;
  const firstMon=new Date(yr,qm,1+toMon);
  const wkStart=new Date(firstMon); wkStart.setDate(firstMon.getDate()+(wk-1)*7);
  const wkEnd=new Date(wkStart); wkEnd.setDate(wkStart.getDate()+5);
  const f=d=>String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
  return f(wkStart)+' – '+f(wkEnd);
}
function hpillDate(label,q,wk,c,bg,brd){
  const dates=wkDates(q,wk);

function renderVault(){

  const rows=items.length?items.map((v,i)=>'<div style="padding:10px 13px;border-bottom:'+(i<items.length-1?'1px solid var(--surf2)':'none')+';display:flex;gap:10px;align-items:flex-start"><div style="flex:1"><div style="font-size:13px">'+v.title+'</div>'+(v.note?'<div style="font-size:11px;color:var(--txt2);margin-top:2px">'+v.note+'</div>':'')+' </div><span style="font-size:10px;color:var(--txt3)">'+v.id+'</span></div>').join(''):'<div style="padding:28px;text-align:center;font-size:12px;color:var(--txt3)">No ideas yet — click "+ Add Idea"</div>';
  return '<div class="sh"><div><h2>The Vault 🗝️</h2><p>Brainstorm goal ideas per category. No commitment yet.</p></div><button class="btn-p" onclick="openVaultModal()">+ Add Idea</button></div><div class="tab-bar">'+tabs+'</div><div style="background:var(--surf);border:1px solid var(--brd);border-radius:12px;overflow:hidden;border-left:3px solid '+cat.c+'"><div style="padding:10px 13px;background:'+cat.c+'15;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between"><span style="font-weight:600;font-size:13px;color:'+cat.c+'">'+cat.name+'</span><span style="font-size:10px;color:var(--txt3)">'+items.length+' ideas</span></div>'+rows+'</div>';
}
function openVaultModal(eid){
  const v=eid?S.vault.find(x=>x.id===eid):null;
  if(eid){S.editId=eid;S.editType='vault';}
  const cats=CATS.map(c=>'<option value="'+c.id+'"'+(((v?v.cat:S.vaultCat)===c.id)?' selected':'')+'>'+c.name+'</option>').join('');
  openModal('<div class="modal-hdr"><strong>'+(eid?'Edit Vault Idea':'Add to Vault')+'</strong><button class="x-btn" onclick="closeModal()">×</button></div><label class="fl">Category</label><select class="fi" id="vf-cat">'+cats+'</select><label class="fl">Goal idea</label><input class="fi" id="vf-title" value="'+(v?v.title:'').replace(/"/g,'&quot;')+'" placeholder="e.g. Launch a fashion business"><label class="fl">Note (optional)</label><input class="fi" id="vf-note" value="'+(v?v.note:'').replace(/"/g,'&quot;')+'" placeholder="Quick context..."><div style="display:flex;justify-content:flex-end;gap:8px"><button class="btn-g" onclick="closeModal()">Cancel</button><button class="btn-p" onclick="saveVault()">'+(eid?'Save Changes':'Add to Vault')+'</button></div>');}
function saveVault(){const cat=document.getElementById('vf-cat').value;const title=document.getElementById('vf-title').value.trim();const note=document.getElementById('vf-note').value.trim();if(!title)return;if(S.editId&&S.editType==='vault'){const v=S.vault.find(x=>x.id===S.editId);if(v){v.cat=cat;v.title=title;v.note=note;}}else{const n=S.vault.filter(v=>v.cat===cat).length;S.vault.push({id:cat+'-'+String(n+1).padStart(3,'0'),cat,title,note});}closeModal();render();}

function renderFD(){
  if(!S.fdView)S.fdView='grid';

function sortGoalsAsc(goals){

// ── DAILY ROLLOVER ─────────────────────────────────────────────────────────────
// Runs once per day on first load. Moves unfinished tasks to Open Quests.
function checkDailyRollover(){
  if(S.lastActiveDate===TODAY_ISO)return; // already ran today
  if(S.lastActiveDate===''){
    // First ever load — just stamp the date, don't move anything
    S.lastActiveDate=TODAY_ISO;save();return;
  }
  // New day — roll over unfinished tasks to Open Quests (Still Open)
  var rolled=0;
  S.tasks.forEach(function(t){
    if(t.status==='Completed'||t.status==='Still Open'||t.isChildTask)return;
    if(t.status==='Not Started'||t.status==='In Progress'||t.status==='Half-done'||t.status==='Not Done'){
      t.status='Still Open';
      t.rolledOver=true;
      t.rolledDate=S.lastActiveDate;
      rolled++;
    }
  });
  S.lastActiveDate=TODAY_ISO;
  save();
  if(rolled>0)console.log('ATLAS: rolled over '+rolled+' tasks to Open Quests');
}

  const taskDays=t=>(Array.isArray(t.days)?t.days:(t.day?[t.day]:[]));

  const todayTasks=S.tasks.filter(t=>{
    if(seen.has(t.id))return false;
    if(t.isChildTask)return false;
    if(t.removedFromToday)return false;
    if(t.isLoop)return false; // loops shown in their own section
    const inToday=taskDays(t).includes(TODAY_NAME);
    const isCarryOver=t.status==='Not Done';
    if(inToday||isCarryOver){seen.add(t.id);return true;}
    return false;

  });
  const whOrder={Sunrise:0,Midday:1,Sunset:2};
  todayTasks.sort((a,b)=>(whOrder[a.wh]||0)-(whOrder[b.wh]||0));

  // Watch hour bar — current period highlighted, others muted
  const activeWH=nowHour<9?null:nowHour<12?'Sunrise':nowHour<16?'Midday':'Sunset';
  const whBar=`<div style="background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:12px 14px;margin-bottom:16px">
    <div style="font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Today's Watch Hours</div>

      ${['Sunrise','Midday','Sunset'].map(wh=>{
        const cfg=todayWH[wh]||{};
        const isActive=activeWH===wh;
        const isDimmed=activeWH&&!isActive;
        return cfg.d
          ? '<div style="flex:'+(isActive?'2':'1')+';min-width:80px;padding:'+(isActive?'12px 14px':'8px 10px')+';border-radius:10px;background:'+WH_BG[wh]+';border:'+(isActive?'2px':'1px')+' solid '+WH_C[wh]+(isActive?'':'66')+';text-align:center;opacity:'+(isDimmed?'0.5':'1')+';transition:all .2s">'

              +'<div style="font-size:11px;font-weight:700;color:var(--txt3);margin-bottom:3px">'+wh+'</div>'

  const headerHtml=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px">
    <h2 style="font-size:20px;font-weight:700;color:var(--txt)">${greeting}</h2>

  ${whBar}`;

  // Evening summary — two separate cards
  const eveningSummary=isEvening?
    // Card 1: Completed tasks
    '<div style="background:var(--surf);border:1px solid #86efac;border-radius:12px;padding:14px;margin-bottom:12px">'
      +'<div style="font-size:13px;font-weight:700;color:var(--txt);margin-bottom:'+(completedToday.length?'10px':'0')+'">✅ Completed today'+(completedToday.length?' ('+completedToday.length+')':'')+'</div>'
      +(completedToday.length
        ? completedToday.map(t=>{const cat=gc(t.cat);return'<div style="font-size:12px;color:var(--txt2);padding:5px 9px;background:var(--surf2);border-radius:7px;border-left:3px solid '+(cat?.c||'#22c55e')+';margin-bottom:4px">'+(cat?'<span style="color:'+cat.c+';font-weight:600">'+cat.name+' · </span>':'')+t.title+'</div>';}).join('')
        : '<div style="font-size:12px;color:var(--txt2);margin-top:4px">Nothing marked complete yet — there\'s still time.</div>')
    +'</div>'
    // Card 2: Unfinished tasks prompt (only if there are tasks)
    +(todayTasks.length
      ? '<div style="background:var(--surf);border:1px solid #fde68a;border-radius:12px;padding:14px;margin-bottom:12px">'
          +'<div style="font-size:14px;font-weight:700;color:var(--txt);margin-bottom:6px">You can still do these today</div>'
          +'<div style="font-size:12px;color:var(--txt2);line-height:1.6">If you can\'t close them today, no pressure. Mark them as <strong>Still Open</strong> and they\'ll move to your Open Quests.</div>'
        +'</div>'
      : '<div style="font-size:13px;color:#22c55e;font-weight:700;margin-bottom:12px">🎉 All done for today!</div>')
    : '';
  const viewToggle=`<div style="display:flex;gap:6px;margin-bottom:14px">
    <button class="tab${S.todayView==='watchhour'?' active':''}" onclick="S.todayView='watchhour';render()">⏰ By Watch Hour</button>
    <button class="tab${S.todayView==='category'?' active':''}" onclick="S.todayView='category';render()">⊞ By Category</button>
    <button class="tab${S.todayView==='list'?' active':''}" onclick="S.todayView='list';render()">☰ List</button>
  </div>`;

  if(!todayTasks.length&&!loopTasks.length){
    return headerHtml+eveningSummary+viewToggle+`<div style="text-align:center;padding:48px 24px;color:var(--txt3)">
      <div style="font-size:40px;margin-bottom:14px">🌅</div>
      <div style="font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:6px">Your slate is clear.</div>
      <div style="font-size:12px;margin-bottom:22px;color:var(--txt3)">Add a task to get started, or check your Quarter views for scheduled mini-tasks.</div>
      <button onclick="openAddTask()" style="padding:11px 26px;border-radius:8px;border:1px solid var(--brd);cursor:pointer;font-size:13px;font-weight:600;background:var(--surf);color:var(--txt)">+ Add a task</button>
    </div>`;
  }

  const statusLegend=`<div style="display:flex;gap:10px;flex-wrap:wrap;padding:10px 13px;background:var(--surf2);border-radius:8px;font-size:11px;color:var(--txt2);margin-top:14px">
    <span style="font-weight:600">Status:</span>
    <span>✅ Completed</span>
    <span style="color:#1d4ed8">● Still Open → Open Quests</span>
    <span style="color:#854d0e">● Half-done → yellow</span>
    <span style="color:#b91c1c">● Not Done → tomorrow</span>
  </div>`;

  // Single Loops to Close renderer — purple card with goal info
  const loopsSection=loopTasks.length
    ?'<div style="background:var(--surf);border:2px solid #8b5cf6;border-radius:12px;padding:14px;margin-top:8px;margin-bottom:14px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
        +'<div style="font-size:12px;font-weight:700;color:#6d28d9;text-transform:uppercase;letter-spacing:.5px">🔁 Loops to Close</div>'
        +'<div style="flex:1;height:1px;background:#8b5cf633"></div>'
        +'<div style="font-size:11px;color:#8b5cf6">'+loopTasks.length+' task'+(loopTasks.length!==1?'s':'')+'</div>'
      +'</div>'
      +loopTasks.map(function(mt){
        const cat=gc(mt.cat);
        const goal=mt.gid?S.goals.find(function(g){return g.id===mt.gid;}):null;
        return'<div style="background:var(--surf2);border-radius:9px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
          +'<div style="flex:1;min-width:0">'
            +'<div style="font-size:13px;color:var(--txt);font-weight:500;margin-bottom:3px">'+mt.title+'</div>'
            +'<div style="font-size:11px;color:var(--txt2);display:flex;gap:6px;flex-wrap:wrap">'
              +(cat?'<span style="color:'+cat.c+';font-weight:600">'+cat.name+'</span>':'')
              +'<span style="color:'+WH_C[mt.wh||'Sunrise']+'">'+( mt.wh||'')+'</span>'
              +(mt.oqSchedule?'<span>'+mt.oqSchedule.time+' · '+mt.dur+'</span>':'')
              +(goal?'<span style="color:var(--txt3)">· '+goal.title.slice(0,35)+'</span>':'')
            +'</div>'
          +'</div>'
          +'<select onchange="updateTodayTaskStatus(\''+mt.id+'\',this.value)" style="font-size:11px;padding:3px 5px;border:1px solid var(--brd);border-radius:6px;background:var(--inp);color:var(--txt2);cursor:pointer">'+selOpts(STATUS,mt.status)+'</select>'
        +'</div>';
      }).join('')
    +'</div>'
    :'';

  let html=headerHtml+eveningSummary+viewToggle;

  if(S.todayView==='watchhour'){
    ['Sunrise','Midday','Sunset'].forEach(wh=>{
      if(!grouped[wh].length)return;
      html+=`<div style="margin-bottom:18px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="font-size:12px;font-weight:700;color:${WH_C[wh]};text-transform:uppercase;letter-spacing:.5px">${wh}</div>
          <div style="flex:1;height:1px;background:var(--brd)"></div>
          <div style="font-size:11px;color:var(--txt3)">${grouped[wh].length} task${grouped[wh].length!==1?'s':''}</div>
        </div>
        ${grouped[wh].map(taskCard).join('')}
      </div>`;
    });
  } else if(S.todayView==='category'){
    const usedCats=[...new Set(todayTasks.map(t=>t.cat).filter(Boolean))];
    usedCats.forEach(cid=>{
      const cat=gc(cid);const catTasks=todayTasks.filter(t=>t.cat===cid);
      html+=`<div style="margin-bottom:18px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="font-size:12px;font-weight:700;color:${cat?.c||'var(--txt2)'};text-transform:uppercase;letter-spacing:.5px">${cat?.name||cid}</div>
          <div style="flex:1;height:1px;background:var(--brd)"></div>
          <div style="font-size:11px;color:var(--txt3)">${catTasks.length} task${catTasks.length!==1?'s':''}</div>
        </div>
        ${catTasks.map(taskCard).join('')}
      </div>`;
    });
  } else {
    html+=todayTasks.map(taskCard).join('');
  }

  html+=loopsSection+statusLegend;
  return html;
}
function saveTodayTaskNote(id,val){
  const t=S.tasks.find(x=>x.id===id);
  if(t){t.note=val;save();}
}
function updateEmbeddedMiniStatus(parentId,idx,s){
  const t=S.tasks.find(x=>x.id===parentId);
  if(t&&t.miniTasks&&t.miniTasks[idx]){t.miniTasks[idx].status=s;render();}
}
function updateTodayTaskStatus(id,s){
  const t=S.tasks.find(x=>x.id===id);
  if(!t)return;
  if(s==='Remove'){
    // Hide from today, surface in Open Quests
    t.status='Still Open';
    t.removedFromToday=true;
  } else {
    t.status=s;
    t.removedFromToday=false;
  }
  render();
}
function openEditTodayTask(id){
  const mt=S.tasks.find(x=>x.id===id);
  if(!mt)return;
  // Restore state from existing task then open the full Add Task card
  window._atEditId=id;
  window._atDays=Array.isArray(mt.days)&&mt.days.length?[...mt.days]:(mt.day?[mt.day]:[TODAY_NAME]);
  // Restore milestones
  const allMsIds=mt.milestoneIds||(mt.msid?[mt.msid]:[]);
  const allMs=allMsIds.map(mid=>S.ms.find(m=>m.id===mid)).filter(Boolean);
  window._atMilestones=allMs.length?allMs.map(m=>({title:m.title,fwk:m.fwk,dlwk:m.dlWk,q:m.fq})):[{title:'',fwk:4,dlwk:8,q:'Q2'}];
  // Restore mini-tasks
  const mts=mt.miniTasks||[];
  window._atMiniTasks=mts.length?mts.map(t=>({title:t.title,day:t.day||TODAY_NAME,wh:t.wh||'Sunrise',dur:t.dur||'25 min'})):[{title:'',day:TODAY_NAME,wh:'Sunrise',dur:'25 min'}];
  // Open the full modal with existing values pre-filled
  openAddTask(mt.title, mt.cat||'CAR');
  // If there were milestones, auto-open that section
  if(allMs.length){
    setTimeout(function(){
      const msBody=document.getElementById('at-ms-body');
      const msIcon=document.getElementById('at-ms-icon');
      if(msBody){msBody.style.display='block';if(msIcon)msIcon.textContent='▲ collapse';}
    },50);
  }
  if(mts.length){
    setTimeout(function(){
      const mtBody=document.getElementById('at-mt-body');
      const mtIcon=document.getElementById('at-mt-icon');
      if(mtBody){mtBody.style.display='block';if(mtIcon)mtIcon.textContent='▲ collapse';}
    },50);
  }
}
function saveEditTodayTask(id){
  const mt=S.tasks.find(x=>x.id===id);
  if(!mt)return;
  const title=document.getElementById('at-title')?.value.trim()||mt.title;
  const cat=document.getElementById('at-cat')?.value||mt.cat;
  const wh=document.getElementById('at-wh')?.value||mt.wh;
  const dur=document.getElementById('at-dur')?.value||mt.dur;
  const days=[...window._atDays];
  mt.title=title;mt.cat=cat;mt.wh=wh;mt.dur=dur;
  mt.days=days.length?days:[mt.day||TODAY_NAME];
  mt.day=mt.days[0];
  // Re-save milestones if section open
  if(document.getElementById('at-ms-body')?.style.display==='block'){
    const oldIds=mt.milestoneIds||(mt.msid?[mt.msid]:[]);
    oldIds.forEach(function(mid){S.ms=S.ms.filter(function(m){return m.id!==mid;});});
    mt.milestoneIds=[];mt.msid=null;
    var newGid=mt.gid||null;
    window._atMilestones.forEach(function(_,i){
      const t=(document.getElementById('at-ms-t-'+i)?.value||'').trim();if(!t)return;
      const q=document.getElementById('at-ms-q-'+i)?.value||'Q2';
      const fwk=parseInt(document.getElementById('at-ms-fw-'+i)?.value)||4;
      const dlwk=parseInt(document.getElementById('at-ms-dw-'+i)?.value)||8;
      if(!newGid){newGid='g'+uid();S.goals.push({id:newGid,cat:cat,title:title,q:q,months:[],dlWk:dlwk,tgt:''});}
      const mid='ms'+uid();
      S.ms.push({id:mid,gid:newGid,cat:cat,title:t,fq:q,fwk:fwk,fwks:[{q:q,w:fwk}],dlQ:q,dlWk:dlwk,status:'Not Started'});
      mt.milestoneIds.push(mid);if(!mt.msid)mt.msid=mid;
    });
    mt.gid=newGid;
  }
  // Re-save mini-tasks if section open
  if(document.getElementById('at-mt-body')?.style.display==='block'){
    mt.miniTasks=[];
    window._atMiniTasks.forEach(function(_,i){
      const t=(document.getElementById('at-mt-t-'+i)?.value||'').trim();if(!t)return;
      mt.miniTasks.push({id:'mt'+uid(),parentId:id,cat:cat,title:t,day:document.getElementById('at-mt-d-'+i)?.value||TODAY_NAME,wh:document.getElementById('at-mt-wh-'+i)?.value||'Sunrise',dur:document.getElementById('at-mt-dur-'+i)?.value||'25 min',status:'Not Started',isChildTask:true});
    });
  }
  window._atEditId=null;
  closeModal();S.expTodayTask=id;render();
}

function saveAddTask(){
  const title=document.getElementById('at-title')?.value.trim();
  if(!title)return;
  const cat=document.getElementById('at-cat')?.value||'CAR';
  const wh=document.getElementById('at-wh')?.value||'Sunrise';
  const dur=document.getElementById('at-dur')?.value||'25 min';
  const due=document.getElementById('at-due')?.value||'';
  const days=[...window._atDays];
  if(!days.length)days.push(TODAY_NAME);
  const selectedGid=document.getElementById('at-goal')?.value||null;

  let gid=selectedGid,msid=null,taskCat=cat;
  if(selectedGid){
    const eg=S.goals.find(g=>g.id===gid);
    if(eg)taskCat=eg.cat;
  }

  // Save milestones if body is open
  var savedMilestones=[];
  if(document.getElementById('at-ms-body')?.style.display==='block'){
    window._atMilestones.forEach((_,i)=>{
      const t=(document.getElementById('at-ms-t-'+i)?.value||'').trim();
      if(!t)return;
      const q=document.getElementById('at-ms-q-'+i)?.value||'Q2';
      const fwk=parseInt(document.getElementById('at-ms-fw-'+i)?.value)||4;
      const dlwk=parseInt(document.getElementById('at-ms-dw-'+i)?.value)||8;
      if(!gid){
        gid='g'+uid();
        S.goals.push({id:gid,cat:taskCat,title,q,months:[],dlWk:dlwk,tgt:due});
      }
      const mid='ms'+uid();
      S.ms.push({id:mid,gid,cat:taskCat,title:t,fq:q,fwk,fwks:[{q,w:fwk}],dlQ:q,dlWk:dlwk,status:'Not Started'});
      savedMilestones.push(mid);
      if(!msid)msid=mid; // keep first for backward compat
    });
  }

  // Create the main parent task
  var mainTaskId='mt'+uid();
  S.tasks.push({id:mainTaskId,msid:null,gid:gid||null,cat:taskCat,title:title,days:days,day:days[0]||TODAY_NAME,dur:dur,wh:wh,status:'Not Started',fromAddTask:true});

  // Mini-tasks: stored as children of the parent task, NOT as separate top-level tasks
  if(document.getElementById('at-mt-body')?.style.display==='block'){
    var miniTasks=[];
    window._atMiniTasks.forEach(function(obj,i){
      var t=(document.getElementById('at-mt-t-'+i)?.value||'').trim();
      if(!t)return;
      var day=document.getElementById('at-mt-d-'+i)?.value||TODAY_NAME;
      var twh=document.getElementById('at-mt-wh-'+i)?.value||'Sunrise';
      var tdur=document.getElementById('at-mt-dur-'+i)?.value||'25 min';
      miniTasks.push({id:'mt'+uid(),parentId:mainTaskId,msid:msid||null,gid:gid||null,cat:taskCat,title:t,days:[day],day:day,dur:tdur,wh:twh,status:'Not Started',fromAddTask:true,isChildTask:true});
    });
    // Attach mini-tasks to the parent task object (not pushed to S.tasks as top-level)
    var parentTask=S.tasks.find(function(t){return t.id===mainTaskId;});
    if(parentTask&&miniTasks.length)parentTask.miniTasks=miniTasks;
  }

  // Attach goal, all milestones, and miniTasks to parent task
  var parentTaskFinal=S.tasks.find(function(t){return t.id===mainTaskId;});
  if(parentTaskFinal){
    if(gid)parentTaskFinal.gid=gid;
    if(msid)parentTaskFinal.msid=msid; // first milestone (backward compat)
    if(savedMilestones.length)parentTaskFinal.milestoneIds=savedMilestones;
  }

  closeModal();S.view='today';render();
}

function trashItem(type,id,label){
  openModal('<div class="modal-hdr"><strong style="color:#b91c1c">Delete '+type+'?</strong><button class="x-btn" onclick="closeModal()">x</button></div>'
    +'<div style="font-size:13px;color:var(--txt);margin-bottom:6px">Deleting:</div>'
    +'<div style="font-size:13px;font-weight:600;background:var(--surf2);padding:8px 12px;border-radius:8px;margin-bottom:12px;color:var(--txt)">'+label+'</div>'
    +'<div style="font-size:12px;color:var(--txt2);margin-bottom:16px">Kept in Deleted Items for 3 days, then permanently removed.</div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end">'
      +'<button class="btn-g" onclick="closeModal()">Cancel</button>'
      +'<button onclick="confirmTrash(\''+type+'\',\''+id+'\')" style="padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:#ef4444;color:#fff">Yes, delete</button>'
    +'</div>');
}
function confirmTrash(type,id){
  if(!S.trash)S.trash=[];
  var now=Date.now();var T3=259200000;
  if(type==='task'){
    var t=S.tasks.find(function(x){return x.id===id;});
    if(t){S.trash.push(Object.assign({},t,{_tt:'task',_ta:now}));S.tasks=S.tasks.filter(function(x){return x.id!==id;});}
  } else if(type==='goal'){
    var g=S.goals.find(function(x){return x.id===id;});
    if(g){
      S.trash.push(Object.assign({},g,{_tt:'goal',_ta:now}));
      S.ms.filter(function(m){return m.gid===id;}).forEach(function(m){S.trash.push(Object.assign({},m,{_tt:'milestone',_ta:now}));});
      S.tasks.filter(function(t){return t.gid===id;}).forEach(function(t){S.trash.push(Object.assign({},t,{_tt:'task',_ta:now}));});
      S.goals=S.goals.filter(function(x){return x.id!==id;});
      S.ms=S.ms.filter(function(m){return m.gid!==id;});
      S.tasks=S.tasks.filter(function(t){return t.gid!==id;});
    }
  } else if(type==='milestone'){
    var m=S.ms.find(function(x){return x.id===id;});
    if(m){
      S.trash.push(Object.assign({},m,{_tt:'milestone',_ta:now}));
      S.tasks.filter(function(t){return t.msid===id;}).forEach(function(t){S.trash.push(Object.assign({},t,{_tt:'task',_ta:now}));});
      S.ms=S.ms.filter(function(x){return x.id!==id;});
      S.tasks=S.tasks.filter(function(t){return t.msid!==id;});
    }
  } else if(type==='sidequest'){
    var sq=S.sq.find(function(x){return x.id===id;});
    if(sq){S.trash.push(Object.assign({},sq,{_tt:'sidequest',_ta:now}));S.sq=S.sq.filter(function(x){return x.id!==id;});}
  }
  S.trash=S.trash.filter(function(x){return (now-x._ta)<T3;});
  closeModal();render();
}
function renderTrash(){
  var now=Date.now();var T3=259200000;
  S.trash=S.trash.filter(function(x){return (now-x._ta)<T3;});
  var typeC={task:'#3b82f6',milestone:'#8b5cf6',goal:'#c9a84c',sidequest:'#f59e0b'};
  var typeL={task:'Task',milestone:'Milestone',goal:'Goal',sidequest:'Side Quest'};
  if(!S.trash.length){
    return'<div class="sh"><div><h2>Deleted Items</h2><p>Items kept for 3 days then permanently removed.</p></div></div>'
      +'<div style="text-align:center;padding:60px;color:var(--txt3)"><div style="font-size:32px;margin-bottom:10px">OK</div>'
      +'<div style="font-size:14px;font-weight:600;color:var(--txt2)">Nothing deleted recently.</div></div>';
  }
  return'<div class="sh"><div><h2>Deleted Items</h2><p>'+S.trash.length+' item'+(S.trash.length!==1?'s':'')+' auto-cleared after 3 days</p></div></div>'
    +'<div class="info-box" style="margin-bottom:14px">Permanently removed 3 days after deletion.</div>'
    +S.trash.map(function(item){
      var age=Math.floor((now-item._ta)/3600000);
      var dL=Math.ceil((T3-(now-item._ta))/86400000);
      var col=typeC[item._tt]||'#64748b';
      return'<div style="background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:10px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px">'
        +'<div style="flex:1;min-width:0">'
          +'<div style="font-size:13px;color:var(--txt);margin-bottom:3px">'+item.title+'</div>'
          +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
            +'<span style="font-size:10px;padding:1px 7px;border-radius:20px;background:'+col+'18;color:'+col+';border:1px solid '+col+'33;font-weight:600">'+(typeL[item._tt]||'item')+'</span>'
            +'<span style="font-size:11px;color:var(--txt3)">'+(age<1?'just now':age<24?age+'h ago':Math.floor(age/24)+'d ago')+'</span>'

// -- DELETE SYSTEM
function doDelete(type,id){
  var now=Date.now();
  if(!S.deleted)S.deleted=[];
  if(type==='task'){
    var t=S.tasks.find(function(x){return x.id===id;});
    if(t){S.deleted.push({type:type,id:id,data:t,deletedAt:now});S.tasks=S.tasks.filter(function(x){return x.id!==id;});}
  }else if(type==='goal'){
    var g=S.goals.find(function(x){return x.id===id;});
    if(g){
      S.deleted.push({type:type,id:id,data:{goal:g,ms:S.ms.filter(function(m){return m.gid===id;}),tasks:S.tasks.filter(function(t){return t.gid===id;})},deletedAt:now});
      S.goals=S.goals.filter(function(x){return x.id!==id;});
      S.ms=S.ms.filter(function(m){return m.gid!==id;});
      S.tasks=S.tasks.filter(function(t){return t.gid!==id;});
    }
  }else if(type==='ms'){
    var m=S.ms.find(function(x){return x.id===id;});
    if(m){S.deleted.push({type:type,id:id,data:{ms:m,tasks:S.tasks.filter(function(t){return t.msid===id;})},deletedAt:now});S.ms=S.ms.filter(function(x){return x.id!==id;});S.tasks=S.tasks.filter(function(t){return t.msid!==id;});}
  }else if(type==='sq'){
    var s=S.sq.find(function(x){return x.id===id;});
    if(s){S.deleted.push({type:type,id:id,data:s,deletedAt:now});S.sq=S.sq.filter(function(x){return x.id!==id;});}
  }
  closeModal();render();
}
function purgeOldDeleted(){
  if(!S.deleted)S.deleted=[];
  var THREE=3*24*60*60*1000;
  S.deleted=S.deleted.filter(function(d){return Date.now()-d.deletedAt<THREE;});
}
function renderDeleted(){
  purgeOldDeleted();
  var items=S.deleted.slice().reverse();
  var TL={task:'Task',goal:'Goal',ms:'Milestone',sq:'Side Quest'};
  var TC={task:'#3b82f6',goal:'#c9a84c',ms:'#8b5cf6',sq:'#f59e0b'};
  var hdr='<div class="sh"><div><h2>Deleted Items</h2><p>Auto-clears after 3 days.</p></div></div>';

  return hdr+items.map(function(d){
    var age=Date.now()-d.deletedAt;
    var days=Math.floor(age/86400000);
    var hrs=Math.floor((age%86400000)/3600000);
    var ago=days===0?(hrs===0?'Just now':hrs+'h ago'):(days+'d ago');
    var exp=Math.max(0,3-days);
    var lbl=(d.data&&d.data.title)||(d.data&&d.data.goal&&d.data.goal.title)||(d.data&&d.data.ms&&d.data.ms.title)||'Untitled';

      +'<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'
      +'<span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;background:'+tc+'22;color:'+tc+';border:1px solid '+tc+'44">'+tl+'</span>'

async function generateAIMs(gid,cat){
  const ctx=document.getElementById('ai-ctx')?.value.trim();
  const q=document.getElementById('ai-q')?.value||'Q1';
  const g=S.goals.find(x=>x.id===gid);
  if(!g)return;
  const btn=document.getElementById('ai-gen-btn');
  const res=document.getElementById('ai-result');
  if(btn){btn.disabled=true;btn.textContent='Generating…';}
  if(res)res.innerHTML='<div style="text-align:center;padding:16px;color:var(--txt2);font-size:12px">✨ Your AI project manager is thinking…</div>';
  const prompt='You are a world-class project manager. A user has a goal: "'+g.title+'". '+
    (ctx?'Context: '+ctx+'. ':'')+
    'Break this goal into exactly 5-10 concrete, actionable milestones they can complete in '+q+'. '+
    'Each milestone should be a major phase or deliverable. '+
    'Return ONLY a JSON array of strings, no markdown, no explanation. Example: ["Research and audit current state","Build foundational skills","Create first deliverable"]';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await resp.json();
    const text=data?.content?.[0]?.text||'[]';
    const clean=text.replace(/```json|```/g,'').trim();
    const milestones=JSON.parse(clean);
    if(!Array.isArray(milestones)||milestones.length<1)throw new Error('Invalid response');
    window._aiMilestones=milestones;
    window._aiGid=gid;window._aiCat=cat;window._aiQ=q;
    if(res)res.innerHTML='<div style="margin-bottom:10px">'
      +'<div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">✅ '+milestones.length+' milestones generated — review and add:</div>'
      +milestones.map((m,i)=>'<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surf2);border-radius:7px;margin-bottom:4px;font-size:12px;border:1px solid var(--brd)">'
        +'<span style="font-size:11px;color:#3b82f6;font-weight:600;min-width:20px">'+(i+1)+'.</span>'
        +'<span style="flex:1;color:var(--txt)">'+m+'</span>'
      +'</div>').join('')
      +'</div>';
    if(btn){btn.disabled=false;btn.textContent='Add All to Goal →';btn.onclick=()=>addAIMilestones();}
  }catch(e){
    if(res)res.innerHTML='<div style="padding:10px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;font-size:12px;color:#b91c1c">Could not generate milestones. Check your connection and try again.</div>';
    if(btn){btn.disabled=false;btn.textContent='Try Again →';}
  }
}
function addAIMilestones(){
  const ms=window._aiMilestones||[];const gid=window._aiGid;const cat=window._aiCat;const q=window._aiQ||'Q1';
  const g=S.goals.find(x=>x.id===gid);if(!g)return;
  const existing=S.ms.filter(m=>m.gid===gid).length;

}
// ── ATLAS MAP ─────────────────────────────────────────────────────────────────
function renderAtlasMap(){
  // Quarter themes
  const QT=[
    {id:'Q1',name:'The Harbor',e:'⚓',bg:'#0d1f3c',pathC:'#3b82f6',accent:'#60a5fa',label:'#93c5fd',months:'Jan · Feb · Mar'},
    {id:'Q2',name:'The Open Sea',e:'🌊',bg:'#0c2340',pathC:'#06b6d4',accent:'#22d3ee',label:'#67e8f9',months:'Apr · May · Jun'},
    {id:'Q3',name:'The Crossing',e:'⛵',bg:'#1c1230',pathC:'#8b5cf6',accent:'#a78bfa',label:'#c4b5fd',months:'Jul · Aug · Sep'},
    {id:'Q4',name:'The Final Lap',e:'🏁',bg:'#1a0f00',pathC:'#c9a84c',accent:'#fbbf24',label:'#fde68a',months:'Oct · Nov · Dec'},
  ];

  // Build SVG map
  const W=900,ROW=200,PAD=60,DOT_R=8,CURVE=40;
  const totalH=QT.length*ROW+40;

  // Calculate dot positions for each quarter (snake pattern)
  function dotPos(qi,wk){
    const t=(wk-1)/11;
    const y=40+qi*ROW+ROW/2;
    const ltr=qi%2===0;
    const x=ltr?(PAD+t*(W-PAD*2)):(W-PAD-t*(W-PAD*2));
    return{x,y};
  }

  // Build path for each quarter row
  function qPath(qi){
    const ltr=qi%2===0;
    const y=40+qi*ROW+ROW/2;
    const x0=ltr?PAD:W-PAD;
    const x1=ltr?W-PAD:PAD;
    let d=`M ${x0} ${y} L ${x1} ${y}`;
    // Add curve connecting to next row
    if(qi<QT.length-1){
      const nextY=40+(qi+1)*ROW+ROW/2;
      const cx=x1;
      d+=` Q ${cx+(ltr?CURVE:-CURVE)} ${(y+nextY)/2} ${x1} ${nextY}`;
    }
    return d;
  }

  // Place goals on the map
  function goalMarkers(){
    // Group goals by (quarter, dlWk)
    const bySlot={};
    S.goals.forEach(g=>{
      const key=g.q+'_'+g.dlWk;
      if(!bySlot[key])bySlot[key]=[];
      bySlot[key].push(g);
    });
    return Object.entries(bySlot).map(([key,goals])=>{
      const g0=goals[0];
      const qi=QT.findIndex(q=>q.id===g0.q);
      if(qi<0)return'';
      const{x,y}=dotPos(qi,g0.dlWk);
      const qt=QT[qi];
      const isActive=S.mapGoal&&goals.some(g=>S.mapGoal===g.id);
      const slotId=key;

      // Bullet codes under anchor
      const codes=goals.map(g=>{
        const cat=gc(g.cat);
        return '<text x="'+x+'" y="'+(y+34+(goals.indexOf(g)*10))+'" text-anchor="middle" font-size="8" fill="'+qt.label+'" font-weight="500">'+g.cat+'-'+g.id.slice(-2)+'</text>';
      }).join('');

      // Popup card
      const popupW=250;
      const popupX=Math.max(4,Math.min(x-popupW/2,W-popupW-4));
      const popupY=y+26;
      const rowH=22;
      const popupH=goals.length*rowH+50;
      const popup=isActive?`
        <g transform="translate(${popupX},${popupY})" style="filter:drop-shadow(0 4px 12px rgba(0,0,0,.5))">
          <rect width="${popupW}" height="${popupH}" rx="10" fill="#0d1829" stroke="${qt.pathC}" stroke-width="1.5"/>
          <text x="12" y="18" font-size="10" font-weight="bold" fill="#c9a84c">Week ${g0.dlWk} · ${goals.length} goal${goals.length>1?'s':''}</text>
          ${goals.map((g,i)=>{
            const cat=gc(g.cat);
            const{pct}=goalProgress(g.id);
            return `<g onclick="S.brkQ='${g.q}';S.expGoal='${g.id}';nav('breakdown')" style="cursor:pointer">
              <rect x="8" y="${28+i*rowH}" width="${popupW-16}" height="${rowH-3}" rx="5" fill="${cat?.c||'#3b82f6'}22"/>
              <text x="14" y="${28+i*rowH+12}" font-size="9" fill="#e2e8f0">${g.title.slice(0,26)}${g.title.length>26?'…':''}</text>
              <text x="${popupW-14}" y="${28+i*rowH+12}" font-size="9" fill="${cat?.c||'#3b82f6'}" text-anchor="end">${cat?.name||''} · ${pct}%</text>
            </g>`;
          }).join('')}
        </g>`:'';

      return `<g onclick="toggleMapSlot('${slotId}','${goals.map(g=>g.id).join(',')}')" style="cursor:pointer">
        <circle cx="${x}" cy="${y}" r="22" fill="${qt.bg}" stroke="${qt.pathC}" stroke-width="2" opacity="0.9"/>
        <circle cx="${x}" cy="${y}" r="16" fill="${qt.pathC}" opacity="0.2"/>
        <text x="${x}" y="${y+6}" text-anchor="middle" font-size="15">⚓</text>
        ${goals.length>1?'<circle cx="'+(x+14)+'" cy="'+(y-14)+'" r="7" fill="#ef4444"/><text x="'+(x+14)+'" y="'+(y-10)+'" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">'+goals.length+'</text>':''}
        ${codes}
        ${popup}
      </g>`;
    }).join('');
  }

  const svgPaths=QT.map((qt,qi)=>{
    const ltr=qi%2===0;
    const y=40+qi*ROW+ROW/2;
    const x0=ltr?PAD:W-PAD;
    const x1=ltr?W-PAD:PAD;
    // Week dots
    const dots=Array.from({length:12},(_,i)=>{
      const{x,y:dy}=dotPos(qi,i+1);
      const hasGoal=S.goals.some(g=>g.q===qt.id&&g.dlWk===i+1);
      return hasGoal?'':`<circle cx="${x}" cy="${dy}" r="${DOT_R}" fill="${qt.bg}" stroke="${qt.pathC}" stroke-width="2"/>
        <text x="${x}" y="${dy+DOT_R+12}" text-anchor="middle" font-size="9" fill="${qt.label}" font-weight="500">W${i+1}</text>`;
    }).join('');
    // Connector curve to next row
    let connector='';
    if(qi<QT.length-1){
      const nextQt=QT[qi+1];const nextY=40+(qi+1)*ROW+ROW/2;
      connector=`<path d="M ${x1} ${y} C ${x1+(ltr?60:-60)} ${y}, ${x1+(ltr?60:-60)} ${nextY}, ${x1} ${nextY}" stroke="${qt.pathC}" stroke-width="2.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>`;
    }
    return `
      <!-- Q${qi+1} background -->
      <rect x="0" y="${40+qi*ROW}" width="${W}" height="${ROW}" fill="${qt.bg}" opacity="0.85"/>
      <!-- Quarter label -->
      <text x="20" y="${40+qi*ROW+22}" font-size="11" font-weight="bold" fill="${qt.accent}">${qt.e} ${qt.id}: ${qt.name}</text>
      <text x="20" y="${40+qi*ROW+36}" font-size="9" fill="${qt.label}">${qt.months}</text>
      <!-- Path -->
      <path d="M ${x0} ${y} L ${x1} ${y}" stroke="${qt.pathC}" stroke-width="3" fill="none" stroke-linecap="round"/>
      ${connector}
      <!-- Week dots -->
      ${dots}
    `;
  }).join('');

  const svgContent=`<svg id="atlas-map-svg" viewBox="0 0 ${W} ${totalH}" style="width:100%;display:block;border-radius:12px;background:#07111e" preserveAspectRatio="xMidYMid meet">
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <!-- Starfield -->
    ${Array.from({length:40},(_,i)=>`<circle cx="${(i*137)%W}" cy="${(i*97)%(totalH)}" r="${i%3===0?1.5:0.8}" fill="white" opacity="${0.1+i%4*0.06}"/>`).join('')}
    ${svgPaths}
    ${goalMarkers()}
    <!-- Start label -->
    <text x="${PAD-10}" y="35" font-size="10" fill="#60a5fa" font-weight="bold">START</text>
    <!-- End label -->
    <text x="${QT.length%2===0?PAD-10:W-PAD-10}" y="${totalH-5}" font-size="10" fill="#fbbf24" font-weight="bold" text-anchor="${QT.length%2===0?'start':'end'}">DESTINATION 🏁</text>
  </svg>`;

  const legend=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;font-size:11px;color:var(--txt2)">
    <span><span style="font-size:14px">⚓</span> = Goal (click to see details)</span>
    ${QT.map(q=>`<span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${q.pathC};vertical-align:middle;margin-right:3px"></span>${q.id}: ${q.name}</span>`).join('')}
  </div>`;

  const noGoals=S.goals.length===0?`<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#475569"><div style="font-size:24px;margin-bottom:8px">🗺</div><div style="font-size:13px">No goals yet — add goals in Yearly Goals to see them on the map</div></div>`:'';

  return `<div class="sh"><div><h2>My Atlas Map 🗺</h2><p>Your year at a glance — all goals plotted across the four quarters</p></div></div>
    <div style="border-radius:12px;border:1px solid #1e3a5f;position:relative;overflow:hidden">
      ${svgContent}
      ${noGoals}
    </div>
    ${legend}
    <div style="margin-top:10px;font-size:11px;color:var(--txt3)">Click any ⚓ anchor to see goal details. Hit "View in Quarterly Breakdown" inside the popup to navigate there directly.</div>`;
}
function toggleMapSlot(slotId,idsStr){
  const ids=idsStr.split(',');
  const active=ids.some(id=>S.mapGoal===id);
  S.mapGoal=active?null:ids[0];
  renderMapInPlace();
}
function renderMapInPlace(){
  const el=document.getElementById('main');
  if(el&&S.view==='atlasmap'){el.innerHTML=renderAtlasMap();}
}

function render(){
  save();
  checkDailyRollover();
  if(S.expWeekMs===undefined)S.expWeekMs=null;
  if(S.mapGoal===undefined)S.mapGoal=null;
  if(S.goalView===undefined)S.goalView='list';
  if(S.brkView===undefined)S.brkView='list';
  if(S.fdView===undefined)S.fdView='grid';
  if(S.todayView===undefined)S.todayView='watchhour';
  if(S.weekView===undefined)S.weekView='list';
  if(S.expTodayTask===undefined)S.expTodayTask=null;
  if(S.expOQ===undefined)S.expOQ=null;
  if(S.oqAction===undefined)S.oqAction=null;
  const ti=document.getElementById('theme-icon');const tl=document.getElementById('theme-label');
  if(ti)ti.textContent=S.dark?'☀️':'🌙';
  if(tl)tl.textContent=S.dark?'Light mode':'Dark mode';
  // Show login if not logged in
  if(!S.user?.loggedIn){
    document.getElementById('nav-top').innerHTML='';
    document.getElementById('main').innerHTML=renderLogin();
    return;
  }
  document.getElementById('nav-top').innerHTML=navHtml();
  const v=S.view;let html='';
  if(v==='today')html=renderToday();
  else if(v==='week')html=renderWeek();
  else if(v==='atlasmap')html=renderAtlasMap();
  else if(v==='anchors')html=renderAnchors();
  else if(v==='welcome')html=renderWelcome();
  else if(v==='vault')html=renderVault();
  else if(v==='focusdays')html=renderFD();
  else if(v==='watchhours')html=renderWH();
  else if(v==='goals')html=renderGoals();
  else if(v==='breakdown')html=renderBreakdown();
  else if(['q1','q2','q3','q4'].includes(v))html=renderQ(v.toUpperCase());
  else if(v==='sidequests')html=renderSQ();
  else if(v==='openquests')html=renderOQ();
  else if(v==='trash')html=renderTrash();
  else if(v==='deleted'){purgeOldDeleted();html=renderDeleted();}
  else if(v==='feedback')html=renderFeedback();
  document.getElementById('main').innerHTML=html;
}
function clearAllData(){
  if(!confirm('This will permanently delete all your ATLAS data and reset to the sample data. Are you sure?'))return;
  localStorage.removeItem('atlas_v2');
  location.reload();
}

// ── DAY ROLLOVER ──────────────────────────────────────────────────────────────
// Called on every load. If a new day has started since last visit,
// move any non-completed tasks to Open Quests automatically.
function checkDayRollover(){
  const todayStr=new Date().toDateString();
  if(S.lastDate===todayStr)return; // same day, nothing to do
  if(S.lastDate){ // not first ever visit
    S.tasks.forEach(function(t){
      if(t.isChildTask)return; // skip embedded mini-tasks
      if(t.status==='Completed')return; // already done
      if(t.status==='Still Open')return; // already in OQ
      if(t.removedFromToday)return; // already in OQ via Remove
      // Check if this task was for a previous day
      const tdays=Array.isArray(t.days)?t.days:(t.day?[t.day]:[]);
      const wasForYesterday=tdays.length>0&&!tdays.includes(TODAY_NAME);
      if(wasForYesterday){
        t.status='Still Open';
        t.rolledOver=true;
        t.rolledDate=S.lastDate;
      }
    });
  }
  S.lastDate=todayStr;
  save();
}

checkDayRollover();
render();
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js'));
}
</script>
