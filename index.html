    +'</div>'
    +'<div style="font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:8px;line-height:1.3">'+step.title+'</div>'
    +'<div style="font-size:13px;color:#94a3b8;line-height:1.7;margin-bottom:'+(step.sub||step.preview?'8px':'20px')+'">'+step.body+'</div>'
    +(step.sub?'<div style="font-size:11px;color:#c9a84c;font-style:italic;margin-bottom:'+(step.preview?'8px':'20px')+';line-height:1.5">'+step.sub+'</div>':'')

  var f=document.getElementById('ob-floater');if(f)f.remove();

function showObFloater(){
  var existing=document.getElementById('ob-floater');

  var floater=document.createElement('div');
  floater.id='ob-floater';
  floater.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:900;display:flex;border-radius:30px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4);border:1px solid #1e3a5f';

}

function obContinue(){
  var el=document.getElementById('ob-floater');
  if(el)el.remove();
  renderObStep();
}

function obDone(dest){
  S.onboarded=true;save();
  obClose();
  if(dest==='task'){nav('today');setTimeout(openAddTask,200);}
  else if(dest==='goals'){nav('goals');setTimeout(function(){openGoalModal(null);},200);}
  else{nav('welcome');}

function obClose(){

}

function openAIMsModal(gid,cat,goalTitle){
  const g=S.goals.find(x=>x.id===gid);if(!g)return;
  const qopts=QS.map(q=>'<option value="'+q.id+'"'+(q.id===g.q?' selected':'')+'>'+q.e+' '+q.id+': '+q.name+'</option>').join('');
  openModal('<div class="modal-hdr"><strong>✨ Milestone Suggestions</strong><button class="x-btn" onclick="closeModal()">×</button></div>'
    +'<div style="font-size:12px;color:var(--txt2);margin-bottom:12px;line-height:1.6">Add some context and ATLAS will suggest milestones based on your goal and category.</div>'
    +'<label class="fl">Goal</label>'
    +'<div style="font-size:13px;font-weight:600;color:var(--txt);margin-bottom:10px;padding:8px 10px;background:var(--surf2);border-radius:8px">'+goalTitle+'</div>'
    +'<label class="fl">What does success look like? (optional)</label>'
    +'<textarea class="fi" id="ai-ctx" rows="3" placeholder="e.g. I want to launch by Q2, I have 5 hours a week, I am starting from scratch..." style="resize:vertical;font-family:inherit"></textarea>'
    +'<label class="fl">Focus Quarter</label>'
    +'<select class="fi" id="ai-q">'+qopts+'</select>'
    +'<div id="ai-result" style="margin-bottom:10px"></div>'
    +'<div style="display:flex;justify-content:flex-end;gap:8px">'
      +'<button class="btn-g" onclick="closeModal()">Cancel</button>'
      +'<button class="btn-p" id="ai-gen-btn" onclick="generateAIMs(\''+gid+'\',\''+cat+'\')">Suggest Milestones →</button>'
    +'</div>');
}
function generateAIMs(gid,cat){
  const ctx=(document.getElementById('ai-ctx')?.value||'').trim();
  const ctxLow=ctx.toLowerCase();
  const q=document.getElementById('ai-q')?.value||'Q1';
  const g=S.goals.find(x=>x.id===gid);
  if(!g)return;
  const btn=document.getElementById('ai-gen-btn');
  const res=document.getElementById('ai-result');
  if(btn){btn.disabled=true;btn.textContent='Thinking…';}

  // ── Context-aware milestone generation ────────────────────────────────────
  const isBeginnerish=/start|beginner|first time|new to|from scratch|never/.test(ctxLow);
  const isTightTime=/limited|busy|5 hour|2 hour|side project|part.?time|no time/.test(ctxLow);
  const isLaunch=/launch|ship|publish|release|go live/.test(ctxLow);

  // Extract key nouns/verbs from context to personalise milestones
  // Look for actionable phrases the user mentioned
  const contextClues=[];
  if(ctx){
    // Extract things the user explicitly mentioned needing to do
    const doPatterns=[
      /(?:need to|want to|have to|going to|plan to|will)\s+([a-z][^,.]{4,40})/gi,
      /(?:design|create|build|make|get|find|set up|organise|organize|print|recruit|contact|book|secure|arrange|prepare|develop|write|launch|test|review|plan)\s+([a-z][^,.]{3,35})/gi,
    ];
    doPatterns.forEach(pat=>{
      let match;
      while((match=pat.exec(ctx))!==null&&contextClues.length<6){
        const phrase=match[1].trim().replace(/\s+/g,' ').slice(0,45);
        if(phrase.length>4&&!contextClues.includes(phrase))contextClues.push(phrase);
      }
    });
  }

  // Build milestone list from context clues if we found enough, else use templates
  let suggestions=[];

  if(contextClues.length>=3){
    // Build personalised milestones from what the user described
    // Always start with planning/research, end with review
    suggestions.push('Define the scope and set a measurable outcome for '+g.title.slice(0,35));
    contextClues.slice(0,5).forEach(clue=>{
      // Capitalise first letter
      suggestions.push(clue.charAt(0).toUpperCase()+clue.slice(1));
    });
    suggestions.push('Review progress and adjust the plan');
    suggestions.push('Complete and wrap up '+g.title.slice(0,30));
  } else {
    // Fall back to category templates + inject any context clues we did find
    const TEMPLATES={
      CAR:['Assess current skills and identify gaps','Research role requirements and expectations','Build visibility with key stakeholders','Collect peer feedback and endorsements','Complete one high-impact project','Present work to senior leadership','Formalise achievements into a portfolio','Request a development conversation','Agree a clear promotion timeline','Follow up and close the loop'],
      BUS:['Validate the business idea with potential customers','Define your core offer and pricing','Set up the business legally and financially','Build your minimum viable product or service','Land your first paying customer','Collect feedback and iterate','Build a repeatable sales or marketing process','Reach your first revenue milestone','Document your operations','Plan for the next phase of growth'],
      EDU:['Define exactly what you want to learn and why','Find the best resources and courses','Create a realistic study schedule','Complete the foundational modules','Apply what you have learned in a small project','Review progress and fill any gaps','Take on a more advanced challenge','Share or teach what you have learned','Earn any relevant certifications','Reflect on how far you have come'],
      FIN:['Audit your current financial position','Define a clear savings or investment target','Cut unnecessary spending','Set up automatic savings','Research your chosen investment approach','Make your first investment or financial move','Track progress monthly','Increase income or reduce costs further','Hit your first major milestone','Review and set your next goal'],
      HLT:['Get a baseline assessment of your current fitness','Define a realistic weekly routine','Prepare your environment for success','Complete your first full week','Establish the habit over three weeks','Increase intensity or complexity','Track a measurable improvement','Deal with your first setback and keep going','Hit your midpoint target','Celebrate and set the next challenge'],
      CRT:['Explore references and gather inspiration','Define the scope of the creative project','Create your first rough draft or prototype','Get early feedback from someone you trust','Refine based on what you learned','Complete a second, stronger version','Share it with a wider audience','Collect meaningful feedback','Polish the final piece','Publish, submit, or launch'],
      DEV:['Identify the one habit or skill to develop','Read or study the fundamentals','Apply it in a low-stakes situation','Reflect on what worked and what did not','Increase the challenge level','Build consistency over a month','Measure the impact on your life or work','Share progress with an accountability partner','Lock in the new behaviour','Set the next development goal'],
      SOC:['Define the community need and your intended impact','Identify key stakeholders and potential partners','Plan the initiative scope and resources needed','Recruit volunteers or collaborators','Execute the first phase or pilot','Gather feedback from participants','Refine based on what you learned','Scale or repeat the initiative','Document the outcomes and impact','Celebrate and plan the next chapter'],
      default:['Define the goal clearly and set a measurable outcome','Research and gather everything you need to start','Complete the first tangible step','Build momentum by reaching the quarter mark','Tackle the hardest or most uncertain part','Review progress and adjust the plan','Complete the core work','Do a final quality review','Prepare to share, launch, or close out','Wrap up and capture what you learned']
    };
    suggestions=[...(TEMPLATES[cat]||TEMPLATES.default)];
    // Inject any context clues at position 2
    if(contextClues.length>0){
      suggestions.splice(2,0,...contextClues.slice(0,2).map(c=>c.charAt(0).toUpperCase()+c.slice(1)));
    }
  }

  if(isBeginnerish)suggestions=suggestions.map((s,i)=>i===0?'Start with the very basics — no pressure on speed':s);
  if(isLaunch&&!suggestions.some(s=>s.toLowerCase().includes('launch'))){suggestions[suggestions.length-1]='Launch and get it in front of real people';}
  const count=isTightTime?6:8;
  suggestions=suggestions.slice(0,count);

  window._aiMilestones=suggestions;
  window._aiGid=gid;window._aiCat=cat;window._aiQ=q;

  if(res)res.innerHTML='<div style="margin-bottom:10px">'
    +'<div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">'+suggestions.length+' SUGGESTED MILESTONES — EDIT, REORDER, OR ADD YOUR OWN:</div>'
    +suggestions.map((m,i)=>'<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surf2);border-radius:7px;margin-bottom:4px;font-size:12px;border:1px solid var(--brd)">'
      +'<span style="font-size:11px;color:#8b5cf6;font-weight:600;min-width:20px">'+(i+1)+'.</span>'
      +'<input style="flex:1;background:transparent;border:none;outline:none;font-size:12px;color:var(--txt)" id="aim-'+i+'" value="'+m.replace(/"/g,'&quot;')+'">'
    +'</div>').join('')
  +'</div>';
  if(btn){btn.disabled=false;btn.textContent='Add All to Goal →';btn.onclick=function(){addAIMilestones();};}
}
function addAIMilestones(){

// ── ATLAS MAP ─────────────────────────────────────────────────────────────────
function renderAtlasMap(){
  // Quarter themes
  const QT=[
    {id:'Q1',name:'The Harbor',e:'⚓',bg:'#0d1f3c',pathC:'#3b82f6',accent:'#60a5fa',label:'#93c5fd',months:'Jan · Feb · Mar'},
    {id:'Q2',name:'The Open Sea',e:'🌊',bg:'#0c2340',pathC:'#06b6d4',accent:'#22d3ee',label:'#67e8f9',months:'Apr · May · Jun'},
    {id:'Q3',name:'The Crossing',e:'⛵',bg:'#1c1230',pathC:'#8b5cf6',accent:'#a78bfa',label:'#c4b5fd',months:'Jul · Aug · Sep'},
    {id:'Q4',name:'The Final Lap',e:'🏁',bg:'#1a0f00',pathC:'#c9a84c',accent:'#fbbf24',label:'#fde68a',months:'Oct · Nov · Dec'},
  ];

  // Build SVG map
  const W=900,ROW=200,PAD=60,DOT_R=8,CURVE=40;
  const totalH=QT.length*ROW+40;

  // Calculate dot positions for each quarter (snake pattern)
  function dotPos(qi,wk){
    const t=(wk-1)/11;
    const y=40+qi*ROW+ROW/2;
    const ltr=qi%2===0;
    const x=ltr?(PAD+t*(W-PAD*2)):(W-PAD-t*(W-PAD*2));
    return{x,y};
  }

  // Build path for each quarter row
  function qPath(qi){
    const ltr=qi%2===0;
    const y=40+qi*ROW+ROW/2;
    const x0=ltr?PAD:W-PAD;
    const x1=ltr?W-PAD:PAD;
    let d=`M ${x0} ${y} L ${x1} ${y}`;
    // Add curve connecting to next row
    if(qi<QT.length-1){
      const nextY=40+(qi+1)*ROW+ROW/2;
      const cx=x1;
      d+=` Q ${cx+(ltr?CURVE:-CURVE)} ${(y+nextY)/2} ${x1} ${nextY}`;
    }
    return d;
  }

  // Place goals on the map
  function goalMarkers(){
    // Group goals by (quarter, dlWk)
    const bySlot={};
    S.goals.forEach(g=>{
      const key=g.q+'_'+g.dlWk;
      if(!bySlot[key])bySlot[key]=[];
      bySlot[key].push(g);
    });
    return Object.entries(bySlot).map(([key,goals])=>{
      const g0=goals[0];
      const qi=QT.findIndex(q=>q.id===g0.q);
      if(qi<0)return'';
      const{x,y}=dotPos(qi,g0.dlWk);
      const qt=QT[qi];
      const isActive=S.mapGoal&&goals.some(g=>S.mapGoal===g.id);
      const slotId=key;

      // Bullet codes under anchor
      const codes=goals.map(g=>{
        const cat=gc(g.cat);
        return '<text x="'+x+'" y="'+(y+34+(goals.indexOf(g)*10))+'" text-anchor="middle" font-size="8" fill="'+qt.label+'" font-weight="500">'+g.cat+'-'+g.id.slice(-2)+'</text>';
      }).join('');

      // Popup card
      const popupW=250;
      const popupX=Math.max(4,Math.min(x-popupW/2,W-popupW-4));
      const popupY=y+26;
      const rowH=22;
      const popupH=goals.length*rowH+50;
      const popup=isActive?`
        <g transform="translate(${popupX},${popupY})" style="filter:drop-shadow(0 4px 12px rgba(0,0,0,.5))">
          <rect width="${popupW}" height="${popupH}" rx="10" fill="#0d1829" stroke="${qt.pathC}" stroke-width="1.5"/>
          <text x="12" y="18" font-size="10" font-weight="bold" fill="#c9a84c">Week ${g0.dlWk} · ${goals.length} goal${goals.length>1?'s':''}</text>
          ${goals.map((g,i)=>{
            const cat=gc(g.cat);
            const{pct}=goalProgress(g.id);
            return `<g onclick="S.brkQ='${g.q}';S.expGoal='${g.id}';nav('breakdown')" style="cursor:pointer">
              <rect x="8" y="${28+i*rowH}" width="${popupW-16}" height="${rowH-3}" rx="5" fill="${cat?.c||'#3b82f6'}22"/>
              <text x="14" y="${28+i*rowH+12}" font-size="9" fill="#e2e8f0">${g.title.slice(0,26)}${g.title.length>26?'…':''}</text>
              <text x="${popupW-14}" y="${28+i*rowH+12}" font-size="9" fill="${cat?.c||'#3b82f6'}" text-anchor="end">${cat?.name||''} · ${pct}%</text>
            </g>`;
          }).join('')}
        </g>`:'';

      return `<g onclick="toggleMapSlot('${slotId}','${goals.map(g=>g.id).join(',')}')" style="cursor:pointer">
        <circle cx="${x}" cy="${y}" r="22" fill="${qt.bg}" stroke="${qt.pathC}" stroke-width="2" opacity="0.9"/>
        <circle cx="${x}" cy="${y}" r="16" fill="${qt.pathC}" opacity="0.2"/>
        <text x="${x}" y="${y+6}" text-anchor="middle" font-size="15">⚓</text>
        ${goals.length>1?'<circle cx="'+(x+14)+'" cy="'+(y-14)+'" r="7" fill="#ef4444"/><text x="'+(x+14)+'" y="'+(y-10)+'" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">'+goals.length+'</text>':''}
        ${codes}
        ${popup}
      </g>`;
    }).join('');
  }

  const svgPaths=QT.map((qt,qi)=>{
    const ltr=qi%2===0;
    const y=40+qi*ROW+ROW/2;
    const x0=ltr?PAD:W-PAD;
    const x1=ltr?W-PAD:PAD;
    // Week dots
    const dots=Array.from({length:12},(_,i)=>{
      const{x,y:dy}=dotPos(qi,i+1);
      const hasGoal=S.goals.some(g=>g.q===qt.id&&g.dlWk===i+1);
      return hasGoal?'':`<circle cx="${x}" cy="${dy}" r="${DOT_R}" fill="${qt.bg}" stroke="${qt.pathC}" stroke-width="2"/>
        <text x="${x}" y="${dy+DOT_R+12}" text-anchor="middle" font-size="9" fill="${qt.label}" font-weight="500">W${i+1}</text>`;
    }).join('');
    // Connector curve to next row
    let connector='';
    if(qi<QT.length-1){
      const nextQt=QT[qi+1];const nextY=40+(qi+1)*ROW+ROW/2;
      connector=`<path d="M ${x1} ${y} C ${x1+(ltr?60:-60)} ${y}, ${x1+(ltr?60:-60)} ${nextY}, ${x1} ${nextY}" stroke="${qt.pathC}" stroke-width="2.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>`;
    }
    return `
      <!-- Q${qi+1} background -->
      <rect x="0" y="${40+qi*ROW}" width="${W}" height="${ROW}" fill="${qt.bg}" opacity="0.85"/>
      <!-- Quarter label -->
      <text x="20" y="${40+qi*ROW+22}" font-size="11" font-weight="bold" fill="${qt.accent}">${qt.e} ${qt.id}: ${qt.name}</text>
      <text x="20" y="${40+qi*ROW+36}" font-size="9" fill="${qt.label}">${qt.months}</text>
      <!-- Path -->
      <path d="M ${x0} ${y} L ${x1} ${y}" stroke="${qt.pathC}" stroke-width="3" fill="none" stroke-linecap="round"/>
      ${connector}
      <!-- Week dots -->
      ${dots}
    `;
  }).join('');

  const svgContent=`<svg id="atlas-map-svg" viewBox="0 0 ${W} ${totalH}" style="width:100%;display:block;border-radius:12px;background:#07111e" preserveAspectRatio="xMidYMid meet">
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <!-- Starfield -->
    ${Array.from({length:40},(_,i)=>`<circle cx="${(i*137)%W}" cy="${(i*97)%(totalH)}" r="${i%3===0?1.5:0.8}" fill="white" opacity="${0.1+i%4*0.06}"/>`).join('')}
    ${svgPaths}
    ${goalMarkers()}
    <!-- Start label -->
    <text x="${PAD-10}" y="35" font-size="10" fill="#60a5fa" font-weight="bold">START</text>
    <!-- End label -->
    <text x="${QT.length%2===0?PAD-10:W-PAD-10}" y="${totalH-5}" font-size="10" fill="#fbbf24" font-weight="bold" text-anchor="${QT.length%2===0?'start':'end'}">DESTINATION 🏁</text>
  </svg>`;

  const legend=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;font-size:11px;color:var(--txt2)">
    <span><span style="font-size:14px">⚓</span> = Goal (click to see details)</span>
    ${QT.map(q=>`<span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${q.pathC};vertical-align:middle;margin-right:3px"></span>${q.id}: ${q.name}</span>`).join('')}
  </div>`;

  const noGoals=S.goals.length===0?`<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#475569"><div style="font-size:24px;margin-bottom:8px">🗺</div><div style="font-size:13px">No goals yet — add goals in Yearly Goals to see them on the map</div></div>`:'';

  return `<div class="sh"><div><h2>My Atlas Map 🗺</h2><p>Your year at a glance — all goals plotted across the four quarters</p></div></div>
    <div style="border-radius:12px;border:1px solid #1e3a5f;position:relative;overflow:hidden">
      ${svgContent}
      ${noGoals}
    </div>
    ${legend}
    <div style="margin-top:10px;font-size:11px;color:var(--txt3)">Click any ⚓ anchor to see goal details. Hit "View in Quarterly Breakdown" inside the popup to navigate there directly.</div>`;
}

function exportData(){
  const data={
    vault:S.vault,cfd:S.cfd,whc:S.whc,

    sq:S.sq,anchors:S.anchors,user:S.user,

    lastDate:S.lastDate,loopTasks:S.loopTasks,
    dark:S.dark,_exported:new Date().toISOString()
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='atlas-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);

function importData(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.goals||!data.tasks)throw new Error('Invalid ATLAS backup file');
      if(!confirm('This will replace all your current ATLAS data with the backup. Are you sure?'))return;
      localStorage.setItem('atlas_v2',JSON.stringify(data));
      location.reload();
    }catch(err){
      alert('Could not import: '+err.message+'\nMake sure you are using a valid ATLAS backup file.');
    }
  };
  reader.readAsText(file);
}
function clearAllData(){
  if(!confirm('This will permanently delete all your ATLAS data and reset to the sample data. Are you sure?'))return;
  localStorage.removeItem('atlas_v2');
  location.reload();
}

function checkDayRollover(){
  const todayStr=new Date().toDateString();
  if(S.lastDate===todayStr)return; // same day, nothing to do
  if(S.lastDate){ // not first ever visit
    S.tasks.forEach(function(t){
      if(t.isChildTask)return; // skip embedded mini-tasks
      if(t.status==='Completed')return; // already done
      if(t.status==='Still Open')return; // already in OQ
      if(t.removedFromToday)return; // already in OQ via Remove
      // Check if this task was for a previous day
      const tdays=Array.isArray(t.days)?t.days:(t.day?[t.day]:[]);
      const wasForYesterday=tdays.length>0&&!tdays.includes(TODAY_NAME);
      if(wasForYesterday){
        t.status='Still Open';
        t.rolledOver=true;
        t.rolledDate=S.lastDate;
      }
    });
    // End-of-week milestone rollover: if yesterday was Sunday, mark all non-completed
    // milestones in the current week as Still Open so they surface in Week at a Glance
    const prevDate=new Date(S.lastDate);
    if(prevDate.getDay()===0){ // 0 = Sunday
      S.ms.forEach(function(m){
        if(m.status==='Completed')return;
        if(m.status==='Still Open')return;
        const{q:cq,w:cw}=getQW();
        const wasFocusWeek=(m.fwks||[{q:m.fq,w:m.fwk}]).some(fw=>fw.q===cq&&fw.w===cw);
        if(wasFocusWeek){
          m.status='Still Open';
          m.rolledOver=true;
          m.rolledDate=S.lastDate;
        }
      });
    }
  }
  S.lastDate=todayStr;
  save();
}

function openVoiceCapture(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    openModal('<div class="modal-hdr"><strong>Voice not available</strong><button class="x-btn" onclick="closeModal()">×</button></div>'
      +'<div style="font-size:13px;color:var(--txt);margin-bottom:16px;line-height:1.6">Voice input isn\'t supported in this browser. Try Chrome on desktop or Safari on iOS.</div>'
      +'<div style="display:flex;justify-content:flex-end"><button class="btn-p" onclick="closeModal()">Got it</button></div>');
    return;
  }

  // Request mic permission first so browser shows its own prompt
  // This ensures the user gets a proper allow/deny dialog
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    _startVoiceUI(stream, SpeechRecognition);
  }).catch(function(err){
    // Permission denied or no mic
    openModal('<div class="modal-hdr"><strong>Microphone access needed</strong><button class="x-btn" onclick="closeModal()">×</button></div>'
      +'<div style="font-size:13px;color:var(--txt);line-height:1.65;margin-bottom:16px">ATLAS needs microphone access to record your tasks. Here\'s how to allow it:<br><br>'
      +'<strong>Chrome:</strong> Click the 🔒 or 🎙️ icon in your address bar → Allow<br>'
      +'<strong>Safari:</strong> Go to Settings → Safari → Microphone → Allow<br><br>'
      +'Once allowed, tap the mic button again.</div>'
      +'<div style="display:flex;justify-content:flex-end"><button class="btn-p" onclick="closeModal()">OK</button></div>');
  });

      if(ph&&full)ph.remove();
      el.childNodes[el.childNodes.length-1]&&el.childNodes[el.childNodes.length-1].nodeType===3?
        el.childNodes[el.childNodes.length-1].textContent=full:
        (el.innerHTML='',el.textContent=full);
    }
  };

  window._voiceRec.onerror=function(e){
    if(e.error==='not-allowed'){
      const t=document.getElementById('vc-title');
      const h=document.getElementById('vc-hint');
      if(t)t.textContent='Microphone blocked';
      if(h)h.textContent='Allow microphone access in your browser settings and try again.';
      vcStopBars();
    }
  };

  // Auto-restart speech recognition if it stops (browser timeout)
  // Also reveals transcript editor when stopped
  window._voiceRec.onend=function(){
    if(window._vcState==='recording'){
      try{window._voiceRec.start();}catch(ex){}
    } else if(window._vcState==='stopped'){
      // All results are now final — safe to reveal editable transcript
      vcRevealTranscript();
    }
  };

  window._voiceRec.start();

  // Stream kept alive for mic icon, no MediaRecorder needed
  window._vcStream=stream;
}

function vcStopBars(){
  const bars=document.getElementById('vc-bars');
  const ring=document.getElementById('vc-ring');
  if(bars)bars.style.animation='none',bars.querySelectorAll('.vc-bar').forEach(b=>{b.style.animation='none';b.style.height='4px';});

function vcTogglePause(){
  const pauseBtn=document.getElementById('vc-pause-btn');
  const pauseIcon=document.getElementById('vc-pause-icon');
  const pauseLabel=document.getElementById('vc-pause-label');
  const title=document.getElementById('vc-title');

  if(window._vcState==='recording'){
    // Pause
    window._vcState='paused';
    try{window._voiceRec.stop();}catch(e){}
    if(window._vcMediaRec&&window._vcMediaRec.state==='recording')window._vcMediaRec.pause();
    vcStopBars();
    if(pauseIcon)pauseIcon.textContent='▶';
    if(pauseLabel)pauseLabel.textContent='Resume';
    if(title)title.textContent='Paused';
    const mic=document.getElementById('vc-mic-icon');
    if(mic)mic.textContent='⏸';
  } else if(window._vcState==='paused'){
    // Resume
    window._vcState='recording';
    try{window._voiceRec.start();}catch(e){}
    if(window._vcMediaRec&&window._vcMediaRec.state==='paused')window._vcMediaRec.resume();
    // Restart bar animations
    const bars=document.getElementById('vc-bars');
    const ring=document.getElementById('vc-ring');
    if(bars)bars.querySelectorAll('.vc-bar').forEach((b,i)=>{b.style.animation='vcBar 0.8s ease-in-out infinite';b.style.animationDelay=(i*0.15)+'s';b.style.height='';});
    if(ring)ring.style.animation='vcPulse 1.2s ease-in-out infinite';
    if(pauseIcon)pauseIcon.textContent='⏸';
    if(pauseLabel)pauseLabel.textContent='Pause';
    if(title)title.textContent='Listening…';
    const mic=document.getElementById('vc-mic-icon');
    if(mic)mic.textContent='🎙️';
  }
}

function vcRevealTranscript(){
  if(window._vcRevealed)return;
  window._vcRevealed=true;
  const transcriptEl=document.getElementById('vc-transcript');
  const editTA=document.getElementById('vc-edit');
  const editHint=document.getElementById('vc-edit-hint');
  const doneBtn=document.getElementById('vc-done-btn');
  const hintEl=document.getElementById('vc-hint');
  // Include any interim text that was mid-flight
  const full=(window._voiceTranscript+(window._vcInterim?' '+window._vcInterim:'')).trim();
  if(full)window._voiceTranscript=full;
  window._vcInterim='';
  if(transcriptEl)transcriptEl.style.display='none';
  if(full){
    if(editTA){editTA.value=full;editTA.style.display='block';}
    if(editHint)editHint.style.display='block';
    if(doneBtn)doneBtn.style.display='flex';
    if(hintEl)hintEl.textContent='';
  } else {
    if(hintEl)hintEl.textContent='Nothing was captured — close and try again.';
  }
}
function vcStop(){
  window._vcState='stopped';
  try{window._voiceRec.stop();}catch(e){}
  if(window._vcStream){window._vcStream.getTracks().forEach(t=>t.stop());}
  vcStopBars();
  const title=document.getElementById('vc-title');
  const mic=document.getElementById('vc-mic-icon');
  const ring=document.getElementById('vc-ring');
  const pauseBtn=document.getElementById('vc-pause-btn');
  const stopBtn=document.getElementById('vc-stop-btn');
  if(title)title.textContent='Done — check your transcript';
  if(mic)mic.textContent='✓';
  if(ring){ring.style.animation='none';ring.style.background='#22c55e22';ring.style.borderColor='#22c55e66';}
  const micWrap=document.querySelector('#vc-pulse-wrap > div:last-child');
  if(micWrap)micWrap.style.background='#22c55e';
  if(pauseBtn)pauseBtn.disabled=true;
  if(stopBtn)stopBtn.disabled=true;
  // Give speech recognition 400ms to emit final results, then reveal.
  // vcRevealTranscript checks for already-revealed to prevent double-call.
  window._vcRevealed=false;
  setTimeout(function(){
    if(window._vcState==='stopped'&&!window._vcRevealed){vcRevealTranscript();}
  },400);
}

async function processVoiceTasks(){
  // Read from editable textarea if visible, otherwise fall back to raw transcript
  const editTA=document.getElementById('vc-edit');
  const transcript=(editTA&&editTA.style.display!=='none'?editTA.value:window._voiceTranscript).trim();
  if(!transcript)return;
  const done=document.getElementById('vc-done-btn');
  if(done)done.disabled=true;

  // ── Smart client-side voice parser ─────────────────────────────────────────
  function splitIntoTasks(text){
    return text
      .replace(/\bfirst(ly)?\b/gi,'|')
      .replace(/\bsecond(ly)?\b/gi,'|')
      .replace(/\bthird(ly)?\b/gi,'|')
      .replace(/\bnext\b/gi,'|')
      .replace(/\bthen\b/gi,'|')
      .replace(/\band also\b/gi,'|')
      .replace(/\balso\b/gi,'|')
      .replace(/\band\b/gi,'|')
      .replace(/[.;!\n]/g,'|')
      .split('|')
      .map(s=>s.trim())
      .filter(s=>s.length>4);
  }

  function guessCategory(text){
    const t=text.toLowerCase();
    if(/career|job|work|meeting|boss|colleague|promotion|salary|cv|resume|linkedin|client|project|presentation|report|intern|apply/.test(t))return'CAR';
    if(/business|product|launch|startup|market|customer|revenue|sales|pitch|brand|website|app|partner/.test(t))return'BUS';
    if(/study|learn|course|read|book|exam|class|school|university|research|training/.test(t))return'EDU';
    if(/invest|save|budget|money|bank|tax|insurance|finance|spend|payment|bill/.test(t))return'FIN';
    if(/gym|run|workout|exercise|health|doctor|diet|sleep|walk|meditate|weight/.test(t))return'HLT';
    if(/write|design|draw|paint|music|create|blog|photo|video|art|creative|scripture/.test(t))return'CRT';
    if(/family|home|house|clean|cook|shop|kids|parents|chores|errands|social/.test(t))return'HOM';
    return CATS[0]?.id||'CAR';
  }

  function guessWH(text){
    const t=text.toLowerCase();
    if(/morning|sunrise|early|6am|7am|8am|9am/.test(t))return'Sunrise';
    if(/afternoon|midday|lunch|12pm|1pm|2pm|3pm/.test(t))return'Midday';
    if(/evening|sunset|night|after work|6pm|7pm|8pm/.test(t))return'Sunset';
    const h=new Date().getHours();
    if(h<12)return'Sunrise';
    if(h<17)return'Midday';
    return'Sunset';
  }

  function guessDur(text){
    const t=text.toLowerCase();
    if(/quick|brief|short|5 min|10 min/.test(t))return'15 min';
    if(/hour|long|deep|full|big|all day/.test(t))return'1 hour';
    if(/review|write|prepare|create|build|design|analyse|analyze/.test(t))return'45 min';
    return'25 min';
  }

  function guessDay(text){
    const t=text.toLowerCase();
    for(const d of DAYS){if(t.includes(d.toLowerCase()))return d;}
    if(/tomorrow/.test(t)){const idx=DAYS.indexOf(TODAY_NAME);return DAYS[(idx+1)%7];}
    return TODAY_NAME;
  }

  function guessGoal(text){
    const t=text.toLowerCase();
    for(const g of S.goals){
      const words=g.title.toLowerCase().split(/\s+/).filter(w=>w.length>4);
      if(words.some(w=>t.includes(w)))return g.id;
    }
    return null;
  }

  // Clean to a crisp one-liner — strip filler openers, time words, cap at 60 chars
  function cleanTitle(text){
    let t=text
      .replace(/^(so\s+)?(i\s+)?(think\s+)?(i\s+)?(need to|want to|have to|should|must|am going to|will|can|could|would like to|would love to|plan to|intend to|got to|gotta)\s+/i,'')
      .replace(/^(remind me to|don'?t forget to|make sure to|remember to)\s+/i,'')
      .replace(/\b(today|tomorrow|this morning|tonight|later|soon|right now|at some point)\b/gi,'')
      .replace(/\b(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/gi,'')
      .replace(/\b(morning|afternoon|evening|sunrise|midday|sunset)\b/gi,'')
      .replace(/\s{2,}/g,' ')
      .trim();
    // Cap to 60 chars at a word boundary
    if(t.length>60){
      t=t.slice(0,60).replace(/\s+\S*$/,'').trim();
    }
    // Capitalise first letter
    return t.replace(/^./,s=>s.toUpperCase());
  }

  const chunks=splitIntoTasks(transcript);
  if(!chunks.length){
    if(done){done.disabled=false;}
    closeVoiceOverlay();
    return;
  }

  const tasks=chunks.map(chunk=>({
    title:cleanTitle(chunk),
    cat:guessCategory(chunk),
    wh:guessWH(chunk),
    dur:guessDur(chunk),
    day:guessDay(chunk),
    gid:guessGoal(chunk)
  })).filter(t=>t.title.length>2);

  closeVoiceOverlay();
  tasks.forEach(function(t){
    S.tasks.push({
      id:'mt'+uid(),cat:t.cat,title:t.title,
      days:[t.day],day:t.day,
      wh:t.wh,dur:t.dur,
      gid:t.gid||null,status:'Not Started',
      fromAddTask:true,fromVoice:true
    });
  });
  save();

  const msg=document.createElement('div');
  msg.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3)';
  msg.textContent='✓ '+tasks.length+' task'+(tasks.length!==1?'s':'')+' added — expand any card to edit details';
  document.body.appendChild(msg);
  setTimeout(function(){msg.remove();},4000);
  S.view='today';render();
}

async function atlasPushToSupabase(){
  if(!_sb||!_atlasUser)return;
  try{
    const now=new Date().toISOString();
    await _sb.from('user_data').upsert({
      user_id:_atlasUser.id,
      data:_getStateSnapshot(),
      updated_at:now
    },{onConflict:'user_id'});
    localStorage.setItem('atlas_v2_updated_at',now);
  }catch(e){console.warn('ATLAS push failed:',e);}
}

async function atlasPullFromSupabase(){
  if(!_sb||!_atlasUser)return false;
  try{
    const{data,error}=await _sb.from('user_data')
      .select('data,updated_at').eq('user_id',_atlasUser.id).single();
    if(error&&error.code==='PGRST116'){
      // No remote row yet — first time, push local data up
      await atlasPushToSupabase();
      return false;
    }
    if(error||!data)return false;
    const remoteTs=new Date(data.updated_at||0).getTime();
    const localTs=new Date(localStorage.getItem('atlas_v2_updated_at')||0).getTime();
    if(remoteTs>localTs){
      // Remote is strictly newer — apply it
      _applyRemoteState(data.data||{});
      localStorage.setItem('atlas_v2_updated_at',data.updated_at);
      return true;
    }
    if(localTs>remoteTs){
      // Local is strictly newer — push up
      await atlasPushToSupabase();
    }
    // Equal timestamps — do nothing
    return false;
  }catch(e){console.warn('ATLAS pull failed:',e);return false;}
}

async function atlasAuthInit(){
  try{_sb=window.supabase?.createClient(_SB_URL,_SB_ANON);}

  // Handle magic link token in URL hash
  const hash=window.location.hash;
  if(hash&&hash.includes('access_token')){
    try{
      const params=new URLSearchParams(hash.replace(/^#/,''));
      const at=params.get('access_token');
      const rt=params.get('refresh_token');
      if(at&&rt){
        await _sb.auth.setSession({access_token:at,refresh_token:rt});
        localStorage.removeItem('atlas_v2_updated_at');
      }
    }catch(e){console.warn('Hash token parse failed:',e);}
    window.history.replaceState(null,'',window.location.pathname);
  }

  // Get current session and sync
  const{data:{session}}=await _sb.auth.getSession();
  if(session?.user){
    _atlasUser=session.user;
    const navTop=document.getElementById('nav-top');
    if(navTop)navTop.innerHTML=navHtml();

    // Start live sync now that we're authenticated
    atlasStartLiveSync();
  } else {
    setTimeout(()=>{if(!_atlasUser)showAuthModal();},4000);
  }

  // Listen for future auth changes
  _sb.auth.onAuthStateChange(async(event,newSession)=>{
    if(event==='SIGNED_OUT'){
      _atlasUser=null;
      atlasStopLiveSync();
      const navTop=document.getElementById('nav-top');
      if(navTop)navTop.innerHTML=navHtml();
    } else if(event==='SIGNED_IN'&&newSession?.user){
      _atlasUser=newSession.user;
      const navTop=document.getElementById('nav-top');
      if(navTop)navTop.innerHTML=navHtml();
      const pulled=await atlasPullFromSupabase();
      if(pulled)render();
      atlasStartLiveSync();
    }
  });
}

// ── LIVE SYNC (realtime + polling fallback) ───────────────────────────────────
let _realtimeChannel=null;
let _pollInterval=null;

function atlasStartLiveSync(){
  atlasStopLiveSync(); // clear any existing

  // 1. Supabase Realtime — instant push when another device saves
  try{
    _realtimeChannel=_sb.channel('user_data_changes')
      .on('postgres_changes',{
        event:'UPDATE',
        schema:'public',
        table:'user_data',
        filter:'user_id=eq.'+_atlasUser.id
      },async(payload)=>{
        const remoteTs=new Date(payload.new?.updated_at||0).getTime();
        const localTs=new Date(localStorage.getItem('atlas_v2_updated_at')||0).getTime();
        // Only apply if remote is newer than what we have locally
        if(remoteTs>localTs&&payload.new?.data){
          _applyRemoteState(payload.new.data);
          localStorage.setItem('atlas_v2_updated_at',payload.new.updated_at);
          render();
        }
      })
      .subscribe();
  }catch(e){console.warn('Realtime subscription failed:',e);}

  // 2. Poll every 30s as fallback (handles cases where realtime isn't available)
  _pollInterval=setInterval(async()=>{
    if(!_atlasUser)return;
    const pulled=await atlasPullFromSupabase();
    if(pulled)render();
  },30000);
}

function atlasStopLiveSync(){
  if(_realtimeChannel){try{_sb.removeChannel(_realtimeChannel);}catch(e){}  _realtimeChannel=null;}
  if(_pollInterval){clearInterval(_pollInterval);_pollInterval=null;}
}
