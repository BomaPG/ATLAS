<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ATLAS v2.0 — Balance. Structure. Progress.</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#c9a84c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ATLAS">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
:root{--bg:#f8fafc;--surf:#fff;--surf2:#f8fafc;--surf3:#f1f5f9;--brd:#e2e8f0;--txt:#1e293b;--txt2:#64748b;--txt3:#94a3b8;--nav:#fff;--hdr:#fff;--inp:#fff;--shadow:rgba(0,0,0,.06)}
[data-theme=dark]{--bg:#0b1120;--surf:#162032;--surf2:#0f172a;--surf3:#1e293b;--brd:#2d3f55;--txt:#f1f5f9;--txt2:#94a3b8;--txt3:#475569;--nav:#162032;--hdr:#162032;--inp:#1e293b;--shadow:rgba(0,0,0,.3)}
*{box-sizing:border-box;margin:0;padding:0;transition:background .15s,border-color .15s,color .15s}
body{font-family:Inter,-apple-system,sans-serif;font-size:13px;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}

/* ── HEADER ── */
.hdr{background:var(--hdr);border-bottom:1px solid var(--brd);padding:0 16px;display:flex;align-items:center;height:48px;gap:10px;flex-shrink:0;z-index:150}
.hdr-burger{display:none;background:none;border:none;cursor:pointer;font-size:20px;color:var(--txt2);padding:4px;line-height:1}

/* ── LAYOUT ── */
.body{display:flex;flex:1;overflow:hidden;position:relative}

/* ── NAV SIDEBAR ── */
.hide-xs{display:inline}.show-xs{display:none}
.nav{width:212px;background:var(--nav);border-right:1px solid var(--brd);padding:10px 0;flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column;z-index:120}
.nav-top{flex:1}
.nav-bottom{padding:8px 0 4px;flex-shrink:0}
.nav-sec{font-size:10px;font-weight:600;color:var(--txt3);padding:10px 16px 3px;letter-spacing:.7px;text-transform:uppercase}
.nav-btn{width:100%;padding:9px 16px;border:none;cursor:pointer;text-align:left;font-size:13px;background:transparent;color:var(--txt2);display:block}
.nav-btn:hover{background:var(--surf2)}
.nav-btn.active{background:var(--surf2);color:var(--txt);font-weight:600}

/* Mobile nav overlay backdrop */
.nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:110}
.nav-overlay.open{display:block}

/* ── MAIN ── */
.main{flex:1;padding:24px;overflow-y:auto;overflow-x:hidden}

/* ── COMMON COMPONENTS ── */
.sh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.sh h2{font-size:17px;font-weight:600}
.sh p{font-size:12px;color:var(--txt2);margin-top:3px}
.btn-p{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:var(--txt);color:var(--surf)}
.btn-g{padding:6px 12px;border-radius:8px;border:1px solid var(--brd);cursor:pointer;font-size:13px;background:transparent;color:var(--txt2)}
.btn-g:hover{background:var(--surf2)}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:14px}
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--surf2);color:var(--txt2)}
.pill-red{display:inline-flex;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.pill-blue{display:inline-flex;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.tag-blue{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;white-space:nowrap}
.tag-red{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;white-space:nowrap}
.warn-box{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;font-size:12px;color:#b91c1c;margin-bottom:10px}
.info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px 12px;font-size:12px;color:#1d4ed8;margin-bottom:10px}
.fl{display:block;font-size:10px;font-weight:600;color:var(--txt2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;margin-bottom:10px;padding:9px 10px;font-size:14px;border:1px solid var(--brd);border-radius:8px;outline:none;background:var(--inp);color:var(--txt);-webkit-appearance:none;appearance:none;box-sizing:border-box}
input[type="date"].fi,input[type="time"].fi{-webkit-appearance:none;appearance:none;min-height:40px;cursor:pointer}
.fi:focus{border-color:#64748b}
.row2{display:flex;gap:10px}.row2>div{flex:1;min-width:0}
.hp{position:relative;display:inline-block;vertical-align:middle}
.hp .hp-pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;cursor:default;user-select:none;display:inline-flex;align-items:center}
.hp .hp-tip{display:none;position:absolute;top:calc(100% + 6px);left:0;background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:9px 11px;font-size:12px;z-index:200;box-shadow:0 4px 14px var(--shadow);min-width:160px;white-space:nowrap;color:var(--txt)}
.hp:hover .hp-tip,.hp.open .hp-tip{display:block}
.hp .hp-tip{max-width:260px;white-space:nowrap}
.hp .hp-tip.cal{width:244px;white-space:normal}
.cal-q{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;margin-top:8px}
.cal-q:first-child{margin-top:0}
.cal-weeks{display:flex;gap:3px;flex-wrap:wrap}
.wk-c{width:28px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;background:var(--surf2);color:var(--txt3)}
.wk-c.on{background:#dbeafe;color:#1d4ed8;font-weight:500}
.wk-c.dl{background:#fee2e2;color:#b91c1c;font-weight:600}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-start;justify-content:center;padding:16px;padding-top:40px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--surf);border-radius:16px;padding:20px;width:100%;max-width:440px;box-shadow:0 20px 40px var(--shadow)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-hdr strong{font-size:14px;color:var(--txt)}
.x-btn{background:none;border:none;cursor:pointer;font-size:22px;color:var(--txt3);line-height:1;padding:4px}
.tab-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:5px 10px;border-radius:20px;border:1px solid var(--brd);cursor:pointer;font-size:11px;font-weight:500;background:transparent;color:var(--txt2)}
.tab.active{background:var(--txt);color:var(--surf);border-color:var(--txt)}
.fd-tbl{width:100%;border-collapse:collapse;font-size:12px}
.fd-tbl th{padding:7px 10px;text-align:left;font-size:11px;font-weight:500;color:var(--txt2);border-bottom:1px solid var(--brd)}
.fd-tbl td{padding:4px 8px;border-bottom:1px solid var(--surf2)}
.q-month-hdr{padding:7px;background:var(--txt);color:var(--surf);font-size:12px;font-weight:600;text-align:center}
.q-wk-hdr{padding:4px;background:var(--surf2);border-bottom:1px solid var(--brd);font-size:10px;font-weight:700;color:var(--txt3);text-align:center}
.ms-chip{border-radius:6px;padding:5px 7px;cursor:pointer;border:1px solid;margin-bottom:3px;font-size:10px;font-weight:600;text-align:left;width:100%;line-height:1.3;display:block}
.eq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.edit-btn{background:none;border:1px solid var(--brd);border-radius:5px;cursor:pointer;font-size:12px;color:var(--txt3);padding:3px 7px;margin-left:4px}
.edit-btn:hover{background:var(--surf2);color:var(--txt2)}
.tour-box{position:fixed;bottom:16px;right:16px;width:280px;background:var(--txt);border-radius:12px;padding:16px;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.25);display:none}
/* WELCOME */
.w-hero{border-radius:16px;padding:48px 40px;margin-bottom:24px;background:linear-gradient(145deg,#0a1628 0%,#0d1f3c 50%,#081420 100%);position:relative;overflow:hidden;text-align:center}
.w-atlas-title{font-size:64px;font-weight:800;letter-spacing:-2px;color:#c9a84c;margin-bottom:8px;text-shadow:0 2px 20px rgba(201,168,76,.3)}
.w-tagline{font-size:13px;letter-spacing:4px;text-transform:uppercase;color:#7fa8d4;margin-bottom:20px;font-weight:500}
.w-desc{font-size:17px;color:#e2e8f0;line-height:1.7;max-width:560px;margin:0 auto 28px}
.w-start-btn{padding:12px 32px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:700;background:#c9a84c;color:#0a1628;letter-spacing:.5px}
.w-start-btn:hover{background:#d4b55e}
.persona-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px}
.persona-card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:16px;text-align:center}
.persona-icon{font-size:28px;margin-bottom:10px}
.persona-name{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:6px}
.persona-desc{font-size:12px;color:var(--txt2);line-height:1.5}
.step-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.step-row{display:flex;gap:14px;align-items:flex-start;background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:14px 16px}
.step-num{width:30px;height:30px;border-radius:50%;background:#0d1f3c;color:#c9a84c;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.step-title{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:4px}
.step-body{font-size:12px;color:var(--txt2);line-height:1.6}
.anchor-row{display:flex;gap:10px;margin-top:10px}
.anchor-card{flex:1;border-radius:8px;padding:10px 12px;border-left:3px solid}
.artefact-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.artefact-item{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:12px 14px}
.artefact-name{font-size:12px;font-weight:700;color:var(--txt);margin-bottom:4px}
.artefact-def{font-size:11px;color:var(--txt2);line-height:1.5}
/* THEME TOGGLE */
.theme-toggle{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;width:100%;border:none;background:transparent;color:var(--txt2);font-size:13px}
.theme-toggle:hover{background:var(--surf2)}
.toggle-track{width:36px;height:20px;border-radius:20px;background:var(--brd);position:relative;transition:background .2s;flex-shrink:0}
.toggle-thumb{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
[data-theme=dark] .toggle-track{background:#3b82f6}
[data-theme=dark] .toggle-thumb{transform:translateX(16px)}

/* ── MOBILE STYLES (≤ 680px) ─────────────────────────────────────────── */
@media(max-width:680px){
  .hdr-burger{display:block}
  .nav{position:fixed;top:48px;left:-212px;height:calc(100vh - 48px);transition:left .25s ease;z-index:120;border-right:1px solid var(--brd)}
  .nav.open{left:0}
  .main{padding:14px}
  .sh h2{font-size:15px}
  .sh{margin-bottom:14px}
  .btn-p,.btn-g{padding:8px 12px;font-size:13px}
  .row2{flex-direction:column;gap:0}
  .w-hero{padding:32px 20px}
  .w-atlas-title{font-size:44px}
  .w-desc{font-size:15px}
  .persona-grid{grid-template-columns:1fr}
  .anchor-row{flex-direction:column}
  .artefact-grid{grid-template-columns:1fr}
  .feat-row{flex-direction:column!important;padding:28px 20px!important}
  .feat-row .feat-txt{padding-right:0!important;padding-left:0!important;margin-bottom:20px}
  .feat-row .feat-mock{justify-content:flex-start!important;max-width:100%!important}
  .eq-grid{grid-template-columns:1fr}
  /* Quarter grid: stack months vertically on mobile */
  .q-scroll{overflow-x:hidden}
  .q-month-col{flex-direction:column!important;width:100%!important}
  .q-month-col>div{width:100%!important}
  .q-month-row{display:block!important;margin-bottom:10px;border:1px solid var(--brd);border-radius:10px;overflow:hidden}
  .q-wk-row{display:flex!important;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .q-wk-cell{min-width:80px!important;flex:0 0 80px!important}
  .fd-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .modal-bg{padding:12px;padding-top:24px}
  .modal{padding:16px;border-radius:12px}
  .tour-box{left:12px;right:12px;width:auto;bottom:12px}
  /* hp-tip: on mobile show on tap not hover */
  .hp .hp-tip{white-space:normal;max-width:85vw}
  [style*="padding:40px 32px"]{padding:24px 16px!important}
  [style*="padding:48px"]{padding:28px 16px!important}
  [style*="padding:72px 48px"]{padding:40px 20px!important}
  /* Kanban views stack vertically on mobile */
  .wk-kanban{flex-direction:column!important}
  .wk-kanban>div{min-width:100%!important;flex:unset!important}
  /* FAB moves up on mobile so it doesn't overlap bottom bar */
  #fab-add{bottom:80px!important}
  #fab-menu{bottom:140px!important}
  /* View pills: show icon only on small screens */
  .hide-xs{display:none}
  .show-xs{display:inline}
}
</style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div class="app">
  <header class="hdr">
    <button class="hdr-burger" onclick="toggleNav()" id="burger-btn">☰</button>
    <span style="font-size:15px;font-weight:700">⚓ ATLAS</span>
    <span style="font-size:11px;background:var(--surf2);color:var(--txt3);border-radius:20px;padding:2px 8px">v2.0</span>
    <span style="flex:1"></span>
    <button onclick="showOnboarding()" style="font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid #c9a84c44;cursor:pointer;background:#c9a84c18;color:#c9a84c;margin-right:4px;white-space:nowrap">⚙ Set up ATLAS</button>
    <button class="btn-g" style="font-size:11px;padding:3px 10px;border-radius:20px;white-space:nowrap" onclick="startTour()">Tour ATLAS</button>
  </header>
  <div class="nav-overlay" id="nav-overlay" onclick="closeNav()"></div>
  <div class="body">
    <nav class="nav" id="nav-menu">
      <div class="nav-top" id="nav-top"></div>
      <div class="nav-bottom">
        <button class="theme-toggle" onclick="toggleTheme()">
          <span id="theme-icon">🌙</span>
          <span id="theme-label">Dark mode</span>
          <span style="flex:1"></span>
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
        </button>
        <button onclick="exportData()" style="width:100%;padding:7px 16px;border:none;cursor:pointer;text-align:left;font-size:12px;background:transparent;color:var(--txt2);display:block">📤 Export my data</button>
        <label style="width:100%;padding:7px 16px;border:none;cursor:pointer;text-align:left;font-size:12px;background:transparent;color:var(--txt2);display:block">📥 Import data<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
        <button onclick="clearAllData()" style="width:100%;padding:7px 16px;border:none;cursor:pointer;text-align:left;font-size:12px;background:transparent;color:var(--txt3);display:block">🗑 Clear all my data</button>
      </div>
    </nav>
    <main class="main" id="main"></main>
  </div>
</div>
<!-- Floating Add Task button -->
<div id="fab-menu" style="display:none;position:fixed;bottom:84px;right:24px;z-index:501;display:none;flex-direction:column;gap:8px;align-items:flex-end">
  <button onclick="closeFabMenu();openVoiceCapture()" style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:24px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:var(--surf);color:var(--txt);box-shadow:0 4px 16px rgba(0,0,0,.25)">🎙️ Record</button>
  <button onclick="closeFabMenu();openAddTask()" style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:24px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:var(--surf);color:var(--txt);box-shadow:0 4px 16px rgba(0,0,0,.25)">✏️ Type</button>
</div>
<div id="fab-overlay" onclick="closeFabMenu()" style="display:none;position:fixed;inset:0;z-index:499;background:rgba(0,0,0,.35)"></div>
<button id="fab-add" onclick="toggleFabMenu()" title="Add task" style="position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;background:#c9a84c;color:#07111e;font-size:26px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(201,168,76,.45);z-index:502;line-height:1;transition:transform .15s,box-shadow .15s">+</button>
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner"></div>
</div>
<div class="tour-box" id="tour-box">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">
    <div id="t-title" style="font-size:13px;font-weight:600;color:#f1f5f9;flex:1;padding-right:8px"></div>
    <button onclick="tourStep=-1;document.getElementById('tour-box').style.display='none'" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:16px;line-height:1;padding:0;flex-shrink:0" title="Close tour">×</button>
  </div>
  <div id="t-body" style="font-size:12px;color:#94a3b8;line-height:1.6;margin-bottom:12px"></div>
  <div style="display:flex;gap:7px;align-items:center">
    <span id="t-step" style="font-size:11px;color:#64748b;flex:1"></span>
    <button id="t-back" onclick="tourBack()" style="font-size:11px;padding:4px 9px;border-radius:7px;border:1px solid #475569;background:transparent;color:#94a3b8;cursor:pointer">← Back</button>
    <button id="t-next" onclick="tourNext()" style="font-size:11px;padding:5px 12px;border-radius:7px;border:none;font-weight:600;cursor:pointer;background:#3b82f6;color:#fff">Next →</button>
  </div>
</div>
<!-- Tour pill — shows when user navigates away mid-tour -->
<div id="tour-pill" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:900;border-radius:30px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);border:1px solid #1e3a5f">
  <span style="padding:10px 14px;background:#0d1f3c;font-size:11px;color:#94a3b8;display:inline-block">🧭 Tour in progress</span>
  <button onclick="tourContinue()" style="padding:10px 16px;background:#3b82f6;border:none;cursor:pointer;font-size:12px;font-weight:700;color:#fff">Continue →</button>
  <button onclick="tourStep=-1;document.getElementById('tour-pill').style.display='none'" style="padding:10px 14px;background:#ef4444;border:none;cursor:pointer;font-size:12px;font-weight:700;color:#fff">End</button>
</div>
<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const CATS_DEFAULTS=[{id:'CAR',name:'Career',c:'#3b82f6'},{id:'BUS',name:'Business',c:'#10b981'},{id:'EDU',name:'Education',c:'#8b5cf6'},{id:'FIN',name:'Finance',c:'#f59e0b'},{id:'HLT',name:'Health',c:'#22c55e'},{id:'CRT',name:'Creative',c:'#ef4444'},{id:'SOC',name:'Social Impact',c:'#a855f7'},{id:'DEV',name:'Personal Dev',c:'#f97316'},{id:'LIF',name:'Lifestyle',c:'#eab308'},{id:'FTH',name:'Faith',c:'#d97706'},{id:'HOM',name:'Home/Family',c:'#ec4899'},{id:'TRV',name:'Travel',c:'#06b6d4'}];
let CATS=[...CATS_DEFAULTS];
const CAT_PALETTE=['#6366f1','#ec4899','#14b8a6','#84cc16','#f43f5e','#0ea5e9','#a16207','#7c3aed','#0f766e','#b45309'];
function rebuildCATS(removals,custom){CATS=[...CATS_DEFAULTS.filter(c=>!(removals||[]).includes(c.id)),...(custom||[])];}
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const WHS=['Sunrise','Midday','Sunset'];
const WH_C={Sunrise:'#3b82f6',Midday:'#f59e0b',Sunset:'#8b5cf6'};
const WH_BG={Sunrise:'#eff6ff',Midday:'#fffbeb',Sunset:'#f5f3ff'};
const DURS=['15 min','20 min','25 min','30 min','45 min','1 hour','2 hours'];
const STATUS=['Not Started','In Progress','Still Open','Not Done','Half-done','Completed','Remove'];
const TODAY_STATUS=['Not Started','In Progress','Completed','Remove'];
// Today/week helpers

const ALL_MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_TO_Q={January:'Q1',February:'Q1',March:'Q1',April:'Q2',May:'Q2',June:'Q2',July:'Q3',August:'Q3',September:'Q3',October:'Q4',November:'Q4',December:'Q4'};
const MONTH_IDX_IN_Q={January:0,February:1,March:2,April:0,May:1,June:2,July:0,August:1,September:2,October:0,November:1,December:2};
function qwToMW(q,w){const months=(QS||[]).find(x=>x.id===q)?.months||['January','February','March'];const mi=Math.min(2,Math.floor((w-1)/4));const wim=((w-1)%4)+1;return{month:months[mi],wim};}
function mwToQW(month,wim){const q=MONTH_TO_Q[month]||'Q1';const mi=MONTH_IDX_IN_Q[month]||0;const w=mi*4+parseInt(wim);return{q,w};}
function displayMW(q,w){if(!q||!w)return'—';const{month,wim}=qwToMW(q,w);return month+' · W'+wim;}
function monthOpts(selMonth){return ALL_MONTHS.map(m=>'<option value="'+m+'"'+(m===selMonth?' selected':'')+'>'+m+'</option>').join('');}
function wimOpts(selWim){return[1,2,3,4].map(w=>'<option value="'+w+'"'+(w===parseInt(selWim)?' selected':'')+'>W'+w+'</option>').join('');}
function getQW(){const d=new Date();const m=d.getMonth();const qn=Math.floor(m/3)+1;const qs=new Date(d.getFullYear(),(qn-1)*3,1);return{q:'Q'+qn,w:Math.min(12,Math.floor((d-qs)/86400000/7)+1)};}
function bridge(gq,dlwk){const{q:sq,w:sw}=getQW();let q=parseInt(sq[1]),w=sw;const out=[];while(q<parseInt(gq[1])||(q===parseInt(gq[1])&&w<=dlwk)){out.push({q:'Q'+q,w});if(++w>12){w=1;q++;}if(q>4)break;}return out;}
function byQ(br){const g={};br.forEach(b=>{(g[b.q]=g[b.q]||[]).push(b.w);});return g;}
function catViol(cat,days){if(days.length>3)return'Max 3 focus days per category';for(const d of days){const n=Object.entries(S.cfd).filter(([c,ds])=>c!==cat&&ds.includes(d)).length;if(n>=4)return d+' already has 4 categories';}return null;}
function selOpts(arr,val){return arr.map(v=>'<option'+(v===val?' selected':'')+'>'+v+'</option>').join('');}

function wkDates(qid,wk){
  const yr=new Date().getFullYear();
  const qm={Q1:0,Q2:3,Q3:6,Q4:9}[qid]??0;
  const qStart=new Date(yr,qm,1);
  const dow=qStart.getDay();
  const toMon=dow===1?0:dow===0?1:(8-dow)%7||7;
  const firstMon=new Date(yr,qm,1+toMon);
  const wkStart=new Date(firstMon); wkStart.setDate(firstMon.getDate()+(wk-1)*7);
  const wkEnd=new Date(wkStart); wkEnd.setDate(wkStart.getDate()+5);
  const f=d=>String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
  return f(wkStart)+' – '+f(wkEnd);
}
function hpillDate(label,q,wk,c,bg,brd){
  const dates=wkDates(q,wk);
  const mwLabel=displayMW(q,wk);
  return '<div class="hp" style="display:inline-block"><span class="hp-pill" style="color:'+c+';background:'+bg+';border:1px solid '+brd+';font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;cursor:default">'+mwLabel+'</span><div class="hp-tip" style="min-width:120px;white-space:nowrap">📅 '+dates+'</div></div>';
}

function showTour(){
  const el=document.getElementById('tour-box');
  const pill=document.getElementById('tour-pill');
  if(tourStep<0){el.style.display='none';if(pill)pill.remove();return;}
  const t=TOUR[tourStep];
  document.getElementById('t-title').textContent=t.title;
  document.getElementById('t-body').textContent=t.body;
  document.getElementById('t-step').textContent=(tourStep+1)+'/'+TOUR.length;
  document.getElementById('t-back').style.display=tourStep>0?'':'none';
  const nb=document.getElementById('t-next');
  nb.textContent=tourStep<TOUR.length-1?'Next →':'Done ✓';
  nb.style.background=tourStep<TOUR.length-1?'#3b82f6':'#22c55e';
  // Show full box, remove pill if exists
  if(pill)pill.remove();
  el.style.display='block';
  S.view=t.v;render();
}
function collapseTourToPill(){
  // Called when user clicks something in the page during tour

  var pill=document.createElement('div');

function pill(label,c,bg,border){return '<span class="pill" style="'+(c?'color:'+c+';':'')+(bg?'background:'+bg+';':'')+(border?'border:1px solid '+border+';':'')+'">'+label+'</span>';}
function hpill(label,tip,c,bg,border){return '<div class="hp"><span class="hp-pill" style="'+(c?'color:'+c+';':'')+(bg?'background:'+bg+';':'')+(border?'border:1px solid '+border+';':'')+'">'+label+'</span><div class="hp-tip">'+tip+'</div></div>';}
function bridgeCalPill(br,dlQ,dlWk){
  const bq=byQ(br);const rel=QS.filter(q=>bq[q.id]||q.id===dlQ);
  let cal='<div style="font-size:10px;color:var(--txt2);margin-bottom:7px;font-weight:500;text-transform:uppercase;letter-spacing:.4px">Bridge weeks — today to deadline</div>';
  rel.forEach(q=>{const bwks=bq[q.id]||[];cal+='<div class="cal-q">'+q.id+'</div><div class="cal-weeks">';for(let w=1;w<=12;w++){const inB=bwks.includes(w);const isDL=q.id===dlQ&&w===dlWk;cal+='<div class="wk-c'+(isDL?' dl':inB?' on':'')+'">'+(isDL||inB?'W'+w:'W'+w)+'</div>';}cal+='</div>';});
  cal+='<div style="display:flex;gap:10px;margin-top:7px;font-size:10px;color:var(--txt3)"><span><i style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#dbeafe;margin-right:3px;vertical-align:middle"></i>bridge</span><span><i style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#fee2e2;margin-right:3px;vertical-align:middle"></i>deadline</span></div>';
  return '<div class="hp"><span class="hp-pill pill-blue">The Bridge · '+br.length+' weeks</span><div class="hp-tip cal">'+cal+'</div></div>';
}
function bridgeBar(br,dlQ,dlWk){
  if(!br.length)return'<span class="pill-red">Deadline passed</span>';
  const bq=byQ(br);let h='<div style="display:flex;align-items:flex-start">';
  const qs=Object.keys(bq);
  qs.forEach((q,qi)=>{const wks=bq[q];h+='<div style="flex:'+wks.length+';min-width:0;padding:0 4px;'+(qi<qs.length-1?'border-right:1px solid var(--brd);':'')+'"><div style="font-size:10px;font-weight:700;color:#1d4ed8;margin-bottom:5px;text-align:center">'+q+'</div><div style="position:relative"><div style="position:absolute;top:3px;left:0;right:0;height:1.5px;background:var(--brd)"></div><div style="display:flex;position:relative;z-index:1">';
  wks.forEach(w=>{const isDL=q===dlQ&&w===dlWk;h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:8px;height:8px;border-radius:50%;background:'+(isDL?'#ef4444':'#3b82f6')+';box-shadow:0 0 0 2px '+(isDL?'#fecaca':'#bfdbfe')+'"></div><div style="font-size:8px;color:'+(isDL?'#ef4444':'var(--txt3)')+';margin-top:3px;font-weight:'+(isDL?600:400)+'">W'+w+'</div></div>';});
  h+='</div></div><div style="height:8px"></div></div>';});
  return h+'</div>';
}

function startSlideshow(){clearInterval(slideTimer);slideTimer=setInterval(()=>{advSlide(1);},5000);}
function advSlide(dir){slideIdx=(slideIdx+dir+SLIDES.length)%SLIDES.length;renderSlide();}
function goSlide(i){slideIdx=i;renderSlide();clearInterval(slideTimer);slideTimer=setInterval(()=>{advSlide(1);},5000);}
function renderSlide(){
  const sl=SLIDES[slideIdx];
  const box=document.getElementById('slide-box');if(!box)return;
  box.innerHTML='<div class="slide active"><div class="slide-icon">'+sl.icon+'</div><div class="slide-title">'+sl.title+'</div><div class="slide-body">'+sl.body+'</div></div>';
  const fill=document.getElementById('slide-fill');if(fill){fill.style.transition='none';fill.style.width='0';setTimeout(()=>{fill.style.transition='width 5s linear';fill.style.width='100%';},50);}
  document.querySelectorAll('.slide-dot').forEach((d,i)=>{d.className='slide-dot'+(i===slideIdx?' active':'');});
}

// ── VAULT ─────────────────────────────────────────────────────────────────────
function removeVaultCat(id){
  const inUse=S.vault.some(v=>v.cat===id)||S.goals.some(g=>g.cat===id);
  if(inUse){openModal('<div class="modal-hdr"><strong>Cannot remove</strong><button class="x-btn" onclick="closeModal()">×</button></div><div style="font-size:13px;color:var(--txt);margin-bottom:16px">This category has items linked to it. Remove the items first before deleting the category.</div><div style="display:flex;justify-content:flex-end"><button class="btn-p" onclick="closeModal()">OK</button></div>');return;}
  const isCustom=S.catCustom.some(c=>c.id===id);
  if(isCustom){S.catCustom=S.catCustom.filter(c=>c.id!==id);}
  else{if(!S.catRemovals.includes(id))S.catRemovals.push(id);}
  rebuildCATS(S.catRemovals,S.catCustom);
  if(S.vaultCat===id)S.vaultCat=CATS[0]?.id||'CAR';
  save();render();
}
function addVaultCat(){
  openModal('<div class="modal-hdr"><strong>Add Category</strong><button class="x-btn" onclick="closeModal()">×</button></div>'
    +'<div class="row2"><div><label class="fl">Category name</label>'
    +'<input class="fi" id="newcat-name" placeholder="e.g. Relationships" autofocus oninput="autoSuggestCode()"></div>'
    +'<div><label class="fl">Code</label>'
    +'<input class="fi" id="newcat-code" placeholder="e.g. REL" maxlength="5" oninput="validateCatCode()" style="text-transform:uppercase"></div></div>'
    +'<div id="newcat-code-err" style="display:none;font-size:11px;color:#ef4444;margin-top:-8px;margin-bottom:8px">Code cannot be more than 4 characters</div>'
    +'<div style="display:flex;justify-content:flex-end;gap:8px"><button class="btn-g" onclick="closeModal()">Cancel</button><button class="btn-p" onclick="saveNewCat()">Add Category</button></div>');
}
window.autoSuggestCode=function(){
  const name=document.getElementById('newcat-name')?.value||'';
  const code=name.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4);
  const codeEl=document.getElementById('newcat-code');
  if(codeEl&&!codeEl.dataset.userEdited)codeEl.value=code;
};
window.validateCatCode=function(){
  const el=document.getElementById('newcat-code');
  const err=document.getElementById('newcat-code-err');
  if(!el)return;
  el.dataset.userEdited='1';
  const v=el.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
  el.value=v;
  if(v.length>4){
    el.style.color='#ef4444';
    if(err)err.style.display='block';
    el.value=v.slice(0,4);
    setTimeout(()=>{el.style.color='';if(err)err.style.display='none';},2000);
  } else {
    el.style.color='';
    if(err)err.style.display='none';
  }
};
function saveNewCat(){
  const name=(document.getElementById('newcat-name')?.value||'').trim();
  if(!name)return;
  let code=(document.getElementById('newcat-code')?.value||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4);
  if(!code)code=name.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4)||'C'+Date.now().toString(36).slice(-3).toUpperCase();
  // Ensure uniqueness
  const existing=CATS.map(c=>c.id);
  let finalId=code;
  let n=1;while(existing.includes(finalId))finalId=code+(n++);
  const color=CAT_PALETTE[(S.catCustom.length)%CAT_PALETTE.length];
  S.catCustom.push({id:finalId,name,code:finalId,c:color});
  rebuildCATS(S.catRemovals,S.catCustom);
  S.vaultCat=finalId;
  save();closeModal();render();
}
function renderVault(){
  if(!CATS.find(c=>c.id===S.vaultCat))S.vaultCat=CATS[0]?.id||'CAR';
  const items=S.vault.filter(v=>v.cat===S.vaultCat);const cat=gc(S.vaultCat);
  const tabs=CATS.map(c=>{const n=S.vault.filter(v=>v.cat===c.id).length;
    return '<span style="position:relative;display:inline-flex;align-items:center">'
      +'<button class="tab'+(S.vaultCat===c.id?' active':'')+'" onclick="S.vaultCat=\''+c.id+'\';render()" style="padding-right:22px">'+c.name+(n?'<span style="margin-left:3px;background:'+c.c+';color:#fff;border-radius:20px;padding:0 4px;font-size:9px">'+n+'</span>':'')+'</button>'
      +'<button onclick="event.stopPropagation();removeVaultCat(\''+c.id+'\')" title="Remove category" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:11px;color:var(--txt3);padding:0;line-height:1;opacity:.6">×</button>'
    +'</span>';
  }).join('');
  const addCatBtn='<button onclick="addVaultCat()" style="padding:5px 10px;border-radius:20px;border:1px dashed var(--brd);cursor:pointer;font-size:11px;font-weight:500;background:transparent;color:var(--txt2)">+ Add category</button>';
  const rows=items.length?items.map(function(v,i){
    return '<div style="padding:10px 13px;border-bottom:'+(i<items.length-1?'1px solid var(--surf2)':'none')+';display:flex;gap:10px;align-items:center">'
      +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:13px;color:var(--txt)">'+v.title+'</div>'
        +(v.note?'<div style="font-size:11px;color:var(--txt2);margin-top:2px">'+v.note+'</div>':'')
      +'</div>'
      +'<span style="font-size:10px;color:var(--txt3);flex-shrink:0">'+v.id+'</span>'
      +'<div style="display:flex;gap:5px;flex-shrink:0;margin-left:6px">'
        +'<button onclick="openVaultModal(\''+v.id+'\')" style="background:none;border:1px solid var(--brd);border-radius:5px;cursor:pointer;font-size:12px;color:var(--txt2);padding:2px 8px" title="Edit">✎</button>'
        +'<button onclick="deleteVaultItem(\''+v.id+'\')" style="background:none;border:1px solid #fecaca;border-radius:5px;cursor:pointer;font-size:12px;color:#ef4444;padding:2px 8px" title="Delete">🗑</button>'
      +'</div>'
    +'</div>';
  }).join(''):'<div style="padding:28px;text-align:center;font-size:12px;color:var(--txt3)">No ideas yet — click + Add Idea</div>';
  return '<div class="sh"><div><h2>The Vault 🗝️</h2><p>Brainstorm goal ideas per category. No commitment yet.</p></div><button class="btn-p" onclick="openVaultModal()">+ Add Idea</button></div><div class="tab-bar" style="flex-wrap:wrap;gap:5px">'+tabs+' '+addCatBtn+'</div><div style="background:var(--surf);border:1px solid var(--brd);border-radius:12px;overflow:hidden;border-left:3px solid '+cat.c+'"><div style="padding:10px 13px;background:'+cat.c+'15;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between"><span style="font-weight:600;font-size:13px;color:'+cat.c+'">'+cat.name+'</span><span style="font-size:10px;color:var(--txt3)">'+items.length+' ideas</span></div>'+rows+'</div>';
}
function openVaultModal(eid){
  const v=eid?S.vault.find(x=>x.id===eid):null;
  if(eid){S.editId=eid;S.editType='vault';}
  const cats=CATS.map(c=>'<option value="'+c.id+'"'+(((v?v.cat:S.vaultCat)===c.id)?' selected':'')+'>'+c.name+'</option>').join('');
  openModal('<div class="modal-hdr"><strong>'+(eid?'Edit Vault Idea':'Add to Vault')+'</strong><button class="x-btn" onclick="closeModal()">×</button></div><label class="fl">Category</label><select class="fi" id="vf-cat">'+cats+'</select><label class="fl">Goal idea</label><input class="fi" id="vf-title" value="'+(v?v.title:'').replace(/"/g,'&quot;')+'" placeholder="e.g. Launch a fashion business"><label class="fl">Note (optional)</label><input class="fi" id="vf-note" value="'+(v?v.note:'').replace(/"/g,'&quot;')+'" placeholder="Quick context..."><div style="display:flex;justify-content:flex-end;gap:8px"><button class="btn-g" onclick="closeModal()">Cancel</button><button class="btn-p" onclick="saveVault()">'+(eid?'Save Changes':'Add to Vault')+'</button></div>');}
function saveVault(){const cat=document.getElementById('vf-cat').value;const title=document.getElementById('vf-title').value.trim();const note=document.getElementById('vf-note').value.trim();if(!title)return;if(S.editId&&S.editType==='vault'){const v=S.vault.find(x=>x.id===S.editId);if(v){v.cat=cat;v.title=title;v.note=note;}}else{const n=S.vault.filter(v=>v.cat===cat).length;S.vault.push({id:cat+'-'+String(n+1).padStart(3,'0'),cat,title,note});}closeModal();S.editId=null;S.editType=null;render();}
function deleteVaultItem(id){
  const v=S.vault.find(function(x){return x.id===id;});
  if(!v)return;
  openModal('<div class="modal-hdr"><strong style="color:#b91c1c">Delete Idea?</strong><button class="x-btn" onclick="closeModal()">×</button></div>'
    +'<div style="font-size:13px;color:var(--txt);padding:8px 10px;background:var(--surf2);border-radius:8px;margin-bottom:16px">'+v.title+'</div>'
    +'<div style="font-size:12px;color:var(--txt2);margin-bottom:20px">This idea will be permanently removed from the Vault.</div>'

function toggleRecurring(catId){
  if(!S.catRecurring)S.catRecurring=[];
  const isOn=S.catRecurring.includes(catId);
  if(isOn){
    S.catRecurring=S.catRecurring.filter(x=>x!==catId);
    save();render();
    return;
  }
  if(S.catRecurring.length>=4){
    openModal('<div class="modal-hdr"><strong>Max 4 recurring categories</strong><button class="x-btn" onclick="closeModal()">×</button></div>'
      +'<div style="font-size:13px;color:var(--txt);line-height:1.6;margin-bottom:18px">You already have 4 categories set to every day. Remove one first if you want to add another.</div>'
      +'<div style="display:flex;justify-content:flex-end"><button class="btn-p" onclick="closeModal()">Got it</button></div>');
    return;
  }
  S.catRecurring.push(catId);
  S.cfd[catId]=DAYS;
  save();render();
}
function renderFD(){
  if(!S.fdView)S.fdView='grid';
  if(!S.catRecurring)S.catRecurring=[];
  const dl=DAYS.reduce((a,d)=>{a[d]=Object.values(S.cfd).filter(ds=>ds.includes(d)).length;return a;},{});
  const rows=CATS.map(cat=>{
    const sel=S.cfd[cat.id]||[];
    const isRecurring=S.catRecurring.includes(cat.id);
    const cells=DAYS.map(d=>{
      const on=sel.includes(d);
      return '<td style="padding:3px;text-align:center"><button onclick="'+(isRecurring?'':'toggleFD(\''+cat.id+'\',\''+d+'\')')+'" style="width:22px;height:22px;border-radius:5px;border:1px solid '+(on?cat.c:'var(--brd)')+';cursor:'+(isRecurring?'default':'pointer')+';background:'+(on?cat.c:'transparent')+';font-size:10px;color:#fff;opacity:'+(isRecurring?'0.4':'1')+'">'+(on?'✓':'')+'</button></td>';
    }).join('');
    const recurBtn='<td style="padding:3px;text-align:center"><button onclick="toggleRecurring(\''+cat.id+'\')" title="Every day" style="width:22px;height:22px;border-radius:50%;border:1px solid '+(isRecurring?cat.c:'var(--brd)')+';cursor:pointer;background:'+(isRecurring?cat.c:'transparent')+';font-size:10px;color:'+(isRecurring?'#fff':'var(--txt3)')+'">↻</button></td>';
    return '<tr><td style="padding:7px 10px;font-weight:500;font-size:11px;color:'+cat.c+'">'+cat.name+'</td>'+cells+'<td style="padding:4px;text-align:center;font-size:11px;font-weight:600;color:'+(isRecurring?cat.c:sel.length>=3?'#15803d':'var(--txt2)')+';">'+(isRecurring?'All':sel.length+'/3')+'</td>'+recurBtn+'</tr>';
  }).join('');
  // Timetable view
  const timetable=S.fdView==='timetable'?'<div style="border:1px solid var(--brd);border-radius:12px;overflow:hidden;margin-bottom:12px"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr><th style="padding:8px 12px;border-bottom:1px solid var(--brd);text-align:left;color:var(--txt2);font-weight:600;width:110px">Day</th><th style="padding:8px 12px;border-bottom:1px solid var(--brd);text-align:left;color:var(--txt2);font-weight:600">Categories</th></tr></thead><tbody>'+DAYS.map(d=>{const cats=CATS.filter(cat=>(S.cfd[cat.id]||[]).includes(d));return'<tr style="border-bottom:1px solid var(--surf2)"><td style="padding:9px 12px;font-weight:600;color:var(--txt)">'+d+'</td><td style="padding:6px 12px">'+(cats.length?cats.map(cat=>'<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;background:'+cat.c+'18;color:'+cat.c+';font-size:11px;font-weight:600;margin:2px;border:1px solid '+cat.c+'33">'+cat.name+'</span>').join(''):'<span style="font-size:11px;color:var(--txt3)">No categories</span>')+'</td></tr>';}).join('')+'</tbody></table></div>':'';
  const gridView=S.fdView==='grid'?'<div class="fd-scroll" style="border:1px solid var(--brd);border-radius:12px;margin-bottom:12px"><table class="fd-tbl"><thead><tr><th style="width:120px">Category</th>'+DAYS.map(d=>'<th style="text-align:center;min-width:36px;'+(dl[d]>=4?'color:#b91c1c':'')+'">'+(dl[d]>=4?'<span title="'+d+' full">'+d.slice(0,2)+'</span>':d.slice(0,2))+'</th>').join('')+'<th style="text-align:center">Days</th><th style="text-align:center;color:var(--txt3)" title="Every day — all 7 days automatically">↻</th></tr></thead><tbody>'+rows+'</tbody></table></div>':'';
  const tabs='<div style="display:flex;gap:6px;margin-bottom:12px"><button class="tab'+(S.fdView==='grid'?' active':'')+'" onclick="S.fdView=\'grid\';render()">⚙ Edit Focus Days</button><button class="tab'+(S.fdView==='timetable'?' active':'')+'" onclick="S.fdView=\'timetable\';render()">📋 View Timetable</button></div>';
  return '<div class="sh"><div><h2>Focus Days 🎯</h2><p>Set which days belong to which categories. ATLAS recommends max 3 days per category and 4 per day.</p></div></div>'+tabs+gridView+timetable+'<div style="display:flex;gap:5px;flex-wrap:wrap">'+DAYS.map(d=>{const n=dl[d];const ov=n>=4;return'<div style="padding:5px 10px;border-radius:8px;border:1px solid '+(ov?'#fca5a5':'var(--brd)')+';font-size:11px;color:'+(ov?'#b91c1c':'var(--txt2)')+';background:'+(ov?'#fef2f2':'var(--surf2)')+'"><strong>'+d.slice(0,3)+'</strong> '+n+'/4</div>';}).join('')+'</div>';
}
function toggleFD(cat,day){
  const sel=S.cfd[cat]||[];
  const on=sel.includes(day);
  const dl=Object.values(S.cfd).filter(ds=>ds.includes(day)).length;
  const nd=on?sel.filter(x=>x!==day):[...sel,day];

  if(!on&&nd.length>3){
    // 4th focus day for this category — show advisory
    showFDAdvisory(
      'More than 3 focus days?',
      'ATLAS recommends a maximum of 3 focus days per category. Spreading too thin can make it harder to maintain consistent momentum. Add it anyway?',
      function(){S.cfd[cat]=nd;save();render();}
    );
    return;
  }
  if(!on&&!on&&dl>=4){
    // 5th+ category on this day — show advisory
    showFDAdvisory(
      'More than 4 categories on one day?',
      'ATLAS recommends capping each day at 4 categories. More than that tends to fragment your focus and make it harder to complete anything well. Add it anyway?',
      function(){S.cfd[cat]=nd;save();render();}
    );
    return;
  }
  S.cfd[cat]=nd;save();render();
}
function showFDAdvisory(title,body,onConfirm){
  window._fdAdvisoryAction=onConfirm;
  openModal(
    '<div class="modal-hdr"><strong style="color:#b45309">⚠️ '+title+'</strong><button class="x-btn" onclick="closeModal()">×</button></div>'
    +'<div style="font-size:13px;color:var(--txt);line-height:1.65;margin-bottom:20px">'+body+'</div>'

}

function openGoalCalendar(gid){
  const g=S.goals.find(x=>x.id===gid);
  if(!g)return;
  const gMs=S.ms.filter(m=>m.gid===gid);
  const cat=gc(g.cat);
  const br=bridge(g.q,g.dlWk);

  // Build a week-by-week grid over the bridge window
  // Group by month
  const monthMap={};
  br.forEach(({q,w})=>{
    const{month}=qwToMW(q,w);
    if(!monthMap[month])monthMap[month]=[];
    monthMap[month].push({q,w});
  });

  // For each week, find milestones whose fwks include it
  function msForWeek(q,w){
    return gMs.filter(m=>(m.fwks||[{q:m.fq,w:m.fwk}]).some(fw=>fw.q===q&&fw.w===w));
  }

  // Build calendar HTML
  const FOCUS_DAYS=S.cfd[g.cat]||[];
  let calHtml='';
  Object.entries(monthMap).forEach(([month,weeks])=>{
    calHtml+='<div style="margin-bottom:20px">'
      +'<div style="font-size:12px;font-weight:700;color:'+cat.c+';text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--brd)">'+month+'</div>';

    weeks.forEach(({q,w})=>{
      const dates=wkDates(q,w);
      const msList=msForWeek(q,w);
      const isDL=q===g.q&&w===g.dlWk;
      const mwLabel=displayMW(q,w);

      // Mini-tasks for milestones in this week
      const weekMinis=msList.flatMap(ms=>
        S.tasks.filter(t=>t.msid===ms.id&&FOCUS_DAYS.includes(t.day))
          .map(t=>({...t,msTitle:ms.title}))
      );

      calHtml+='<div style="border:1px solid '+(isDL?'#ef4444':msList.length?cat.c+'44':'var(--brd)')+';border-radius:10px;padding:10px 12px;margin-bottom:7px;background:'+(isDL?'#fef2f212':'transparent')+'">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:'+(msList.length||weekMinis.length?'8':'0')+'px">'
          +'<div style="display:flex;align-items:center;gap:8px">'
            +'<span style="font-size:11px;font-weight:700;color:'+(isDL?'#ef4444':msList.length?cat.c:'var(--txt3)')+'">'+mwLabel+'</span>'
            +'<span style="font-size:10px;color:var(--txt3)">'+dates+'</span>'
            +(isDL?'<span style="font-size:10px;background:#fef2f2;color:#b91c1c;border-radius:20px;padding:1px 6px;font-weight:600;border:1px solid #fecaca">deadline</span>':'')
          +'</div>'
          +(msList.length?'':'')
        +'</div>'
        +msList.map(ms=>{
          const mts=S.tasks.filter(t=>t.msid===ms.id);
          const done=mts.filter(t=>t.status==='Completed').length;
          return'<div style="background:'+cat.c+'12;border:1px solid '+cat.c+'33;border-radius:7px;padding:7px 9px;margin-bottom:5px">'
            +'<div style="font-size:12px;font-weight:600;color:var(--txt);margin-bottom:4px">'+ms.title+'</div>'
            +(mts.length?'<div style="display:flex;flex-wrap:wrap;gap:4px">'+mts.map(t=>{
              const focusDay=FOCUS_DAYS.includes(t.day)?t.day:'';
              return'<div style="font-size:10px;padding:2px 7px;border-radius:20px;background:'+(t.status==='Completed'?'#22c55e22':'var(--surf2)')+';color:'+(t.status==='Completed'?'#15803d':'var(--txt2)')+';border:1px solid '+(t.status==='Completed'?'#86efac':'var(--brd)')+';">'
                +(t.status==='Completed'?'✓ ':'')
                +t.title.slice(0,28)+(t.title.length>28?'…':'')
                +(focusDay?' · '+focusDay.slice(0,3):'')
              +'</div>';
            }).join('')+'</div>':'')
          +'</div>';
        }).join('')
      +'</div>';
    });
    calHtml+='</div>';
  });

  if(!br.length){
    calHtml='<div style="text-align:center;padding:32px;color:var(--txt3);font-size:13px">No bridge weeks available — set a deadline on this goal to see the calendar.</div>';
  }

  openModal(
    '<div class="modal-hdr"><strong>📅 '+g.title.slice(0,40)+'</strong><button class="x-btn" onclick="closeModal()">×</button></div>'
    +'<div style="font-size:11px;color:var(--txt2);margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">'
      +pill(cat.name,cat.c,cat.c+'18')
      +'<span style="color:var(--txt3)">'+gMs.length+' milestones</span>'
      +(FOCUS_DAYS.length?'<span style="color:var(--txt3)">· Focus days: '+FOCUS_DAYS.join(', ')+'</span>':'')
    +'</div>'
    +'<div style="max-height:65vh;overflow-y:auto;padding-right:4px">'+calHtml+'</div>'
  );
}

function sortGoalsAsc(goals){
  return [...goals].sort((a,b)=>{
    const qi={Q1:0,Q2:1,Q3:2,Q4:3};
    const qa=qi[a.q]??0,qb=qi[b.q]??0;
    if(qa!==qb)return qa-qb;
    return (a.dlWk||99)-(b.dlWk||99);
  });
}

          +'<button onclick="openGoalCalendar(\''+goal.id+'\')" style="background:none;border:1px solid var(--brd);border-radius:5px;cursor:pointer;font-size:12px;color:var(--txt2);padding:2px 7px" title="View milestone calendar">📅</button>'
          +'<button class="edit-btn" onclick="openGoalModal(\''+goal.id+'\')" title="Edit goal">✎</button>'
          +'<button onclick="deleteGoal(\''+goal.id+'\')" style="background:none;border:1px solid #fecaca;border-radius:5px;cursor:pointer;font-size:12px;color:#ef4444;padding:2px 6px" title="Delete goal">🗑</button>'
          +'<span style="color:var(--txt3);font-size:12px">'+(isExp?'▲':'▼')+'</span>'
        +'</div>'
      +'</div>'
      +(isExp?'<div style="border-top:1px solid var(--brd);padding:12px 14px">'
          +'<div style="font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Bridge window</div>'
          +bridgeBar(br,goal.q,goal.dlWk)
          +msRows
          +taskRows
          +(gMs.length<10?'<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">'
            +'<button class="btn-g" style="flex:1;min-width:120px;font-size:12px" onclick="openMsModal(\''+goal.id+'\',\''+goal.cat+'\',null)">+ Add Milestone ('+gMs.length+'/10)</button>'
            +'<button onclick="openAIMsModal(\''+goal.id+'\',\''+goal.cat+'\',\''+goal.title.replace(/'/g,"\\'")+'\')" style="padding:6px 12px;border-radius:8px;border:1px solid #8b5cf6;cursor:pointer;font-size:12px;background:#f5f3ff;color:#6d28d9;font-weight:600">✨ AI Milestones</button>'
            +'</div>'
          :'<div style="text-align:center;font-size:11px;color:var(--txt3);margin-top:8px">10/10 milestones</div>')
        +'</div>':'')
    +'</div>';
  }
  // Month-segmented list view
  const qMonths=(QS.find(q=>q.id===S.brkQ)||QS[0]).months;
  const listByMonth=qMonths.map(month=>{
    const mGoals=qGoals.filter(g=>{
      // If goal has specific months selected, use those
      if(g.months&&g.months.length>0)return g.months.includes(month);
      // Otherwise show only under the deadline month
      const{month:dlM}=qwToMW(g.q,g.dlWk||12);
      return dlM===month;
    });
    if(!mGoals.length)return'';
    return'<div style="margin-bottom:20px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
        +'<div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;padding:3px 10px;border-radius:20px;background:var(--surf2)">'+month+'</div>'
        +'<div style="flex:1;height:1px;background:var(--brd)"></div>'
      +'</div>'
      +mGoals.map(g=>goalCardBrk(g)).join('')
    +'</div>';
  }).join('');
  // Month-segmented kanban
  const usedCats=[...new Set(qGoals.map(g=>g.cat))];
  const kanban='<div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:8px">'+usedCats.map(cid=>{
    const cat=gc(cid);const cGoals=qGoals.filter(g=>g.cat===cid);
    return '<div style="min-width:280px;background:var(--surf2);border-radius:12px;padding:12px;border:1px solid var(--brd)">'
      +'<div style="font-size:12px;font-weight:700;color:'+cat.c+';margin-bottom:10px">'+cat.name+'</div>'
      +qMonths.map(month=>{
        const mGoals=cGoals.filter(g=>{
          if(g.months&&g.months.includes(month))return true;
          const{month:dlM}=qwToMW(g.q,g.dlWk||12);
          return dlM===month;
        });
        if(!mGoals.length)return'';
        return'<div style="font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin:6px 0 4px;padding-left:2px">'+month+'</div>'
          +mGoals.map(g=>goalCardBrk(g)).join('');
      }).join('')
    +'</div>';
  }).join('')+'</div>';
  // ── By Week view ────────────────────────────────────────────────────────────
  const byWeekView=(()=>{
    // Get all milestones for this quarter
    const qMs=S.ms.filter(m=>{
      if(S.brkWeekType==='focus') return m.fq===S.brkQ;
      return m.dlQ===S.brkQ;
    });
    // Build a map of all bridge weeks in this quarter
    const q=QS.find(x=>x.id===S.brkQ)||QS[0];
    const allWeeks=[];
    for(let w=1;w<=12;w++){
      const mw=qwToMW(S.brkQ,w);
      allWeeks.push({q:S.brkQ,w,month:mw.month,wim:mw.wim,label:displayMW(S.brkQ,w),dates:wkDates(S.brkQ,w)});
    }
    // Group weeks by month
    const monthGroups={};
    allWeeks.forEach(wk=>{
      if(!monthGroups[wk.month])monthGroups[wk.month]=[];
      monthGroups[wk.month].push(wk);
    });
    let html='';
    q.months.forEach(month=>{
      const weeks=monthGroups[month]||[];
      html+='<div style="margin-bottom:22px">'
        +'<div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--brd)">'+month+'</div>';
      weeks.forEach(({q:wq,w,label,dates})=>{
        const wkMs=qMs.filter(m=>{
          if(S.brkWeekType==='focus')return(m.fwks||[{q:m.fq,w:m.fwk}]).some(fw=>fw.q===wq&&fw.w===w);
          return m.dlQ===wq&&m.dlWk===w;
        });
        const hasMs=wkMs.length>0;
        html+='<div style="border:1px solid '+(hasMs?'var(--brd)':'var(--surf2)')+';border-radius:10px;padding:10px 12px;margin-bottom:7px;background:'+(hasMs?'var(--surf)':'transparent')+'">'
          +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:'+(hasMs?'8':'0')+'px">'
            +'<div style="display:flex;align-items:center;gap:8px">'
              +'<span style="font-size:11px;font-weight:700;color:'+(hasMs?'var(--txt)':'var(--txt3)')+'">'+label+'</span>'
              +'<span style="font-size:10px;color:var(--txt3)">'+dates+'</span>'
            +'</div>'
          +'</div>'
          +wkMs.map(ms=>{
            const goal=S.goals.find(g=>g.id===ms.gid);
            const cat=gc(ms.cat);
            const mts=S.tasks.filter(t=>t.msid===ms.id);
            const done=mts.filter(t=>t.status==='Completed').length;
            const isDeadline=S.brkWeekType==='deadline'||(ms.dlQ===wq&&ms.dlWk===w);
            return'<div style="padding:8px 10px;border-radius:8px;margin-bottom:5px;background:'+(ms.status==='Completed'?'#f0fdf4':'var(--surf2)')+';border:1px solid '+(ms.status==='Completed'?'#86efac':'var(--brd)')+'">'
              +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'
                +'<span style="font-size:12px;font-weight:700;color:'+(ms.status==='Completed'?'#15803d':ms.status==='In Progress'?'#92400e':'var(--txt)')+';flex:1;'+(ms.status==='Completed'?'text-decoration:line-through':'')+'">'+ms.title+'</span>'
                +(cat?'<span style="font-size:10px;font-weight:500;color:'+cat.c+';background:'+cat.c+'18;padding:1px 7px;border-radius:20px">'+cat.name+'</span>':'')
                +(mts.length?'<span style="font-size:10px;color:var(--txt3)">'+done+'/'+mts.length+'</span>':'')
                +'<select onchange="updateMsStatus(\''+ms.id+'\',this.value)" style="font-size:11px;padding:2px 5px;border:1px solid '+(ms.status==='Completed'?'#86efac':'var(--brd)')+';border-radius:6px;background:var(--inp);color:var(--txt2)">'+STATUS.map(o=>'<option value="'+o+'"'+(o===ms.status?' selected':'')+' style="color:'+(o==='Completed'?'#15803d':o==='In Progress'?'#92400e':'inherit')+'">'+o+'</option>').join('')+'</select>'
              +'</div>'
              +(goal?'<div style="font-size:10px;color:var(--txt3);margin-top:3px;padding-left:2px">↳ '+goal.title.slice(0,50)+(goal.title.length>50?'…':'')+'</div>':'')
            +'</div>';
          }).join('')
        +'</div>';
      });
      html+='</div>';
    });
    return html||'<div style="text-align:center;padding:40px;color:var(--txt3)">No milestones in '+S.brkQ+' yet.</div>';
  })();

  return '<div class="sh" style="align-items:flex-start"><div style="flex:1;min-width:0"><h2>Yearly Goals 📍</h2><p style="margin-bottom:8px">'+S.goals.length+' goal'+(S.goals.length!==1?'s':'')+' · Click any goal to expand milestones</p>'+viewBtns+'</div><button class="btn-p" onclick="openGoalModal(null)" style="flex-shrink:0">+ Add Goal</button></div>'
    +'<div class="tab-bar">'+qtabs+'</div>'
    +(qGoals.length||S.brkView==='week'?(S.brkView==='week'?byWeekView:S.brkView==='list'?(listByMonth||qGoals.map(goalCardBrk).join('')):kanban):'<div class="card" style="text-align:center;padding:40px;color:var(--txt3)">No goals in '+S.brkQ+' yet — click <strong>+ Add Goal</strong> above to get started</div>');
}
function updateMsStatus(id,s){const ms=S.ms.find(m=>m.id===id);if(ms){ms.status=s;save();render();}}
function openMsModal(gid,cat,eid){
  const ms=eid?S.ms.find(x=>x.id===eid):null;
  if(eid){S.editId=eid;S.editType='ms';}
  const goalId=ms?ms.gid:gid;const catId=ms?ms.cat:cat;
  const g=S.goals.find(x=>x.id===goalId);if(!g)return;
  const br=bridge(g.q,g.dlWk);
  // Convert existing fwks to month/wim format for display
  const initFwks=ms?(ms.fwks||[{q:ms.fq,w:ms.fwk}]):[{q:'',w:''}];
  window._msFwks=initFwks.map(fw=>{
    if(!fw.q&&!fw.w)return{month:'',wim:''};
    const mw=qwToMW(fw.q,fw.w);return{month:mw.month,wim:mw.wim};
  });
  // Deadline in month/wim
  const dlInit=ms?qwToMW(ms.dlQ,ms.dlWk):qwToMW(g.q,g.dlWk);
  function fwkRows(){
    return window._msFwks.map((fw,i)=>'<div style="display:flex;gap:6px;align-items:center;margin-bottom:5px">'
      +'<span style="font-size:11px;font-weight:600;color:#3b82f6;min-width:18px">'+(i+1)+'.</span>'
      +'<select id="ms-fwkm-'+i+'" style="flex:2;padding:6px 8px;font-size:12px;border:1px solid var(--brd);border-radius:7px;background:var(--inp);color:var(--txt)">'+monthOpts(fw.month)+'</select>'
      +'<select id="ms-fwkw-'+i+'" style="flex:1;padding:6px 8px;font-size:12px;border:1px solid var(--brd);border-radius:7px;background:var(--inp);color:var(--txt)">'+wimOpts(fw.wim)+'</select>'
      +(i>0?'<button onclick="removeFwk('+i+')" style="background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:5px;cursor:pointer;padding:2px 7px;font-size:12px">×</button>':'<span style="width:26px"></span>')
    +'</div>').join('');
  }
  function renderFwkSection(){
    const box=document.getElementById('ms-fwk-rows');if(box)box.innerHTML=fwkRows();
    const addBtn=document.getElementById('ms-fwk-add');if(addBtn)addBtn.style.display=window._msFwks.length>=3?'none':'block';
  }
  window.addFwk=function(){
    if(window._msFwks.length>=3)return;
    saveFwkFromDOM();
    const last=window._msFwks[window._msFwks.length-1];
    window._msFwks.push({month:last.month,wim:Math.min(last.wim+1,4)});
    renderFwkSection();
  };
  window.removeFwk=function(i){saveFwkFromDOM();window._msFwks.splice(i,1);renderFwkSection();};
  window.saveFwkFromDOM=function(){
    window._msFwks=window._msFwks.map((_,i)=>({
      month:document.getElementById('ms-fwkm-'+i)?.value||'January',
      wim:parseInt(document.getElementById('ms-fwkw-'+i)?.value)||1
    }));
  };
  window._msMiniTasks=ms?S.tasks.filter(t=>t.msid===ms.id&&!t.isChildTask):[];
  function mtRowMs(i,t){
    return'<div id="ms-mt-'+i+'" style="display:flex;gap:6px;align-items:center;margin-bottom:5px">'
      +'<input style="flex:1;padding:5px 8px;font-size:12px;border:1px solid var(--brd);border-radius:6px;background:var(--inp);color:var(--txt)" id="ms-mt-t-'+i+'" placeholder="Mini-task description…" value="'+(t?t.title:'').replace(/"/g,'&quot;')+'">'
      +(i>0?'<button onclick="removeMsMt('+i+')" style="background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:5px;cursor:pointer;padding:2px 7px;font-size:11px">×</button>':'<span style="width:26px"></span>')
    +'</div>';
  }
  function rebuildMsMtList(){
    const box=document.getElementById('ms-mt-list');if(box)box.innerHTML=window._msMiniTasks.map(mtRowMs).join('');
    const btn=document.getElementById('ms-mt-add');if(btn)btn.style.display=window._msMiniTasks.length>=5?'none':'block';
  }
  window.addMsMt=function(){if(window._msMiniTasks.length>=5)return;window._msMiniTasks.push({title:''});rebuildMsMtList();};
  window.removeMsMt=function(i){window._msMiniTasks.splice(i,1);rebuildMsMtList();};
  openModal('<div class="modal-hdr"><strong>'+(eid?'Edit Milestone':'Add Milestone')+'</strong><button class="x-btn" onclick="closeModal()">×</button></div>'
    +'<div style="margin-bottom:10px">'+bridgeBar(br,g.q,g.dlWk)+'</div>'
    +'<label class="fl">Milestone title</label>'
    +'<input class="fi" id="ms-title" value="'+(ms?ms.title:'').replace(/"/g,'&quot;')+'" placeholder="e.g. Build portfolio website">'
    +'<label class="fl">Focus Month &amp; Week <span style="font-weight:400;color:var(--txt3)">(max 3)</span></label>'
    +'<div id="ms-fwk-rows">'+fwkRows()+'</div>'
    +'<button id="ms-fwk-add" onclick="addFwk()" style="width:100%;padding:6px;border-radius:7px;border:1px dashed var(--brd);cursor:pointer;font-size:12px;background:transparent;color:var(--txt2);margin-bottom:10px;display:'+(window._msFwks.length>=3?'none':'block')+'">+ Add another focus week</button>'
    +'<div class="row2"><div><label class="fl">Deadline Month</label><select class="fi" id="ms-dlm">'+monthOpts(dlInit.month)+'</select></div><div><label class="fl">Week</label><select class="fi" id="ms-dlwim">'+wimOpts(dlInit.wim)+'</select></div></div>'
    +'<div style="border:1px solid var(--brd);border-radius:8px;overflow:hidden;margin-bottom:12px">'
      +'<div style="padding:9px 12px;background:var(--surf2);font-size:12px;font-weight:600;color:var(--txt2)">⚡ Break into mini-tasks <span style="font-size:10px;font-weight:400;color:var(--txt3)">(optional, max 5)</span></div>'
      +'<div style="padding:10px 12px;border-top:1px solid var(--brd)">'
        +'<div id="ms-mt-list">'+(window._msMiniTasks.length?window._msMiniTasks.map(mtRowMs).join(''):mtRowMs(0,null))+'</div>'
        +'<button id="ms-mt-add" onclick="addMsMt()" style="width:100%;padding:5px;border-radius:7px;border:1px dashed var(--brd);cursor:pointer;font-size:12px;background:transparent;color:var(--txt2);'+(window._msMiniTasks.length>=5?'display:none':'')+'">+ Add mini-task</button>'
      +'</div>'
    +'</div>'
    +'<div style="display:flex;justify-content:flex-end;gap:8px"><button class="btn-g" onclick="closeModal()">Cancel</button><button class="btn-p" onclick="saveMilestone(\''+goalId+'\',\''+catId+'\')">'+( eid?'Save Changes':'Add Milestone')+'</button></div>');
}
function updateMsWks(gid){const g=S.goals.find(x=>x.id===gid);if(!g)return;const br=bridge(g.q,g.dlWk);const fq=document.getElementById('ms-fq')?.value;const sel=document.getElementById('ms-fwk');if(sel)sel.innerHTML=br.filter(b=>b.q===fq).map(b=>'<option value="'+b.w+'">Week '+b.w+'</option>').join('');}
function saveMilestone(gid,cat){
  const title=document.getElementById('ms-title')?.value.trim();
  if(!title)return;
  window.saveFwkFromDOM&&saveFwkFromDOM();
  const fwks=(window._msFwks||[{month:'January',wim:1}]).map(fw=>mwToQW(fw.month||'January',fw.wim||1));
  const fq=fwks[0].q;const fwk=fwks[0].w;
  const dlm=document.getElementById('ms-dlm')?.value||'January';
  const dlwim=parseInt(document.getElementById('ms-dlwim')?.value)||1;
  const{q:dlq,w:dlwk}=mwToQW(dlm,dlwim);
  let msId;
  if(S.editId&&S.editType==='ms'){
    const ms=S.ms.find(x=>x.id===S.editId);
    if(ms){ms.title=title;ms.fq=fq;ms.fwk=fwk;ms.fwks=fwks;ms.dlQ=dlq;ms.dlWk=dlwk;}
    msId=S.editId;
  }else{
    msId='ms'+uid();
    S.ms.push({id:msId,gid,cat,title,fq,fwk,fwks,dlQ:dlq,dlWk:dlwk,status:'Not Started'});
  }
  // Save mini-tasks entered in modal
  const g=S.goals.find(x=>x.id===gid);
  const fd=S.cfd[cat]||[];
  const focusDay=fd[0]||'Monday';
  (window._msMiniTasks||[]).forEach(function(obj,i){
    const t=(document.getElementById('ms-mt-t-'+i)?.value||obj.title||'').trim();
    if(!t)return;
    if(obj.id){
      const existing=S.tasks.find(x=>x.id===obj.id);
      if(existing)existing.title=t;
    } else {
      S.tasks.push({id:'mt'+uid(),msid:msId,gid:gid||null,cat,title:t,day:focusDay,days:[focusDay],dur:'25 min',wh:'Sunrise',status:'Not Started',isChildTask:false});
    }
  });
  closeModal();render();
}
function openEditMsModal(id){const ms=S.ms.find(x=>x.id===id);if(ms)openMsModal(ms.gid,ms.cat,id);}

// ── QUARTER VIEW ──────────────────────────────────────────────────────────────
function renderQ(qid){
  const q=QS.find(x=>x.id===qid);const selMs=S.msDetail?S.ms.find(m=>m.id===S.msDetail):null;
  const grid=q.months.map(month=>{const[ws,we]=MW[month];const wks=Array.from({length:we-ws+1},(_,i)=>ws+i);
    // Each month = a stacked card on mobile, side-by-side column on desktop
    const wkCells=wks.map(wk=>{const wkMs=S.ms.filter(m=>(m.fwks||[{q:m.fq,w:m.fwk}]).some(fw=>fw.q===qid&&fw.w===wk));return'<div class="q-wk-cell" style="flex:1;border-right:1px solid var(--surf2);min-height:90px"><div class="q-wk-hdr">WK '+wk+'</div><div style="padding:3px">'+wkMs.map(ms=>{const cat=gc(ms.cat);const mts=S.tasks.filter(t=>t.msid===ms.id);const isE=S.msDetail===ms.id;return'<button class="ms-chip" style="background:'+(isE?cat.c:cat.c+'18')+';color:'+(isE?'#fff':cat.c)+';border-color:'+cat.c+'44" onclick="S.msDetail=S.msDetail===\''+ms.id+'\'?null:\''+ms.id+'\';render()">'+ms.title.slice(0,22)+(ms.title.length>22?'…':'')+'<br><span style="font-size:9px;opacity:.8">'+mts.length+'/5 tasks</span></button>';}).join('')+'</div></div>';}).join('');
    return '<div class="q-month-row" style="flex:1;border-right:1px solid var(--brd)"><div class="q-month-hdr">'+month+'</div><div class="q-wk-row" style="display:flex">'+wkCells+'</div></div>';
  }).join('');
  let detail='';

// ── DAILY ROLLOVER ─────────────────────────────────────────────────────────────
// Runs once per day on first load. Moves unfinished tasks to Open Quests.
function checkDailyRollover(){
  if(S.lastActiveDate===TODAY_ISO)return; // already ran today
  if(S.lastActiveDate===''){
    // First ever load — just stamp the date, don't move anything
    S.lastActiveDate=TODAY_ISO;save();return;
  }
  // New day — roll over unfinished tasks to Open Quests (Still Open)
  var rolled=0;
  S.tasks.forEach(function(t){
    if(t.status==='Completed'||t.status==='Still Open'||t.isChildTask)return;
    if(t.status==='Not Started'||t.status==='In Progress'||t.status==='Half-done'||t.status==='Not Done'){
      t.wasInProgress=(t.status==='In Progress');
      t.status='Still Open';
      t.rolledOver=true;
      t.rolledDate=S.lastActiveDate;
      rolled++;
    }
  });
  S.lastActiveDate=TODAY_ISO;
  save();
  if(rolled>0)console.log('ATLAS: rolled over '+rolled+' tasks to Open Quests');
}
function renderOQ(){
  const LOOP_DURS=['5 min','10 min','15 min','20 min'];

        +'<button onclick="openOQSchedule(\''+mt.id+'\')" style="flex:1;min-width:100px;padding:6px 10px;border-radius:8px;border:1px solid #93c5fd;cursor:pointer;font-size:12px;font-weight:600;background:#eff6ff;color:#1d4ed8">📅 Schedule for Later</button>'
        +'<button onclick="closeOQ(\''+mt.id+'\')" style="padding:6px 10px;border-radius:8px;border:1px solid var(--brd);cursor:pointer;font-size:12px;color:var(--txt2)">✓ Close</button>'
      +'</div>'

  let html=hdr;

        +'<div style="font-size:11px;font-weight:700;color:#854d0e;text-transform:uppercase;letter-spacing:.6px;padding:4px 10px;border-radius:20px;background:#fefce8;border:1px solid #fde68a">🔄 In Progress · '+inProgress.length+'</div>'

// ── TODAY'S TASKS ─────────────────────────────────────────────────────────────
function renderToday(){
  const firstName=S.user?.name?.split(' ')[0]||'';
  // Helper: get days array (backward compat with old single-day tasks)
  const taskDays=t=>(Array.isArray(t.days)?t.days:(t.day?[t.day]:[]));
  // Helper: should a recurring task show today?
  function isRecurToday(t){
    if(!t.recur)return false;
    const r=t.recur;
    if(r.type==='daily')return true;
    if(r.type==='weekly')return Array.isArray(r.days)&&r.days.includes(TODAY_NAME);
    if(r.type==='biweekly'){
      const{q:cq,w:cw}=getQW();
      const weeksSince=Math.abs(cw-(r.createdWeek||1));
      return weeksSince%2===0&&taskDays(t).some(d=>d===TODAY_NAME);
    }
    if(r.type==='end_of_month'){
      // Show in last week of month (days 22–31) and only on task's focus days
      const dom=new Date().getDate();
      const daysInMonth=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate();
      return dom>daysInMonth-7&&taskDays(t).includes(TODAY_NAME);
    }
    return false;
  }
  const seen=new Set();
  const {q:cq,w:cw}=getQW();
  const todayTasks=S.tasks.filter(t=>{
    if(seen.has(t.id))return false;
    if(t.isChildTask)return false;
    if(t.removedFromToday)return false;
    if(t.isLoop)return false;
    // If this task belongs to a milestone, only show it when the milestone's focus week has arrived
    if(t.msid){
      const ms=S.ms.find(m=>m.id===t.msid);
      if(ms){
        const msFwks=ms.fwks||[{q:ms.fq,w:ms.fwk}];
        // Find the earliest focus week for this milestone
        const earliest=msFwks.reduce((best,fw)=>{
          const qi=QS.findIndex(q2=>q2.id===fw.q);
          const bi=QS.findIndex(q2=>q2.id===best.q);
          if(qi<bi)return fw;if(qi>bi)return best;
          return fw.w<best.w?fw:best;
        },msFwks[0]);
        const mqIdx=QS.findIndex(q2=>q2.id===earliest.q);
        const cqIdx=QS.findIndex(q2=>q2.id===cq);
        // Skip if milestone focus week is in the future
        if(mqIdx>cqIdx)return false;
        if(mqIdx===cqIdx&&earliest.w>cw)return false;
      }
    }
    const inToday=taskDays(t).includes(TODAY_NAME)||isRecurToday(t);
    const isCarryOver=t.status==='Not Done';
    if(inToday||isCarryOver){seen.add(t.id);return true;}
    return false;
  }).filter(t=>t.status!=='Completed');
  // Loop tasks scheduled for today (from Open Quests)
  const loopTasks=S.tasks.filter(function(t){
    return t.isLoop&&t.oqToday&&t.status!=='Completed'&&taskDays(t).includes(TODAY_NAME);
  });
  const whOrder={Sunrise:0,Midday:1,Sunset:2};
  todayTasks.sort((a,b)=>(whOrder[a.wh]||0)-(whOrder[b.wh]||0));
  const grouped={Sunrise:[],Midday:[],Sunset:[]};
  todayTasks.forEach(t=>{if(grouped[t.wh])grouped[t.wh].push(t);});
  // Also include Do Now side quests as virtual tasks (shown in Sunrise by default)
  const sqToday=S.sq.filter(sq=>sq.u&&sq.i); // Do Now = urgent+important
  // Inject scheduled side quests that are due today (Schedule quadrant with matching schedDate)
  const scheduledSQToday=S.sq.filter(sq=>!sq.completed&&sq.priority==='Schedule'&&sq.schedDate===TODAY_ISO);
  scheduledSQToday.forEach(sq=>{
    // Only add if not already added as a real task
    const alreadyAdded=S.tasks.some(t=>t.sqId===sq.id&&taskDays(t).includes(TODAY_NAME));
    if(!alreadyAdded){
      S.tasks.push({
        id:'mt'+uid(),cat:CATS[0]?.id||'CAR',title:sq.title,
        days:[TODAY_NAME],day:TODAY_NAME,
        wh:'Sunrise',dur:sq.dur||'25 min',gid:null,
        status:'Not Started',priority:'urgent',
        fromSQ:true,sqId:sq.id,_ephemeral:true
      });
    }
  });
  const statusStyle={
    'Completed':{bg:'transparent',color:'var(--txt3)',extra:'opacity:0.55'},
    'In Progress':{bg:'#fefce8',color:'#854d0e',extra:'border:1px solid #fde68a'},
    'Half-done':{bg:'#fefce8',color:'#854d0e',extra:'border:1px solid #fde68a'},
    'Not Done':{bg:'#fef2f2',color:'#b91c1c',extra:'border:1px solid #fecaca'},
    'Not Started':{bg:'transparent',color:'var(--txt)',extra:'border:1px solid var(--brd)'},
    'Still Open':{bg:'transparent',color:'var(--txt)',extra:'border:1px solid #bfdbfe'},
  };
  function taskCard(mt){

    const sqLabel=mt.isSQ?mt.sqPriority||'Side Quest':null;

              ${['Not Started','In Progress','Still Open','Completed'].map(s=>`<option value="${s}"${s===ct.status?' selected':''}>${s}</option>`).join('')}
            </select>

      </div>`:''}
      <div style="margin-bottom:8px">
        <div style="font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">Notes / Updates</div>

        ${mt.fromAddTask||!mt.msid?`<button onclick="confirmDelete('task','${mt.id}','${mt.title.replace(/'/g,'').slice(0,40)}')" style="padding:6px 10px;border-radius:7px;border:1px solid #fecaca;cursor:pointer;font-size:12px;background:var(--surf);color:#ef4444">🗑 Delete</button>`:''}

    return `<div style="background:${ss.bg};border-radius:10px;margin-bottom:7px;${ss.extra};overflow:hidden">

        <div style="flex:1;min-width:0">
          <div style="font-size:13px;color:${ss.color};${done?'text-decoration:line-through;opacity:.6':''}">
            ${mt.title}${priorityBadge}${isCarry?'<span style="font-size:10px;background:#fecaca;color:#b91c1c;border-radius:20px;padding:1px 6px;margin-left:6px;font-weight:600">carried over</span>':''}${sqLabel?'<span style="font-size:10px;background:'+sqC+'22;color:'+sqC+';border-radius:20px;padding:1px 7px;margin-left:6px;font-weight:600;border:1px solid '+sqC+'44">⚡ '+sqLabel+'</span>':''}

      ${expandedHtml}

  }

  // Time-aware greeting
  const nowHour=new Date().getHours();

  // Date + time pills

  const datePill=`<span style="display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--surf2);color:var(--txt2);border:1px solid var(--brd)">${TODAY_DATE}</span>`;

  )];

    const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
    // iOS Safari in browser tab — can't request permission, show add-to-homescreen nudge
    if(isIOS&&!isStandalone){
      return`<button onclick="showNotifIOSPrompt()" style="padding:7px 11px;border-radius:8px;border:1px solid #c9a84c44;cursor:pointer;font-size:13px;background:#c9a84c12;color:#c9a84c" title="Enable notifications">🔔</button>`;

    return`<button onclick="triggerNotifPermission()" style="padding:7px 11px;border-radius:8px;border:1px solid var(--brd);cursor:pointer;font-size:13px;background:var(--surf);color:var(--txt2)" title="Enable notifications">🔔</button>`;
  })();
  const headerHtml=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px">
    <h2 style="font-size:20px;font-weight:700;color:var(--txt)">${greeting}</h2>
    <div style="display:flex;gap:8px;align-items:center">
      ${notifBell}
      <button onclick="openVoiceCapture()" style="padding:8px 12px;border-radius:8px;border:1px solid var(--brd);cursor:pointer;font-size:15px;background:var(--surf);color:var(--txt2)" title="Add tasks by voice">🎙️</button>
      <button class="btn-p" onclick="openAddTask()">+ Add Task</button>
    </div>
  </div>
  ${pillRow}
  <p style="font-size:13px;color:var(--txt2);margin-bottom:14px">${subtitleText}</p>
  ${whBar}`;

  // Evening summary — two separate cards
  const isCollapsed=S.completedCollapsed;
  const allCompletedToday=[...completedToday,...completedSQToday.map(sq=>({...sq,title:sq.title,cat:null,_isSQ:true}))];
  const eveningSummary=isEvening?
    '<div style="border:1px solid #86efac;border-radius:12px;overflow:hidden;margin-bottom:12px">'
      +'<button onclick="S.completedCollapsed=!S.completedCollapsed;save();render()" style="width:100%;padding:12px 14px;background:var(--surf);border:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;text-align:left">'
        +'<span style="font-size:13px;font-weight:700;color:var(--txt)">\u2705 Completed today'+(allCompletedToday.length?' ('+allCompletedToday.length+')':'')+'</span>'
        +'<span style="font-size:11px;color:var(--txt3)">'+(isCollapsed?'\u25bc show':'\u25b2 hide')+'</span>'
      +'</button>'
      +(!isCollapsed
        ? '<div style="padding:0 14px 12px;background:var(--surf)">'
            +(allCompletedToday.length
              ? allCompletedToday.map(function(t){
                  if(t._isSQ)return'<div style="font-size:12px;color:var(--txt2);padding:5px 9px;background:var(--surf2);border-radius:7px;border-left:3px solid #f59e0b;margin-bottom:4px"><span style="color:#f59e0b;font-weight:600">Side Quest · </span>'+t.title+'</div>';
                  const cat=gc(t.cat);
                  return'<div style="font-size:12px;color:var(--txt2);padding:5px 9px;background:var(--surf2);border-radius:7px;border-left:3px solid '+(cat?.c||'#22c55e')+';margin-bottom:4px">'+(cat?'<span style="color:'+cat.c+';font-weight:600">'+cat.name+' \u00b7 </span>':'')+t.title+'</div>';
                }).join('')
              : '<div style="font-size:12px;color:var(--txt2)">Nothing marked complete yet \u2014 there\'s still time.</div>')
          +'</div>'
        : '')
    +'</div>'
    +(todayTasks.length
      ? '<div style="margin-bottom:16px">'
          +'<div style="font-size:17px;font-weight:700;color:var(--txt);margin-bottom:5px">You can still do these today</div>'
          +'<div style="font-size:13px;color:var(--txt2);font-style:italic;line-height:1.6">If you can\'t close them today, no pressure. Mark them as <strong>Still Open</strong> and they\'ll move to your Open Quests.</div>'
        +'</div>'
      : '')
    : '';
  // "All done" banner sits ABOVE the completed card
  const allDoneBanner=isEvening&&!todayTasks.length&&!loopTasks.length
    ?'<div style="font-size:14px;color:#22c55e;font-weight:700;margin-bottom:10px">🎉 All done for today!</div>'
    :'';
  const viewToggle=`<div style="display:flex;gap:5px;margin-bottom:14px;flex-wrap:nowrap">
    <button class="tab${S.todayView==='watchhour'?' active':''}" onclick="S.todayView='watchhour';render()" style="flex:1;white-space:nowrap;font-size:11px;padding:6px 8px"><span class="hide-xs">⏰ By Watch Hour</span><span class="show-xs">⏰</span></button>

  if(!todayTasks.length&&!loopTasks.length){

      <div style="font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:6px">Your slate is clear.</div>

      <button onclick="openAddTask()" style="padding:11px 26px;border-radius:8px;border:1px solid var(--brd);cursor:pointer;font-size:13px;font-weight:600;background:var(--surf);color:var(--txt)">+ Add a task</button>
    </div>`;
  }

  const statusLegend=`<div style="display:flex;gap:10px;flex-wrap:wrap;padding:10px 13px;background:var(--surf2);border-radius:8px;font-size:11px;color:var(--txt2);margin-top:14px">

  // Single Loops to Close renderer — purple card with goal info
