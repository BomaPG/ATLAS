        +'<div style="font-size:11px;color:#8b5cf6">'+loopTasks.length+' task'+(loopTasks.length!==1?'s':'')+'</div>'
      +'</div>'
      +loopTasks.map(function(mt){
        const cat=gc(mt.cat);
        const goal=mt.gid?S.goals.find(function(g){return g.id===mt.gid;}):null;
        const minis=mt.miniTasks||[];
        const isExp=S.expLoopTask===mt.id;
        const completedMinis=minis.filter(function(x){return x.status==='Completed';}).length;
        const miniSummary=minis.length?'<span style="color:var(--txt3)">'+completedMinis+'/'+minis.length+' mini-tasks</span>':'';
        const expandedMinis=isExp&&minis.length
          ?'<div style="padding:8px 10px 4px;border-top:1px solid #8b5cf622">'
            +'<div style="font-size:10px;font-weight:600;color:#8b5cf6;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">Mini-tasks</div>'
            +minis.map(function(ct,ci){
              const isDone=ct.status==='Completed';
              return'<div style="font-size:12px;padding:6px 8px;background:var(--surf);border-radius:6px;margin-bottom:4px;display:flex;align-items:center;gap:8px;cursor:pointer" onclick="toggleLoopMiniTask(\''+mt.id+'\','+ci+')">'
                +'<div style="width:16px;height:16px;border-radius:4px;border:2px solid '+(isDone?'#22c55e':'#8b5cf6')+';background:'+(isDone?'#22c55e':'transparent')+';flex-shrink:0;display:flex;align-items:center;justify-content:center">'
                  +(isDone?'<span style="color:#fff;font-size:9px;line-height:1">✓</span>':'')
                +'</div>'
                +'<span style="flex:1;color:'+(isDone?'var(--txt3)':'var(--txt)')+';'+(isDone?'text-decoration:line-through;opacity:.6':'')+'">'+ct.title+'</span>'
                +'<span style="font-size:10px;color:var(--txt3)">'+ct.dur+'</span>'
              +'</div>';
            }).join('')
          +'</div>'
          :'';
        return'<div style="background:var(--surf2);border-radius:9px;margin-bottom:6px;overflow:hidden">'
          +'<div style="padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:'+(minis.length?'pointer':'default')+'" '+(minis.length?'onclick="S.expLoopTask=S.expLoopTask===\''+mt.id+'\'?null:\''+mt.id+'\';render()"':'')+' >'
            +'<div style="flex:1;min-width:0">'
              +'<div style="font-size:13px;color:var(--txt);font-weight:500;margin-bottom:3px">'+mt.title+(minis.length?' <span style="font-size:11px;color:var(--txt3)">'+(isExp?'▲':'▼')+'</span>':'')+'</div>'
              +'<div style="font-size:11px;color:var(--txt2);display:flex;gap:6px;flex-wrap:wrap;align-items:center">'
                +(cat?'<span style="color:'+cat.c+';font-weight:600">'+cat.name+'</span>':'')
                +'<span style="color:'+WH_C[mt.wh||'Sunrise']+'">'+( mt.wh||'')+'</span>'
                +(mt.oqSchedule?'<span>'+mt.oqSchedule.time+' · '+mt.dur+'</span>':'')
                +(goal?'<span style="color:var(--txt3)">· '+goal.title.slice(0,25)+'</span>':'')
                +miniSummary
              +'</div>'
            +'</div>'
            +'<div style="display:flex;gap:5px;align-items:center;flex-shrink:0" onclick="event.stopPropagation()">'
              +'<button onclick="startTimer(\''+mt.id+'\',\'Focus\',\''+( mt.dur||'25 min')+'\')" style="background:var(--surf2);border:1px solid var(--brd);border-radius:6px;cursor:pointer;font-size:13px;padding:3px 7px;color:var(--txt2)" title="Start timer">⏱</button>'
              +'<select onchange="updateTodayTaskStatus(\''+mt.id+'\',this.value)" style="font-size:11px;padding:3px 5px;border:1px solid var(--brd);border-radius:6px;background:var(--inp);color:var(--txt2);cursor:pointer">'+selOpts(STATUS,mt.status)+'</select>'
            +'</div>'
          +'</div>'
          +expandedMinis
        +'</div>';
      }).join('')
    +'</div>'
    :'';

  let html=headerHtml+viewToggle+allDoneBanner+eveningSummary;

  if(S.todayView==='watchhour'){
    ['Sunrise','Midday','Sunset'].forEach(wh=>{
      if(!grouped[wh].length)return;
      html+=`<div style="margin-bottom:18px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="font-size:12px;font-weight:700;color:${WH_C[wh]};text-transform:uppercase;letter-spacing:.5px">${wh}</div>
          <div style="flex:1;height:1px;background:var(--brd)"></div>
          <div style="font-size:11px;color:var(--txt3)">${grouped[wh].length} task${grouped[wh].length!==1?'s':''}</div>
        </div>
        ${grouped[wh].map(taskCard).join('')}
      </div>`;
    });
  } else if(S.todayView==='category'){
    const usedCats=[...new Set(todayTasks.map(t=>t.cat).filter(Boolean))];
    usedCats.forEach(cid=>{
      const cat=gc(cid);const catTasks=todayTasks.filter(t=>t.cat===cid);
      html+=`<div style="margin-bottom:18px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="font-size:12px;font-weight:700;color:${cat?.c||'var(--txt2)'};text-transform:uppercase;letter-spacing:.5px">${cat?.name||cid}</div>
          <div style="flex:1;height:1px;background:var(--brd)"></div>
          <div style="font-size:11px;color:var(--txt3)">${catTasks.length} task${catTasks.length!==1?'s':''}</div>
        </div>
        ${catTasks.map(taskCard).join('')}
      </div>`;
    });
  } else if(S.todayView==='priority'){
    const urgent=todayTasks.filter(t=>t.priority==='urgent');
    const normal=todayTasks.filter(t=>t.priority==='normal');
    const unflagged=todayTasks.filter(t=>!t.priority);
    if(urgent.length){
      html+=`<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:12px;font-weight:700;color:#ef4444;text-transform:uppercase;letter-spacing:.5px">🚩 Urgent · ${urgent.length}</div><div style="flex:1;height:1px;background:var(--brd)"></div></div>${urgent.map(taskCard).join('')}</div>`;
    }
    if(normal.length){
      html+=`<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:12px;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:.5px">🔵 Normal · ${normal.length}</div><div style="flex:1;height:1px;background:var(--brd)"></div></div>${normal.map(taskCard).join('')}</div>`;
    }
    if(unflagged.length){
      html+=`<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px">Unflagged · ${unflagged.length}</div><div style="flex:1;height:1px;background:var(--brd)"></div></div>${unflagged.map(taskCard).join('')}</div>`;
    }
  } else {
    html+=todayTasks.map(taskCard).join('');
  }

  html+=loopsSection+statusLegend;
  return html;
}
function toggleLoopMiniTask(parentId,idx){
  var t=S.tasks.find(function(x){return x.id===parentId;});
  if(!t||!t.miniTasks||!t.miniTasks[idx])return;
  t.miniTasks[idx].status=t.miniTasks[idx].status==='Completed'?'Not Started':'Completed';
  render();
}

function saveTaskForTomorrow(){
  const title=document.getElementById('tmr-title')?.value.trim();
  if(!title)return;
  const tIdx=DAYS.indexOf(TODAY_NAME);
  const TOMORROW_NAME=DAYS[(tIdx+1)%7];
  const cat=document.getElementById('tmr-cat')?.value||'CAR';
  const wh=document.getElementById('tmr-wh')?.value||'Sunrise';
  const taskTime=document.getElementById('tmr-time')?.value||'';
  const gid=document.getElementById('tmr-goal')?.value||null;
  S.tasks.push({id:'mt'+uid(),cat,title,days:[TOMORROW_NAME],day:TOMORROW_NAME,wh,dur:'25 min',taskTime,gid:gid||null,status:'Not Started',fromAddTask:true});
  save();closeModal();render();
}
function renderTomorrow(){
  const tIdx=DAYS.indexOf(TODAY_NAME);
  const TOMORROW_NAME=DAYS[(tIdx+1)%7];
  const taskDays=t=>(Array.isArray(t.days)?t.days:(t.day?[t.day]:[]));
  const tmrwTasks=S.tasks.filter(t=>{
    if(t.isChildTask||t.removedFromToday||t.isLoop)return false;
    if(t.status==='Completed'||t.status==='Still Open')return false;
    return taskDays(t).includes(TOMORROW_NAME);
  });
  const tmrwCats=Object.entries(S.cfd).filter(([c,ds])=>ds.includes(TOMORROW_NAME)).map(([c])=>c);
  const{q:cq,w:cw}=getQW();
  const tmrwMs=S.ms.filter(m=>{
    if(m.status==='Completed')return false;
    const inFocusWeek=(m.fwks||[{q:m.fq,w:m.fwk}]).some(fw=>fw.q===cq&&fw.w===cw);
    return inFocusWeek&&tmrwCats.includes(m.cat);
  });
  const tmrwDateStr=(()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});})();
  const hdr='<div class="sh"><div><h2>Tomorrow\'s Tasks 🌅</h2><p><span style="display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--surf2);color:var(--txt2);border:1px solid var(--brd)">'+tmrwDateStr+'</span></p></div><button class="btn-p" onclick="openAddTaskForTomorrow()">+ Add Task</button></div>';
  if(!tmrwTasks.length&&!tmrwMs.length){
    return hdr+'<div style="text-align:center;padding:60px;color:var(--txt3)"><div style="font-size:32px;margin-bottom:12px">🌅</div><div style="font-size:14px;font-weight:600;color:var(--txt2)">Nothing scheduled for tomorrow yet.</div><div style="font-size:12px;margin-top:6px;color:var(--txt3)">Hit "+ Add Task" above to plan ahead.</div></div>';
  }
  const whOrder={Sunrise:0,Midday:1,Sunset:2};
  tmrwTasks.sort((a,b)=>(whOrder[a.wh]||0)-(whOrder[b.wh]||0));
  let html=hdr;
  if(tmrwMs.length){
    html+='<div style="margin-bottom:18px"><div style="font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Milestones in focus</div>'
      +tmrwMs.map(ms=>{const cat=gc(ms.cat);const g=S.goals.find(x=>x.id===ms.gid);
        return'<div style="background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:10px 13px;margin-bottom:6px;border-left:3px solid '+(cat?.c||'#888')+'">'
          +'<div style="font-size:13px;font-weight:600;color:var(--txt);margin-bottom:3px">'+ms.title+'</div>'
          +'<div style="font-size:11px;color:var(--txt2);display:flex;gap:8px;flex-wrap:wrap">'
            +(cat?'<span style="color:'+cat.c+';font-weight:600">'+cat.name+'</span>':'')
            +(g?'<span style="color:var(--txt3)">'+g.title.slice(0,35)+'</span>':'')
            +hpillDate(displayMW(ms.dlQ,ms.dlWk),ms.dlQ,ms.dlWk,'#b91c1c','#fef2f2','#fecaca')
          +'</div>'
        +'</div>';
      }).join('')+'</div>';
  }
  if(tmrwTasks.length){
    html+='<div style="font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Scheduled Tasks</div>'
      +tmrwTasks.map(t=>{const cat=gc(t.cat);const g=t.gid?S.goals.find(x=>x.id===t.gid):null;
        return'<div style="background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:10px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
          +'<div style="flex:1;min-width:0">'
            +'<div style="font-size:13px;color:var(--txt)">'+t.title+'</div>'
            +'<div style="font-size:11px;color:var(--txt2);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap">'
              +(cat?'<span style="color:'+cat.c+';font-weight:600">'+cat.name+'</span>':'')
              +'<span style="color:'+WH_C[t.wh||'Sunrise']+'">'+( t.wh||'Sunrise')+'</span>'
              +(t.taskTime?'<span style="color:var(--txt3)">'+t.taskTime+'</span>':'')
              +(g?'<span style="color:var(--txt3)">· '+g.title.slice(0,30)+'</span>':'')
            +'</div>'
          +'</div>'
          +'<button onclick="openEditTodayTask(\''+t.id+'\')" style="padding:4px 8px;border-radius:6px;border:1px solid var(--brd);cursor:pointer;font-size:11px;background:transparent;color:var(--txt2)">✎</button>'
          +'<button onclick="confirmDelete(\'task\',\''+t.id+'\',\''+t.title.replace(/'/g,'').slice(0,40)+'\')" style="padding:4px 8px;border-radius:6px;border:1px solid #fecaca;cursor:pointer;font-size:11px;background:transparent;color:#ef4444">🗑</button>'
        +'</div>';
      }).join('');
  }
  return html;
}
function saveTodayTaskNote(id,val){
  const t=S.tasks.find(x=>x.id===id);
  if(t){t.note=val;save();}
}
function updateEmbeddedMiniStatus(parentId,idx,s){
  const t=S.tasks.find(x=>x.id===parentId);
  if(t&&t.miniTasks&&t.miniTasks[idx]){t.miniTasks[idx].status=s;render();}
}
function updateTodayTaskStatus(id,s){
  const t=S.tasks.find(x=>x.id===id);
  if(!t)return;
  if(s==='Remove'){
    window._removeTaskId=id;
    openModal(
      '<div class="modal-hdr"><strong>Move to Open Quests?</strong><button class="x-btn" onclick="closeModal();render()">×</button></div>'
      +'<div style="font-size:13px;color:var(--txt);margin-bottom:6px">This task will move to your Open Quests where you can reschedule it.</div>'
      +'<div style="font-size:13px;font-weight:600;background:var(--surf2);padding:8px 12px;border-radius:8px;margin-bottom:16px;color:var(--txt)">'+t.title+'</div>'
      +'<div style="display:flex;gap:8px;justify-content:flex-end">'
        +'<button class="btn-g" onclick="closeModal();render()">Keep it here</button>'
        +'<button onclick="doRemoveToOQ(window._removeTaskId);closeModal()" style="padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:#3b82f6;color:#fff">Move to Open Quests</button>'
      +'</div>'
    );
    return;
  }
  t.status=s;
  if(s==='Completed'){t.completedToday=TODAY_ISO;}
  t.removedFromToday=false;
  save();render();
}
function doRemoveToOQ(id){
  const t=S.tasks.find(x=>x.id===id);
  if(!t)return;
  t.status='Still Open';
  t.removedFromToday=true;
  save();render();
}
function openEditTodayTask(id){
  const mt=S.tasks.find(x=>x.id===id);
  if(!mt)return;
  // Restore state from existing task then open the full Add Task card
  window._atEditId=id;
  window._atDays=Array.isArray(mt.days)&&mt.days.length?[...mt.days]:(mt.day?[mt.day]:[TODAY_NAME]);
  // Restore milestones
  const allMsIds=mt.milestoneIds||(mt.msid?[mt.msid]:[]);
  const allMs=allMsIds.map(mid=>S.ms.find(m=>m.id===mid)).filter(Boolean);
  window._atMilestones=allMs.length?allMs.map(m=>({title:m.title,fwk:m.fwk,dlwk:m.dlWk,q:m.fq})):[{title:'',fwk:'',dlwk:'',q:''}];
  // Restore mini-tasks
  const mts=mt.miniTasks||[];
  window._atMiniTasks=mts.length?mts.map(t=>({title:t.title,day:t.day||TODAY_NAME,wh:t.wh||'Sunrise',dur:t.dur||'25 min'})):[{title:'',day:TODAY_NAME,wh:'Sunrise',dur:'25 min'}];
  // Open the full modal with existing values pre-filled
  openAddTask(mt.title, mt.cat||'CAR');
  // If there were milestones, auto-open that section
  if(allMs.length){
    setTimeout(function(){
      const msBody=document.getElementById('at-ms-body');
      const msIcon=document.getElementById('at-ms-icon');
      if(msBody){msBody.style.display='block';if(msIcon)msIcon.textContent='▲ collapse';}
    },50);
  }
  if(mts.length){
    setTimeout(function(){
      const mtBody=document.getElementById('at-mt-body');
      const mtIcon=document.getElementById('at-mt-icon');
      if(mtBody){mtBody.style.display='block';if(mtIcon)mtIcon.textContent='▲ collapse';}
    },50);
  }
}
function saveEditTodayTask(id){
  const mt=S.tasks.find(x=>x.id===id);
  if(!mt)return;
  const title=document.getElementById('at-title')?.value.trim()||mt.title;
  const cat=document.getElementById('at-cat')?.value||mt.cat;
  const wh=document.getElementById('at-wh')?.value||mt.wh;
  const dur=document.getElementById('at-dur')?.value||mt.dur;
  const days=[...window._atDays];
  mt.title=title;mt.cat=cat;mt.wh=wh;mt.dur=dur;
  mt.days=days.length?days:[mt.day||TODAY_NAME];
  mt.day=mt.days[0];
  // Re-save milestones if section open
  if(document.getElementById('at-ms-body')?.style.display==='block'){
    const oldIds=mt.milestoneIds||(mt.msid?[mt.msid]:[]);
    oldIds.forEach(function(mid){S.ms=S.ms.filter(function(m){return m.id!==mid;});});
    mt.milestoneIds=[];mt.msid=null;
    var newGid=mt.gid||null;
    window._atMilestones.forEach(function(_,i){
      const t=(document.getElementById('at-ms-t-'+i)?.value||'').trim();if(!t)return;
      const q=document.getElementById('at-ms-q-'+i)?.value||'Q2';
      const fwk=parseInt(document.getElementById('at-ms-fw-'+i)?.value)||4;
      const dlwk=parseInt(document.getElementById('at-ms-dw-'+i)?.value)||8;
      if(!newGid){newGid='g'+uid();S.goals.push({id:newGid,cat:cat,title:title,q:q,months:[],dlWk:dlwk,tgt:''});}
      const mid='ms'+uid();
      S.ms.push({id:mid,gid:newGid,cat:cat,title:t,fq:q,fwk:fwk,fwks:[{q:q,w:fwk}],dlQ:q,dlWk:dlwk,status:'Not Started'});
      mt.milestoneIds.push(mid);if(!mt.msid)mt.msid=mid;
    });
    mt.gid=newGid;
  }
  // Re-save mini-tasks if section open
  if(document.getElementById('at-mt-body')?.style.display==='block'){
    mt.miniTasks=[];
    window._atMiniTasks.forEach(function(_,i){
      const t=(document.getElementById('at-mt-t-'+i)?.value||'').trim();if(!t)return;
      mt.miniTasks.push({id:'mt'+uid(),parentId:id,cat:cat,title:t,day:document.getElementById('at-mt-d-'+i)?.value||TODAY_NAME,wh:document.getElementById('at-mt-wh-'+i)?.value||'Sunrise',dur:document.getElementById('at-mt-dur-'+i)?.value||'25 min',status:'Not Started',isChildTask:true});
    });
  }
  window._atEditId=null;
  closeModal();S.expTodayTask=id;render();
}

function goToQuarterForMs(msId){
  const ms=S.ms.find(function(m){return m.id===msId;});
  if(!ms)return;
  const qv=(ms.fq||ms.dlQ||'Q1').toLowerCase();
  S.view=qv;
  S.expGoal=ms.gid||null;
  render();
}
function removeMilestoneFromWeek(msId){
  const ms=S.ms.find(x=>x.id===msId);
  if(!ms)return;
  openModal(
    '<div class="modal-hdr"><strong style="color:#b91c1c">Remove milestone?</strong><button class="x-btn" onclick="closeModal()">×</button></div>'
    +'<div style="font-size:13px;color:var(--txt);padding:9px 12px;background:var(--surf2);border-radius:8px;margin-bottom:12px">'+ms.title+'</div>'
    +'<div style="font-size:12px;color:var(--txt2);margin-bottom:20px;line-height:1.6">This milestone will move to Deleted Items and be permanently cleared after 3 days. Are you sure you want to remove it?</div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end">'
      +'<button onclick="closeModal()" style="padding:7px 16px;border-radius:8px;border:1px solid #bfdbfe;cursor:pointer;font-size:13px;font-weight:600;background:#eff6ff;color:#1d4ed8">Keep it</button>'
      +'<button onclick="confirmTrash(\'milestone\',\''+msId+'\');closeModal()" style="padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:#ef4444;color:#fff">Yes, remove</button>'
    +'</div>'
  );
}
function renderFuture(){
  const{q:cq,w:cw}=getQW();
  const tIdx=DAYS.indexOf(TODAY_NAME);
  const TOMORROW_NAME=DAYS[(tIdx+1)%7];
  // Tasks scheduled beyond today and tomorrow that aren't in this week
  const futureTasks=S.tasks.filter(t=>{
    if(t.isChildTask||t.removedFromToday||t.isLoop)return false;
    if(t.status==='Completed'||t.status==='Still Open')return false;
    if(t.fromSQ&&!t.sqId)return false;
    const tdays=Array.isArray(t.days)?t.days:(t.day?[t.day]:[]);
    // Must not be today or tomorrow
    if(tdays.includes(TODAY_NAME)||tdays.includes(TOMORROW_NAME))return false;
    // Must not be in this current week (current week = tasks in DAYS array for this week)
    if(tdays.some(d=>DAYS.includes(d)))return false;
    // Must have a scheduled date (at-due) or a specific non-current-week day assignment
    return !!(t.scheduledDate||t.focusWeek||(t.days&&t.days.length));
  });
  const hdr='<div class="sh"><div><h2>Future Tasks 🗓️</h2><p>Tasks scheduled beyond this week.</p></div></div>';
  if(!futureTasks.length){
    return hdr+'<div style="text-align:center;padding:60px;color:var(--txt3)"><div style="font-size:32px;margin-bottom:12px">🗓️</div><div style="font-size:14px;font-weight:600;color:var(--txt2)">Nothing scheduled yet.</div><div style="font-size:12px;margin-top:6px">Use "Schedule Task" when adding a task to set a future date.</div></div>';
  }
  // Group by scheduled date or focus week
  const groups={};
  futureTasks.forEach(t=>{
    let key='Unscheduled';
    if(t.scheduledDate){
      // Format date as "Month · W?" using qwToMW
      const d=new Date(t.scheduledDate);
      const monthName=d.toLocaleDateString('en-GB',{month:'long'});
      const dayOfMonth=d.getDate();
      const wim=Math.ceil(dayOfMonth/7);
      key=monthName+' · W'+wim+'|'+t.scheduledDate;
    } else if(t.focusWeek){
      key=t.focusWeek+'|';
    }
    if(!groups[key])groups[key]=[];
    groups[key].push(t);
  });
  // Sort by date key
  const sortedKeys=Object.keys(groups).sort((a,b)=>{
    const da=a.split('|')[1]||'9999';
    const db=b.split('|')[1]||'9999';
    return da.localeCompare(db);
  });
  let html=hdr;
  sortedKeys.forEach(key=>{
    const [label]=key.split('|');
    const tasks=groups[key];
    html+='<div style="margin-bottom:18px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
        +'<div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;padding:3px 10px;border-radius:20px;background:var(--surf2)">'+label+'</div>'
        +'<div style="flex:1;height:1px;background:var(--brd)"></div>'
      +'</div>'
      +tasks.map(t=>{
        const cat=gc(t.cat);
        const tdays=Array.isArray(t.days)?t.days:(t.day?[t.day]:[]);
        return'<div style="background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:10px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px">'
          +'<div style="flex:1;min-width:0">'
            +'<div style="font-size:13px;font-weight:500;color:var(--txt)">'+t.title+'</div>'
            +'<div style="display:flex;gap:6px;margin-top:3px;flex-wrap:wrap">'
              +(cat?'<span style="font-size:11px;font-weight:600;color:'+cat.c+'">'+cat.name+'</span>':'')
              +(tdays.length?'<span style="font-size:11px;color:var(--txt3)">'+tdays.join(', ')+'</span>':'')
            +'</div>'
          +'</div>'
          +'<button onclick="openEditTodayTask(\''+t.id+'\')" style="padding:4px 8px;border-radius:6px;border:1px solid var(--brd);cursor:pointer;font-size:11px;background:transparent;color:var(--txt2)">✎</button>'
          +'<button onclick="confirmDelete(\'task\',\''+t.id+'\',\''+t.title.replace(/'/g,'').slice(0,40)+'\')" style="padding:4px 8px;border-radius:6px;border:1px solid #fecaca;cursor:pointer;font-size:11px;background:transparent;color:#ef4444">🗑</button>'
        +'</div>';
      }).join('')
    +'</div>';
  });
  return html;
}
function renderWeek(){
  const{q:cq,w:cw}=getQW();
  const{month:cwMonth,wim:cwWim}=qwToMW(cq,cw);
  const weekLabel=cwMonth+' · W'+cwWim;
  const weekDateRange=wkDates(cq,cw);
  const weekPill='<span class="hp" style="display:inline-block;position:relative"><span class="hp-pill" style="font-size:12px;font-weight:500;color:var(--txt2);background:var(--surf2);border:1px solid var(--brd);border-radius:20px;padding:3px 12px;cursor:pointer">'+weekLabel+'</span><div class="hp-tip" style="min-width:130px;white-space:nowrap">📅 '+weekDateRange+'</div></span>';
  const allWeekMs=S.ms.filter(m=>(m.fwks||[{q:m.fq,w:m.fwk}]).some(fw=>fw.q===cq&&fw.w===cw));
  const rolledOverMs=S.ms.filter(m=>m.status==='Still Open'&&!allWeekMs.some(wm=>wm.id===m.id));
  // Due This Week: milestones whose deadline is this week and not yet completed
  const dueThisWeekMs=S.ms.filter(m=>m.dlQ===cq&&m.dlWk===cw&&m.status!=='Completed'&&!allWeekMs.some(wm=>wm.id===m.id)&&!rolledOverMs.some(rm=>rm.id===m.id));
  // All tasks for any day this week (including recurring)
  const allWeekTasks=S.tasks.filter(t=>{
    if(t.isChildTask||t.removedFromToday||t.isLoop)return false;
    if(t.status==='Completed')return false;
    const tdays=Array.isArray(t.days)?t.days:(t.day?[t.day]:[]);
    if(tdays.some(d=>DAYS.includes(d)))return true;
    // Recurring tasks that should appear this week
    if(t.recur){
      const r=t.recur;
      if(r.type==='daily')return true;
      if(r.type==='weekly')return Array.isArray(r.days)&&r.days.some(d=>DAYS.includes(d));
      if(r.type==='biweekly'){const weeksSince=Math.abs(cw-(r.createdWeek||1));return weeksSince%2===0;}
      if(r.type==='end_of_month'){const daysInMonth=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate();return daysInMonth-new Date().getDate()<7;}
    }
    return false;
  });

  const allMs=[...allWeekMs,...rolledOverMs];

  if(!allMs.length&&!allWeekTasks.length&&!dueThisWeekMs.length){
    return`<div class="sh"><div><h2>Week at a Glance 📆</h2><div style="margin-top:8px">${weekPill}</div></div></div>
      <div style="text-align:center;padding:60px;color:var(--txt3)">
        <div style="font-size:28px;margin-bottom:12px">📭</div>
        <div style="font-size:14px;font-weight:600;color:var(--txt2)">No milestones or tasks this week.</div>
        <div style="font-size:12px;margin-top:6px">Add tasks or set milestone focus weeks to ${weekLabel} in Yearly Goals.</div>
      </div>`;
  }

  const weekStatusOpts=['Not Started','In Progress','Completed','Still Open','Remove'];
  if(!S.weekView)S.weekView='list';

  const weekViewToggle=`<div style="display:flex;gap:6px;margin-bottom:14px">
    <button class="tab${S.weekView==='list'?' active':''}" onclick="S.weekView='list';render()">☰ List</button>
    <button class="tab${S.weekView==='category'?' active':''}" onclick="S.weekView='category';render()">⊞ By Category</button>
    <button class="tab${S.weekView==='day'?' active':''}" onclick="S.weekView='day';render()">📅 By Day</button>
    <button class="tab${S.weekView==='priority'?' active':''}" onclick="S.weekView='priority';render()">🚩 By Priority</button>
  </div>`;

  // ── Milestone card ──────────────────────────────────────────────────────────
  function msCard(ms,isStillOpen){
    const cat=gc(ms.cat);const g=S.goals.find(x=>x.id===ms.gid);
    const mts=S.tasks.filter(t=>t.msid===ms.id);
    // Also show standalone tasks linked to this goal
    const linkedTasks=g?S.tasks.filter(t=>t.gid===ms.gid&&!t.msid&&!t.isChildTask&&t.status!=='Completed'):[];
    const isExp=S.expWeekMs===ms.id;
    const doneCount=mts.filter(t=>t.status==='Completed').length;
    const pct=mts.length?Math.round((doneCount/mts.length)*100):0;
    const isRolled=rolledOverMs.some(rm=>rm.id===ms.id);
    const isDue=dueThisWeekMs.some(dm=>dm.id===ms.id);
    const cardBorder=isDue?'#ef4444':isStillOpen?'#ef4444':'var(--brd)';
    const titleStyle=isStillOpen?'font-weight:700;color:#b91c1c':'color:var(--txt);font-weight:600';
    const rolledBadge=isRolled?'<span style="font-size:10px;background:#fef2f2;color:#b91c1c;border-radius:20px;padding:1px 7px;font-weight:600;border:1px solid #fecaca;margin-left:4px">rolled over</span>':'';
    const dueBadge=isDue?'<span style="font-size:10px;background:#fef2f2;color:#b91c1c;border-radius:20px;padding:1px 7px;font-weight:600;border:1px solid #fecaca;margin-left:4px">due this week</span>':'';
    const statusSel='<select onchange="updateWeekMsStatus(\''+ms.id+'\',this.value);event.stopPropagation();" onclick="event.stopPropagation()" style="font-size:11px;padding:3px 5px;border:1px solid '+(isStillOpen||isDue?'#fecaca':'var(--brd)')+';border-radius:6px;background:var(--inp);color:'+(isStillOpen||isDue?'#b91c1c':'var(--txt2)')+';cursor:pointer;flex-shrink:0">'+weekStatusOpts.map(o=>'<option value="'+o+'"'+(o===ms.status?' selected':'')+'>'+o+'</option>').join('')+'</select>';
    return`<div style="background:var(--surf);border:1px solid ${isExp?cat?.c+'66':cardBorder};border-radius:12px;margin-bottom:10px;overflow:visible${isStillOpen||isDue?';border-left:3px solid #ef4444':''}">
      <button onclick="S.expWeekMs=S.expWeekMs==='${ms.id}'?null:'${ms.id}';render()" style="width:100%;padding:12px 14px;background:transparent;border:none;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;${titleStyle};margin-bottom:5px">${ms.title}${rolledBadge}${dueBadge}</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">
            ${pill(cat?.name||'',cat?.c,cat?.c+'18')}
            ${g?'<span style="font-size:11px;color:var(--txt2)">'+g.title.slice(0,30)+(g.title.length>30?'…':'')+'</span>':''}
            ${hpillDate(displayMW(ms.dlQ,ms.dlWk),ms.dlQ,ms.dlWk,'#b91c1c','#fef2f2','#fecaca')}
            <span style="font-size:11px;color:var(--txt3)">${mts.length} task${mts.length!==1?'s':''} · ${doneCount} done</span>
          </div>
          <div style="margin-top:8px;height:4px;background:var(--surf2);border-radius:20px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${cat?.c||'#3b82f6'};border-radius:20px;transition:width .3s"></div></div>
        </div>
        ${statusSel}
        <button onclick="event.stopPropagation();openEditMsModal('${ms.id}')" class="edit-btn" style="flex-shrink:0" title="Edit milestone">✎</button>
        <span style="color:var(--txt3);flex-shrink:0">${isExp?'▲':'▼'}</span>
      </button>
      ${isExp?`<div style="border-top:1px solid var(--brd);padding:10px 14px">
        <div style="margin-bottom:8px"><button onclick="goToQuarterForMs('${ms.id}')" style="padding:5px 12px;border-radius:7px;border:1px solid #c9a84c44;cursor:pointer;font-size:11px;font-weight:600;background:#c9a84c18;color:#c9a84c">✎ Edit in Quarter →</button></div>
        ${mts.length===0&&linkedTasks.length===0?'<div style="font-size:12px;color:var(--txt3);padding:4px 0 8px">No tasks yet.</div>':''}
        ${mts.map(mt=>{
          const isThisWeek=DAYS.includes(mt.day)&&(S.cfd[ms.cat]||[]).includes(mt.day);
          return`<div style="padding:7px 10px;border-radius:8px;margin-bottom:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:${isThisWeek?'#eff6ff':'var(--surf2)'};border:1px solid ${isThisWeek?'#bfdbfe':'var(--brd)'};opacity:${isThisWeek?1:0.45}">
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;color:${isThisWeek?'#1e293b':'var(--txt2)'};${mt.status==='Completed'?'text-decoration:line-through':''}">${mt.title}</div>
              <div style="font-size:10px;color:${isThisWeek?'#3b82f6':'var(--txt3)'};margin-top:2px">${mt.day} · ${mt.wh} · ${mt.dur}</div>
            </div>
            <select onchange="updateTodayTaskStatus('${mt.id}',this.value)" style="font-size:11px;padding:2px 5px;border:1px solid var(--brd);border-radius:5px;background:var(--inp);color:var(--txt2);cursor:pointer">${selOpts(STATUS,mt.status)}</select>
          </div>`;
        }).join('')}
        ${linkedTasks.length?`<div style="font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;margin:8px 0 5px">Linked tasks</div>`+linkedTasks.map(t=>{
          const tdays=Array.isArray(t.days)?t.days:(t.day?[t.day]:[]);
          return`<div style="padding:7px 10px;border-radius:8px;margin-bottom:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--surf2);border:1px solid var(--brd)">
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;color:var(--txt)">${t.title}</div>
              <div style="font-size:10px;color:var(--txt3);margin-top:2px">${tdays.join(', ')} · ${t.wh||''} · ${t.dur||''}</div>
            </div>
            <button onclick="openEditTodayTask('${t.id}')" style="padding:2px 7px;border-radius:5px;border:1px solid var(--brd);cursor:pointer;font-size:11px;background:transparent;color:var(--txt2)">✎</button>
            <select onchange="updateTodayTaskStatus('${t.id}',this.value)" style="font-size:11px;padding:2px 5px;border:1px solid var(--brd);border-radius:5px;background:var(--inp);color:var(--txt2);cursor:pointer">${selOpts(STATUS,t.status)}</select>
          </div>`;
        }).join(''):''}
      </div>`:''}
    </div>`;
  }

  // ── Standalone task card (with edit + delete) ───────────────────────────────
  function taskCard(t){
    const cat=gc(t.cat);const tdays=Array.isArray(t.days)?t.days:(t.day?[t.day]:[]);
    return`<div style="background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:10px 13px;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:var(--txt)">${t.title}</div>
        <div style="font-size:11px;color:var(--txt2);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap">
          ${cat?`<span style="color:${cat.c};font-weight:600">${cat.name}</span>`:''}
          <span>${tdays.join(', ')}</span>
          <span style="color:${WH_C[t.wh||'Sunrise']}">${t.wh||''}</span>
          <span>${t.dur||''}</span>
        </div>
      </div>
      <select onchange="updateTodayTaskStatus('${t.id}',this.value)" style="font-size:11px;padding:3px 5px;border:1px solid var(--brd);border-radius:6px;background:var(--inp);color:var(--txt2);cursor:pointer">${selOpts(STATUS,t.status)}</select>
      <button onclick="openEditTodayTask('${t.id}')" style="padding:4px 8px;border-radius:6px;border:1px solid var(--brd);cursor:pointer;font-size:11px;background:transparent;color:var(--txt2)" title="Edit">✎</button>
      <button onclick="confirmDelete('task','${t.id}','${t.title.replace(/'/g,'').slice(0,40)}')" style="padding:4px 8px;border-radius:6px;border:1px solid #fecaca;cursor:pointer;font-size:11px;background:transparent;color:#ef4444" title="Delete">🗑</button>
    </div>`;
  }

  // ── Segments for list view ──────────────────────────────────────────────────
  function segment(label,icon,msList,emptyMsg,isRed){
    if(!msList.length&&!emptyMsg)return'';
    const color=isRed?'#b91c1c':label==='Completed'?'#15803d':label==='In Progress'?'#1d4ed8':'var(--txt2)';
    const bg=isRed?'#fef2f2':label==='Completed'?'#f0fdf4':label==='In Progress'?'#eff6ff':'var(--surf2)';
    return`<div style="margin-bottom:22px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.6px;padding:4px 10px;border-radius:20px;background:${bg}">${icon} ${label} · ${msList.length}</div>
        <div style="flex:1;height:1px;background:var(--brd)"></div>
      </div>
      ${msList.length?msList.map(m=>msCard(m,m.status==='Still Open')).join(''):('<div style="font-size:12px;color:var(--txt3);padding:10px 0">'+emptyMsg+'</div>')}
    </div>`;
  }

  // Segment milestones
  const msCompleted=allMs.filter(m=>m.status==='Completed');
  const msInProgress=allMs.filter(m=>m.status==='In Progress');
  const msStillOpen=allMs.filter(m=>m.status==='Still Open');
  const msOther=allMs.filter(m=>m.status!=='Completed'&&m.status!=='In Progress'&&m.status!=='Still Open');

  // "Due This Week" section at the top
  const dueSection=dueThisWeekMs.length?`<div style="margin-bottom:22px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:#b91c1c;text-transform:uppercase;letter-spacing:.6px;padding:4px 10px;border-radius:20px;background:#fef2f2">⚠️ Due This Week · ${dueThisWeekMs.length}</div>
      <div style="flex:1;height:1px;background:#fecaca"></div>
    </div>
    ${dueThisWeekMs.map(m=>msCard(m,true)).join('')}
  </div>`:'';

  // Standalone tasks (not linked to a milestone)
  const standaloneTasks=allWeekTasks.filter(t=>!t.msid&&!t.gid);
  const standaloneHtml=standaloneTasks.length?`<div style="margin-bottom:22px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;padding:4px 10px;border-radius:20px;background:var(--surf2)">📋 Tasks This Week · ${standaloneTasks.length}</div>
      <div style="flex:1;height:1px;background:var(--brd)"></div>
    </div>
    ${standaloneTasks.map(taskCard).join('')}
  </div>`:'';

  // All side quests for the week (active + completed this week)
  const allSQWeek=[
    ...S.sq.filter(sq=>!sq.completed),
    ...S.sq.filter(sq=>sq.completed)
  ];
  const sqWeekHtml=allSQWeek.length?'<div style="margin-bottom:22px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
      +'<div style="font-size:11px;font-weight:700;color:#f59e0b;text-transform:uppercase;letter-spacing:.6px;padding:4px 10px;border-radius:20px;background:#fff7ed;border:1px solid #fed7aa">⚡ Side Quests · '+allSQWeek.length+'</div>'
      +'<div style="flex:1;height:1px;background:var(--brd)"></div>'
    +'</div>'
    +allSQWeek.map(sq=>{
      const comp=sq.completed;
      return'<div style="background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:8px 12px;margin-bottom:5px;display:flex;align-items:center;gap:8px;opacity:'+(comp?'0.65':'1')+'">'
        +(comp
          ?'<div style="width:14px;height:14px;border-radius:3px;background:#22c55e;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="color:#fff;font-size:9px">✓</span></div>'
          :'<button onclick="completeSQ(\''+sq.id+'\')" style="width:16px;height:16px;border-radius:4px;border:2px solid #f59e0b;background:transparent;cursor:pointer;flex-shrink:0;padding:0" title="Mark done"></button>'
        )
        +'<div style="flex:1;font-size:12px;color:'+(comp?'var(--txt3)':'var(--txt)')+(comp?';text-decoration:line-through':'')+'">'
          +sq.title
          +(sq.priority?'<span style="margin-left:6px;font-size:10px;padding:1px 6px;border-radius:20px;background:'+({'Do Now':'#fef2f2','Schedule':'#eff6ff','Delegate':'#fffbeb','Eliminate':'#f1f5f9'}[sq.priority]||'var(--surf2)')+';color:'+({'Do Now':'#b91c1c','Schedule':'#1d4ed8','Delegate':'#92400e','Eliminate':'#64748b'}[sq.priority]||'var(--txt3)')+';border:1px solid transparent">'+sq.priority+'</span>':'')
        +'</div>'
        +'<span style="font-size:10px;color:var(--txt3)">⚡</span>'
      +'</div>';
    }).join('')
  +'</div>':'';

  // ── List view ───────────────────────────────────────────────────────────────
  const listHtml=dueSection
    +(msStillOpen.length?segment('Still Open','🔴',msStillOpen,'',true):'')
    +segment('In Progress','🔵',msInProgress,'')
    +segment('To Do','⬜',msOther,'No pending milestones.')
    +standaloneHtml
    +segment('Completed','✅',msCompleted,'')
    +sqWeekHtml;

  // ── By Category kanban ──────────────────────────────────────────────────────
  const catKanban=(()=>{
    const usedCats=[...new Set([...allMs.map(m=>m.cat),...allWeekTasks.map(t=>t.cat).filter(Boolean)])];
    return'<div class="wk-kanban" style="display:flex;gap:10px;overflow-x:auto;padding-bottom:12px">'+usedCats.map(cid=>{
      const cat=gc(cid);
      const cMs=allMs.filter(m=>m.cat===cid);
      const cTasks=allWeekTasks.filter(t=>t.cat===cid&&!t.msid);
      return`<div style="min-width:280px;flex:0 0 280px;background:var(--surf2);border-radius:12px;padding:12px;border:1px solid var(--brd)">
        <div style="font-size:12px;font-weight:700;color:${cat?.c||'var(--txt2)'};margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">${cat?.name||cid} <span style="font-weight:400;font-size:10px;color:var(--txt3)">${cMs.length+cTasks.length}</span></div>
        ${cMs.map(m=>msCard(m,m.status==='Still Open')).join('')}
        ${cTasks.map(taskCard).join('')}
      </div>`;
    }).join('')+'</div>';
  })();

  // ── By Day kanban ───────────────────────────────────────────────────────────
  const dayKanban=(()=>{
    return'<div class="wk-kanban" style="display:flex;gap:10px;overflow-x:auto;padding-bottom:12px">'+DAYS.map(day=>{
      const dayTasks=allWeekTasks.filter(t=>{
        const tdays=Array.isArray(t.days)?t.days:(t.day?[t.day]:[]);
        return tdays.includes(day);
      });
      const dayMs=allMs.filter(m=>{
        const mts=S.tasks.filter(t=>t.msid===m.id);
        return mts.some(t=>{const td=Array.isArray(t.days)?t.days:(t.day?[t.day]:[]);return td.includes(day);});
      });
      if(!dayTasks.length&&!dayMs.length)return'';
      const isToday=day===TODAY_NAME;
      return`<div style="min-width:240px;flex:0 0 240px;background:var(--surf2);border-radius:12px;padding:12px;border:1px solid ${isToday?'#3b82f6':'var(--brd)'};${isToday?'box-shadow:0 0 0 2px #bfdbfe':''}" >
        <div style="font-size:12px;font-weight:700;color:${isToday?'#1d4ed8':'var(--txt2)'};margin-bottom:10px">${day}${isToday?' <span style="font-size:10px;background:#eff6ff;color:#1d4ed8;border-radius:20px;padding:1px 7px;border:1px solid #bfdbfe">Today</span>':''}</div>
        ${dayMs.map(m=>msCard(m,m.status==='Still Open')).join('')}
        ${dayTasks.map(taskCard).join('')}
        ${!dayMs.length&&!dayTasks.length?'<div style="font-size:11px;color:var(--txt3);text-align:center;padding:16px 0">Nothing yet</div>':''}
      </div>`;
    }).filter(Boolean).join('')+'</div>';
  })();

  // ── By Priority view ───────────────────────────────────────────────────────
  const priorityView=(()=>{
    const urgentMs=allMs.filter(m=>m.priority==='urgent');
    const normalMs=allMs.filter(m=>m.priority==='normal');
    const noneMs=allMs.filter(m=>!m.priority);
    const urgentT=allWeekTasks.filter(t=>t.priority==='urgent');
    const normalT=allWeekTasks.filter(t=>t.priority==='normal');
    const noneT=allWeekTasks.filter(t=>!t.priority);
    let h='';
    if(urgentMs.length||urgentT.length){h+=`<div style="margin-bottom:20px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:#ef4444;text-transform:uppercase;letter-spacing:.6px;padding:3px 10px;border-radius:20px;background:#fef2f2">🚩 Urgent · ${urgentMs.length+urgentT.length}</div><div style="flex:1;height:1px;background:var(--brd)"></div></div>${urgentMs.map(m=>msCard(m,false)).join('')}${urgentT.map(taskCard).join('')}</div>`;}
    if(normalMs.length||normalT.length){h+=`<div style="margin-bottom:20px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:.6px;padding:3px 10px;border-radius:20px;background:#eff6ff">🔵 Normal · ${normalMs.length+normalT.length}</div><div style="flex:1;height:1px;background:var(--brd)"></div></div>${normalMs.map(m=>msCard(m,false)).join('')}${normalT.map(taskCard).join('')}</div>`;}
    if(noneMs.length||noneT.length){h+=`<div style="margin-bottom:20px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;padding:3px 10px;border-radius:20px;background:var(--surf2)">Unflagged · ${noneMs.length+noneT.length}</div><div style="flex:1;height:1px;background:var(--brd)"></div></div>${noneMs.map(m=>msCard(m,false)).join('')}${noneT.map(taskCard).join('')}</div>`;}
    return h||'<div style="padding:40px;text-align:center;color:var(--txt3)">No flagged tasks this week. Use 🚩 or 🔵 flags when creating tasks.</div>';
  })();

  return`<div class="sh"><div><h2>Week at a Glance 📆</h2><div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">${weekPill}${allWeekMs.length?'<span style="font-size:12px;color:var(--txt2)">· '+allWeekMs.length+' milestone'+(allWeekMs.length!==1?'s':'')+'</span>':''}${rolledOverMs.length?'<span style="font-size:12px;color:var(--txt2)">+ '+rolledOverMs.length+' rolled over</span>':''}${dueThisWeekMs.length?'<span style="font-size:12px;color:#b91c1c">· '+dueThisWeekMs.length+' due</span>':''}</div></div></div>
  ${weekViewToggle}
  ${S.weekView==='category'?catKanban:S.weekView==='day'?dayKanban:S.weekView==='priority'?priorityView:listHtml}`;
}
function updateWeekMsStatus(msId,s){
  if(s==='Remove'){removeMilestoneFromWeek(msId);return;}
  const ms=S.ms.find(x=>x.id===msId);
  if(ms){ms.status=s;save();render();}
}
// ── QUICK ADD ─────────────────────────────────────────────────────────────────
function openAddTask(prefillTitle,prefillCat){
  const initCat=prefillCat||'CAR';
  const catFd=S.cfd[initCat]||[];
  window._atDays=[...catFd.length?catFd:[TODAY_NAME]];
  window._atMilestones=[{title:'',fwk:'',dlwk:'',q:''}];
  window._atMiniTasks=[{title:'',day:TODAY_NAME,wh:'Sunrise',dur:'25 min'}];
  window._atIsGoal=false;

  function catOpts(sel){return CATS.map(c=>'<option value="'+c.id+'"'+(c.id===sel?' selected':'')+'>'+c.name+'</option>').join('');}
  function renderDayPills(){
    const fd=S.cfd[document.getElementById('at-cat')?.value||initCat]||[];
    return DAYS.map(d=>{const on=window._atDays.includes(d);const preset=fd.includes(d);
      return'<button type="button" onclick="toggleATDay(\''+d+'\')" style="padding:3px 10px;border-radius:20px;border:1px solid '+(on?'#3b82f6':'var(--brd)')+';cursor:pointer;font-size:11px;font-weight:'+(preset?700:400)+';background:'+(on?'#eff6ff':'transparent')+';color:'+(on?'#1d4ed8':'var(--txt2)')+'">'+d.slice(0,3)+(preset?'*':'')+'</button>';}).join('');
  }
  function msRow(i,m){
    return'<div id="at-ms-row-'+i+'" style="background:var(--surf2);border-radius:7px;padding:8px 10px;margin-bottom:5px;border:1px solid var(--brd)">'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><span style="font-size:11px;font-weight:600;color:#3b82f6">'+(i+1)+'.</span><input style="flex:1;padding:5px 8px;font-size:12px;border:1px solid var(--brd);border-radius:6px;background:var(--inp);color:var(--txt)" id="at-ms-t-'+i+'" placeholder="Milestone title" value="'+(m.title||'')+'"><button onclick="removeATMs('+i+')" style="background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:5px;cursor:pointer;padding:2px 7px;font-size:11px">×</button></div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
        +'<select id="at-ms-q-'+i+'" style="flex:1;min-width:70px;padding:5px 6px;font-size:11px;border:1px solid var(--brd);border-radius:6px;background:var(--inp);color:var(--txt)"><option value="">Q?</option>'+QS.map(q=>'<option value="'+q.id+'"'+(q.id===(m.q||'')?' selected':'')+'>'+q.id+'</option>').join('')+'</select>'
        +'<input type="number" id="at-ms-fw-'+i+'" value="'+(m.fwk||'')+'" min="1" max="12" placeholder="Focus Wk" style="width:70px;padding:5px 6px;font-size:11px;border:1px solid var(--brd);border-radius:6px;background:var(--inp);color:var(--txt)">'
        +'<input type="number" id="at-ms-dw-'+i+'" value="'+(m.dlwk||'')+'" min="1" max="12" placeholder="Deadline Wk" style="width:80px;padding:5px 6px;font-size:11px;border:1px solid var(--brd);border-radius:6px;background:var(--inp);color:var(--txt)">'
      +'</div>'
    +'</div>';
  }
  function mtRow(i,m){
    return'<div id="at-mt-row-'+i+'" style="background:var(--surf2);border-radius:7px;padding:8px 10px;margin-bottom:5px;border:1px solid var(--brd)">'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><span style="font-size:11px;font-weight:600;color:#f97316">'+(i+1)+'.</span><input style="flex:1;padding:5px 8px;font-size:12px;border:1px solid var(--brd);border-radius:6px;background:var(--inp);color:var(--txt)" id="at-mt-t-'+i+'" placeholder="Mini-task description" value="'+(m.title||'')+'"><button onclick="removeATMt('+i+')" style="background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:5px;cursor:pointer;padding:2px 7px;font-size:11px">×</button></div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap"><select id="at-mt-d-'+i+'" style="flex:1;min-width:90px;padding:5px 6px;font-size:11px;border:1px solid var(--brd);border-radius:6px;background:var(--inp);color:var(--txt)">'+DAYS.map(d=>'<option'+(d===(m.day||TODAY_NAME)?' selected':'')+'>'+d+'</option>').join('')+'</select><select id="at-mt-wh-'+i+'" style="flex:1;min-width:80px;padding:5px 6px;font-size:11px;border:1px solid var(--brd);border-radius:6px;background:var(--inp);color:var(--txt)">'+WHS.map(w=>'<option'+(w===(m.wh||'Sunrise')?' selected':'')+'>'+w+'</option>').join('')+'</select><select id="at-mt-dur-'+i+'" style="flex:1;min-width:70px;padding:5px 6px;font-size:11px;border:1px solid var(--brd);border-radius:6px;background:var(--inp);color:var(--txt)">'+DURS.map(d=>'<option'+(d===(m.dur||'25 min')?' selected':'')+'>'+d+'</option>').join('')+'</select></div>'
    +'</div>';
  }

  function saveDOMtoState(){
    // Read current DOM values back into the arrays before any rebuild
    window._atMilestones.forEach(function(_,i){
      window._atMilestones[i]={
        title:document.getElementById('at-ms-t-'+i)?.value||'',
        q:document.getElementById('at-ms-q-'+i)?.value||'Q2',
        fwk:parseInt(document.getElementById('at-ms-fw-'+i)?.value)||4,
        dlwk:parseInt(document.getElementById('at-ms-dw-'+i)?.value)||8
      };
    });
    window._atMiniTasks.forEach(function(_,i){
      window._atMiniTasks[i]={
        title:document.getElementById('at-mt-t-'+i)?.value||'',
        day:document.getElementById('at-mt-d-'+i)?.value||TODAY_NAME,
        wh:document.getElementById('at-mt-wh-'+i)?.value||'Sunrise',
        dur:document.getElementById('at-mt-dur-'+i)?.value||'25 min'
      };
    });
  }
  function rebuildATModal(){
    const msBox=document.getElementById('at-ms-list');if(msBox)msBox.innerHTML=window._atMilestones.map(function(m,i){return msRow(i,m);}).join('');
    const mtBox=document.getElementById('at-mt-list');if(mtBox)mtBox.innerHTML=window._atMiniTasks.map(function(m,i){return mtRow(i,m);}).join('');
    const msAdd=document.getElementById('at-ms-add');if(msAdd)msAdd.style.display=window._atMilestones.length>=5?'none':'block';
    const mtAdd=document.getElementById('at-mt-add');if(mtAdd)mtAdd.style.display=window._atMiniTasks.length>=5?'none':'block';
    const dpBox=document.getElementById('at-day-pills');if(dpBox)dpBox.innerHTML=renderDayPills();
  }
  window.toggleATDay=function(d){
    saveDOMtoState();
    const idx=window._atDays.indexOf(d);
    idx>=0?window._atDays.splice(idx,1):window._atDays.push(d);
    rebuildATModal();
  };
  window.onATCatChange=function(){
    saveDOMtoState();
    const cat=document.getElementById('at-cat')?.value;
    const fd=S.cfd[cat]||[];
    window._atDays=[...fd.length?fd:[TODAY_NAME]];
    rebuildATModal();
  };
  window.addATMs=function(){saveDOMtoState();if(window._atMilestones.length>=5)return;window._atMilestones.push({title:'',fwk:'',dlwk:'',q:''});rebuildATModal();};
  window.removeATMs=function(i){saveDOMtoState();if(window._atMilestones.length<=1)return;window._atMilestones.splice(i,1);rebuildATModal();};
  window.addATMt=function(){saveDOMtoState();if(window._atMiniTasks.length>=5)return;window._atMiniTasks.push({title:'',day:TODAY_NAME,wh:'Sunrise',dur:'25 min'});rebuildATModal();};
  window.removeATMt=function(i){saveDOMtoState();if(window._atMiniTasks.length<=1)return;window._atMiniTasks.splice(i,1);rebuildATModal();};

  openModal('<div class="modal-hdr"><strong>'+(window._atEditId?'Edit Task':'Add Task')+'</strong><button class="x-btn" onclick="closeModal()">×</button></div>'
    +'<div style="display:grid;grid-template-columns:2fr 1fr;gap:6px;margin-bottom:8px">'
      +'<input class="fi" id="at-title" placeholder="Task..." value="'+(prefillTitle||'')+'" autofocus style="margin-bottom:0">'
      +'<select class="fi" id="at-cat" onchange="onATCatChange();onATCatRandom()" style="margin-bottom:0"><option value="RAND">Random</option>'+catOpts(initCat)+'</select>'
    +'</div>'
    +'<div style="display:flex;gap:6px;margin-bottom:10px">'
      +'<button id="at-flag-red" onclick="setTaskFlag(\'urgent\')" type="button" style="background:none;border:1px solid var(--brd);border-radius:6px;cursor:pointer;padding:4px 10px;font-size:13px;display:flex;align-items:center;gap:3px">🚩<span style="font-size:11px;color:var(--txt2)">Urgent</span></button>'
      +'<button id="at-flag-blue" onclick="setTaskFlag(\'normal\')" type="button" style="background:none;border:1px solid var(--brd);border-radius:6px;cursor:pointer;padding:4px 10px;font-size:13px;display:flex;align-items:center;gap:3px">🔵<span style="font-size:11px;color:var(--txt2)">Normal</span></button>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px">'
      +'<div><label class="fl" style="font-size:9px">Hour</label><select class="fi" id="at-wh" style="margin-bottom:0">'+WHS.map(w=>'<option>'+w+'</option>').join('')+'</select></div>'
      +'<div><label class="fl" style="font-size:9px">Start</label><input class="fi" type="time" id="at-time" style="margin-bottom:0"></div>'
      +'<div><label class="fl" style="font-size:9px">Duration</label><select class="fi" id="at-dur" style="margin-bottom:0">'+DURS.map(d=>'<option'+(d==="25 min"?' selected':'')+'>'+d+'</option>').join('')+'</select></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;min-width:0">'
      +'<div style="min-width:0"><label class="fl" style="font-size:9px">Date</label>'
        +'<input class="fi" type="date" id="at-due" oninput="onATDueChange()" style="margin-bottom:0">'
      +'</div>'
      +'<div id="at-focuswk-wrap" style="min-width:0"><label class="fl" style="font-size:9px">Focus Week</label>'
        +'<select class="fi" id="at-focuswk" style="margin-bottom:0"><option value="">—</option>'+[1,2,3,4,5].map(n=>'<option value="'+n+'">Week '+n+'</option>').join('')+'</select>'

window.toggleRecurDay=function(d){
  const idx=window._recurSelectedDays.indexOf(d);
  if(idx>=0){
    window._recurSelectedDays.splice(idx,1);
  } else {
    if(window._recurSelectedDays.length>=4){
      openModal('<div class="modal-hdr"><strong>Maximum days reached</strong><button class="x-btn" onclick="closeModal()">×</button></div>'
        +'<div style="font-size:13px;color:var(--txt);margin-bottom:16px;line-height:1.6">You can pick up to 4 specific days. To add another, remove one first — or switch to Daily.</div>'
        +'<div style="display:flex;gap:8px;justify-content:flex-end">'
          +'<button class="btn-g" onclick="closeModal()">Got it</button>'
          +'<button class="btn-p" onclick="closeModal();window._recurCurrent=\'daily\';applyRecur()">Switch to Daily</button>'
        +'</div>');
      return;
    }
    window._recurSelectedDays.push(d);
  }
  const btn=document.getElementById('rday-'+d);
  const on=window._recurSelectedDays.includes(d);
  if(btn){btn.style.borderColor=on?'#3b82f6':'var(--brd)';btn.style.background=on?'#eff6ff':'transparent';btn.style.color=on?'#1d4ed8':'var(--txt2)';btn.style.fontWeight=on?'700':'400';}
};
window.applyRecur=function(){
  const val=window._recurCurrent;
  if(!val){closeModal();return;}
  if(val==='daily'){window._atRecur={type:'daily'};}
  else if(val==='biweekly'){window._atRecur={type:'biweekly',createdWeek:getQW().w,createdQ:getQW().q};}
  else if(val==='end_of_month'){window._atRecur={type:'end_of_month'};}
  else if(val.startsWith('weekly:')){
    const day=val.split(':')[1];
    const days=window._recurSelectedDays.length?window._recurSelectedDays:[day];
    window._atRecur={type:'weekly',days};
  }
  const label=document.getElementById('at-recur-label');
  const clearBtn=document.getElementById('at-recur-clear');
  const recurBtn=document.getElementById('at-recur-btn');
  if(label)label.textContent=recurLabel(window._atRecur);
  if(clearBtn)clearBtn.style.display='inline';
  if(recurBtn){recurBtn.style.borderColor='#3b82f6';recurBtn.style.color='#1d4ed8';}
  closeModal();
};
function recurLabel(r){
  if(!r)return'Repeats';
  if(r.type==='daily')return'Every day';
  if(r.type==='biweekly')return'Every other week';
  if(r.type==='end_of_month')return'End of month';
  if(r.type==='weekly')return r.days.length===1?'Every '+r.days[0]:'Every '+r.days.map(d=>d.slice(0,3)).join(', ');
  return'Repeats';
}

function saveAddTask(){
  const title=document.getElementById('at-title')?.value.trim();
  if(!title)return;
  const cat=document.getElementById('at-cat')?.value||'CAR';
  const wh=document.getElementById('at-wh')?.value||'Sunrise';
  const taskTime=document.getElementById('at-time')?.value||'';
  const dur=document.getElementById('at-dur')?.value||'25 min';
  const due=document.getElementById('at-due')?.value||'';
  const forTomorrow=window._atForTomorrow||false;
  window._atForTomorrow=false;
  // Determine day(s)
  let days;
  if(forTomorrow){
    const tIdx=DAYS.indexOf(TODAY_NAME);
    const tmrw=DAYS[(tIdx+1)%7];
    days=[tmrw];
  } else {
    days=[...window._atDays];
    if(!days.length)days.push(TODAY_NAME);
  }
  const selectedGid=document.getElementById('at-goal')?.value||null;

  let gid=selectedGid,msid=null,taskCat=cat;
  if(selectedGid){
    const eg=S.goals.find(g=>g.id===gid);
    if(eg)taskCat=eg.cat;
  }

  // Save milestones if body is open
  var savedMilestones=[];
  if(document.getElementById('at-ms-body')?.style.display==='block'){
    window._atMilestones.forEach((_,i)=>{
      const t=(document.getElementById('at-ms-t-'+i)?.value||'').trim();
      if(!t)return;
      const q=document.getElementById('at-ms-q-'+i)?.value||'Q2';
      const fwk=parseInt(document.getElementById('at-ms-fw-'+i)?.value)||4;
      const dlwk=parseInt(document.getElementById('at-ms-dw-'+i)?.value)||8;
      if(!gid){
        gid='g'+uid();
        S.goals.push({id:gid,cat:taskCat,title,q,months:[],dlWk:dlwk,tgt:due});
      }
      const mid='ms'+uid();
      S.ms.push({id:mid,gid,cat:taskCat,title:t,fq:q,fwk,fwks:[{q,w:fwk}],dlQ:q,dlWk:dlwk,status:'Not Started'});
      savedMilestones.push(mid);
      if(!msid)msid=mid; // keep first for backward compat
    });
  }

  // Create the main parent task
  var mainTaskId='mt'+uid();
  const priority=window._atPriority||null;
  window._atPriority=null;
  const recur=window._atRecur||null;
  window._atRecur=null;
  const focusWk=document.getElementById('at-focuswk')?.value||'';
  S.tasks.push({id:mainTaskId,msid:null,gid:gid||null,cat:taskCat,title:title,days:days,day:days[0]||TODAY_NAME,dur:dur,wh:wh,taskTime:taskTime,due:due||'',focusWk:focusWk||'',status:'Not Started',fromAddTask:true,priority,recur});

  // Mini-tasks: stored as children of the parent task, NOT as separate top-level tasks
  if(document.getElementById('at-mt-body')?.style.display==='block'){
    var miniTasks=[];
    window._atMiniTasks.forEach(function(obj,i){
      var t=(document.getElementById('at-mt-t-'+i)?.value||'').trim();
      if(!t)return;
      var day=document.getElementById('at-mt-d-'+i)?.value||TODAY_NAME;
      var twh=document.getElementById('at-mt-wh-'+i)?.value||'Sunrise';
      var tdur=document.getElementById('at-mt-dur-'+i)?.value||'25 min';
      miniTasks.push({id:'mt'+uid(),parentId:mainTaskId,msid:msid||null,gid:gid||null,cat:taskCat,title:t,days:[day],day:day,dur:tdur,wh:twh,status:'Not Started',fromAddTask:true,isChildTask:true});
    });
    // Attach mini-tasks to the parent task object (not pushed to S.tasks as top-level)
    var parentTask=S.tasks.find(function(t){return t.id===mainTaskId;});
    if(parentTask&&miniTasks.length)parentTask.miniTasks=miniTasks;
  }

  // Attach goal, all milestones, and miniTasks to parent task
  var parentTaskFinal=S.tasks.find(function(t){return t.id===mainTaskId;});
  if(parentTaskFinal){
    if(gid)parentTaskFinal.gid=gid;
    if(msid)parentTaskFinal.msid=msid;
    if(savedMilestones.length)parentTaskFinal.milestoneIds=savedMilestones;
  }

  // If flagged as Yearly Goal — create a goal entry and navigate there
  if(window._atIsGoal&&title){
    const newGid='g'+uid();
    const{q:curQ,w:curW}=getQW();
    // Deadline = end of current quarter (week 12), months = empty (user can set later)
    S.goals.push({id:newGid,title,cat:taskCat,q:curQ,dlWk:12,months:[],tgt:''});
    savedMilestones.forEach(function(mid){const ms=S.ms.find(function(m){return m.id===mid;});if(ms){ms.gid=newGid;ms.fq=curQ;ms.dlQ=curQ;}});
    var gtask=S.tasks.find(function(t){return t.id===mainTaskId;});
    if(gtask)gtask.gid=newGid;
    window._atIsGoal=false;
    S.brkQ=curQ;
    save();closeModal();S.view='goals';render();
    return;
  }

  save();closeModal();S.view='today';render();
}

function confirmTrash(type,id){
  if(!S.trash)S.trash=[];
  var now=Date.now();var T3=259200000;
  if(type==='task'){
    var t=S.tasks.find(function(x){return x.id===id;});
    if(t){S.trash.push(Object.assign({},t,{_tt:'task',_ta:now}));S.tasks=S.tasks.filter(function(x){return x.id!==id;});}
  } else if(type==='goal'){
    var g=S.goals.find(function(x){return x.id===id;});
    if(g){
      S.trash.push(Object.assign({},g,{_tt:'goal',_ta:now}));
      S.ms.filter(function(m){return m.gid===id;}).forEach(function(m){S.trash.push(Object.assign({},m,{_tt:'milestone',_ta:now}));});
      S.tasks.filter(function(t){return t.gid===id;}).forEach(function(t){S.trash.push(Object.assign({},t,{_tt:'task',_ta:now}));});

function doRestoreTrash(id){
  const idx=S.trash.findIndex(x=>x.id===id||x._id===id);

  const item=S.trash[idx];
  if(item._tt==='task'){S.tasks.push(Object.assign({},item,{_tt:undefined,_ta:undefined,status:item.status||'Not Started'}));}
  else if(item._tt==='milestone'){S.ms.push(Object.assign({},item,{_tt:undefined,_ta:undefined}));}
  else if(item._tt==='goal'){
    S.goals.push(Object.assign({},item,{_tt:undefined,_ta:undefined}));

  }

function doDelete(type,id){

    var t=S.tasks.find(function(x){return x.id===id;});
    if(t){S.deleted.push({type:type,id:id,data:t,deletedAt:now});S.tasks=S.tasks.filter(function(x){return x.id!==id;});}
  }else if(type==='goal'){
    var g=S.goals.find(function(x){return x.id===id;});
    if(g){
      S.deleted.push({type:type,id:id,data:{goal:g,ms:S.ms.filter(function(m){return m.gid===id;}),tasks:S.tasks.filter(function(t){return t.gid===id;})},deletedAt:now});
      S.goals=S.goals.filter(function(x){return x.id!==id;});
      S.ms=S.ms.filter(function(m){return m.gid!==id;});
      S.tasks=S.tasks.filter(function(t){return t.gid!==id;});
    }
  }else if(type==='ms'){
    var m=S.ms.find(function(x){return x.id===id;});
    if(m){S.deleted.push({type:type,id:id,data:{ms:m,tasks:S.tasks.filter(function(t){return t.msid===id;})},deletedAt:now});S.ms=S.ms.filter(function(x){return x.id!==id;});S.tasks=S.tasks.filter(function(t){return t.msid!==id;});}
  }else if(type==='sq'){
    var s=S.sq.find(function(x){return x.id===id;});
    if(s){S.deleted.push({type:type,id:id,data:s,deletedAt:now});S.sq=S.sq.filter(function(x){return x.id!==id;});}
  }
  closeModal();render();
}

// ── TIMER ────────────────────────────────────────────────────────────────────
var _timerInterval=null;
var _timerEnd=0;
var _timerTaskId='';
var _timerTitle='';

function parseDurMs(dur){
  if(!dur)return 25*60*1000;
  var m=dur.match(/(\d+)\s*min/);var h=dur.match(/(\d+)\s*hour/);
  return((h?parseInt(h[1])*60:0)+(m?parseInt(m[1]):0))*60*1000||25*60*1000;
}

function startTimer(taskId,title,dur){
  if(_timerInterval)clearInterval(_timerInterval);
  var ms=parseDurMs(dur);
  _timerEnd=Date.now()+ms;
  _timerTaskId=taskId;
  _timerTitle=title||'Focus';
  localStorage.setItem('atlas_timer',JSON.stringify({end:_timerEnd,id:taskId,title:_timerTitle}));
  showTimerModal();
}

function showTimerModal(){
  var existing=document.getElementById('timer-overlay');
  if(existing)existing.remove();
  var overlay=document.createElement('div');
  overlay.id='timer-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML='<div style="background:var(--surf);border-radius:16px;padding:32px 28px;width:90%;max-width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)">'
    +'<div style="font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Focus Timer</div>'

    +'<div id="timer-display" style="font-size:52px;font-weight:700;color:#3b82f6;font-variant-numeric:tabular-nums;margin-bottom:8px;letter-spacing:-2px">--:--</div>'
    +'<div id="timer-bar-wrap" style="height:4px;background:var(--surf2);border-radius:20px;margin-bottom:24px;overflow:hidden"><div id="timer-bar" style="height:100%;background:#3b82f6;border-radius:20px;width:100%;transition:width .5s linear"></div></div>'
    +'<div style="display:flex;gap:10px;justify-content:center">'
      +'<button id="timer-pause" onclick="toggleTimerPause()" style="padding:10px 20px;border-radius:8px;border:1px solid var(--brd);cursor:pointer;font-size:13px;font-weight:600;background:var(--surf2);color:var(--txt)">Pause</button>'

    +'</div>'
  +'</div>';
  document.body.appendChild(overlay);
  var totalMs=_timerEnd-Date.now();
  _timerInterval=setInterval(function(){
    var rem=_timerEnd-Date.now();
    if(rem<=0){clearInterval(_timerInterval);_timerInterval=null;localStorage.removeItem('atlas_timer');showTimerDone(_timerTitle);overlay.remove();return;}
    var mins=Math.floor(rem/60000);var secs=Math.floor((rem%60000)/1000);
    var el=document.getElementById('timer-display');var bar=document.getElementById('timer-bar');
    if(el)el.textContent=(mins<10?'0':'')+mins+':'+(secs<10?'0':'')+secs;
    if(bar)bar.style.width=Math.max(0,(rem/totalMs)*100)+'%';
  },500);
}

// ── FOCUS TIMER ───────────────────────────────────────────────────────────────
function parseDurToSecs(dur){
  if(!dur)return 25*60;
  const m=dur.match(/(\d+)/);
  const n=m?parseInt(m[1]):25;
  if(dur.includes('hour'))return n*3600;
  return n*60;
}
function startTimer(id,title,dur){
  const secs=parseDurToSecs(dur);
  const endTime=Date.now()+secs*1000;
  S.activeTimer={id,title,dur,endTime,paused:false,remaining:secs};
  save();
  showTimerModal();
}
function showTimerModal(){
  if(!S.activeTimer)return;
  const t=S.activeTimer;
  const now=Date.now();
  const rem=t.paused?t.remaining:Math.max(0,Math.round((t.endTime-now)/1000));
  const mins=String(Math.floor(rem/60)).padStart(2,'0');
  const secs2=String(rem%60).padStart(2,'0');
  const pct=Math.min(100,Math.round((1-(rem/parseDurToSecs(t.dur||'25 min')))*100));
  const isRunning=!t.paused&&rem>0;
  if(rem===0){
    showTimeoutCard(t.title);
    S.activeTimer=null;save();
    return;
  }
  // Render timer overlay (not a modal — a fixed overlay so it persists)
  let overlay=document.getElementById('timer-overlay');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='timer-overlay';
    document.body.appendChild(overlay);
  }
  overlay.style.cssText='position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--surf);border:2px solid #8b5cf6;border-radius:16px;padding:18px 20px;min-width:220px;box-shadow:0 8px 32px rgba(0,0,0,.4);text-align:center';
  overlay.innerHTML='<div style="font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Focus Timer</div>'
    +'<div style="font-size:11px;color:#8b5cf6;font-weight:600;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+t.title+'</div>'
    +'<div style="font-size:40px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;letter-spacing:2px">'+mins+':'+secs2+'</div>'
    +'<div style="height:4px;background:var(--surf2);border-radius:20px;margin:10px 0;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:#8b5cf6;border-radius:20px;transition:width 1s linear"></div></div>'
    +'<div style="display:flex;gap:8px;justify-content:center;margin-top:4px">'
      +(isRunning
        ?'<button onclick="pauseTimer()" style="padding:5px 14px;border-radius:8px;border:1px solid var(--brd);cursor:pointer;font-size:12px;background:var(--surf2);color:var(--txt)">⏸ Pause</button>'
        :'<button onclick="resumeTimer()" style="padding:5px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;background:#8b5cf6;color:#fff">▶ Resume</button>')
      +'<button onclick="stopTimer()" style="padding:5px 14px;border-radius:8px;border:1px solid #fecaca;cursor:pointer;font-size:12px;background:var(--surf);color:#ef4444">✕ Stop</button>'
    +'</div>';
  // Tick
  if(isRunning){
    clearTimeout(window._timerTick);
    window._timerTick=setTimeout(function(){showTimerModal();},1000);
  }
}
function pauseTimer(){
  if(!S.activeTimer)return;
  const rem=Math.max(0,Math.round((S.activeTimer.endTime-Date.now())/1000));
  S.activeTimer.paused=true;S.activeTimer.remaining=rem;
  clearTimeout(window._timerTick);save();showTimerModal();
}
function resumeTimer(){
  if(!S.activeTimer)return;
  S.activeTimer.endTime=Date.now()+S.activeTimer.remaining*1000;
  S.activeTimer.paused=false;save();showTimerModal();
}
function stopTimer(){
  S.activeTimer=null;save();clearTimeout(window._timerTick);
  const o=document.getElementById('timer-overlay');if(o)o.remove();
}
function showTimeoutCard(title){
  clearTimeout(window._timerTick);
  const o=document.getElementById('timer-overlay');if(o)o.remove();
  // Play alarm beep
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6].forEach(function(t){
      const osc=ctx.createOscillator();const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=880;gain.gain.setValueAtTime(0.4,ctx.currentTime+t);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+0.25);
      osc.start(ctx.currentTime+t);osc.stop(ctx.currentTime+t+0.3);
    });
  }catch(e){}
  // Show timeout card
  let card=document.getElementById('timeout-card');
  if(!card){card=document.createElement('div');card.id='timeout-card';document.body.appendChild(card);}
  card.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;background:var(--surf);border:2px solid #ef4444;border-radius:16px;padding:28px 24px;min-width:260px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.5)';
  card.innerHTML='<div style="font-size:36px;margin-bottom:10px">⏰</div>'
    +'<div style="font-size:20px;font-weight:700;color:#ef4444;margin-bottom:6px">Time Out</div>'
    +'<div style="font-size:13px;color:var(--txt2);margin-bottom:20px">'+title+'</div>'
    +'<button onclick="closeTimeoutCard()" style="padding:9px 28px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;background:#ef4444;color:#fff">Close</button>';
}
function closeTimeoutCard(){var c=document.getElementById('timeout-card');if(c)c.remove();}
// Resume timer if active on page load
function resumeTimerIfActive(){
  if(!S.activeTimer)return;
  if(S.activeTimer.paused)return showTimerModal();
  const rem=Math.round((S.activeTimer.endTime-Date.now())/1000);
  if(rem<=0){showTimeoutCard(S.activeTimer.title);S.activeTimer=null;save();}
  else showTimerModal();
}

function renderAnalytics(){
  const completed=S.tasks.filter(function(t){return t.status==='Completed'&&!t.isChildTask;});
  if(completed.length<3){
    return'<div class="sh"><div><h2>Weekly Insights 📈</h2><p>Your productivity patterns, decoded.</p></div></div>'
      +'<div style="text-align:center;padding:60px;color:var(--txt3)"><div style="font-size:32px;margin-bottom:12px">📊</div><div style="font-size:14px;font-weight:600;color:var(--txt2)">Not enough data yet</div><div style="font-size:12px;margin-top:6px;max-width:280px;margin-left:auto;margin-right:auto">Complete a few tasks and come back — insights will appear once you have some history.</div></div>';
  }

  // Watch hour breakdown
  const whCounts={Sunrise:0,Midday:0,Sunset:0};
  completed.forEach(function(t){if(t.wh&&whCounts[t.wh]!==undefined)whCounts[t.wh]++;});
  const whTotal=Object.values(whCounts).reduce(function(a,b){return a+b;},0)||1;
  const bestWH=Object.entries(whCounts).sort(function(a,b){return b[1]-a[1];})[0];

  // Day breakdown
  const dayCounts={};
  DAYS.forEach(function(d){dayCounts[d]=0;});
  completed.forEach(function(t){const d=t.day||t.days?.[0];if(d&&dayCounts[d]!==undefined)dayCounts[d]++;});
  const bestDay=Object.entries(dayCounts).sort(function(a,b){return b[1]-a[1];})[0];
  const dayTotal=Object.values(dayCounts).reduce(function(a,b){return a+b;},0)||1;

  // Category breakdown
  const catCounts={};
  completed.forEach(function(t){if(t.cat){catCounts[t.cat]=(catCounts[t.cat]||0)+1;}});
  const sortedCats=Object.entries(catCounts).sort(function(a,b){return b[1]-a[1];});
  const catTotal=Object.values(catCounts).reduce(function(a,b){return a+b;},0)||1;
  const bestCat=sortedCats[0];const worstCat=sortedCats[sortedCats.length-1];

  // Avg focus duration
  const durs=completed.filter(function(t){return t.dur;}).map(function(t){return parseDurToSecs(t.dur);});
  const avgSecs=durs.length?Math.round(durs.reduce(function(a,b){return a+b;},0)/durs.length):0;
  const avgMin=Math.round(avgSecs/60);

  function bar(val,total,color){
    const pct=Math.round((val/total)*100);
    return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
      +'<div style="width:100%;background:var(--surf2);border-radius:20px;height:8px;overflow:hidden">'
        +'<div style="width:'+pct+'%;height:100%;background:'+color+';border-radius:20px;transition:width .4s"></div>'
      +'</div>'
      +'<span style="font-size:11px;color:var(--txt2);min-width:28px;text-align:right">'+pct+'%</span>'
    +'</div>';
  }

  function card(title,content){
    return'<div style="background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:14px;margin-bottom:12px">'
      +'<div style="font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">'+title+'</div>'
      +content
    +'</div>';
  }

  const whCard=card('By Watch Hour',
    ['Sunrise','Midday','Sunset'].map(function(wh){
      return'<div style="margin-bottom:8px">'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:3px">'
          +'<span style="font-size:12px;font-weight:600;color:'+WH_C[wh]+'">'+wh+'</span>'
          +'<span style="font-size:12px;color:var(--txt2)">'+whCounts[wh]+' tasks</span>'
        +'</div>'
        +bar(whCounts[wh],whTotal,WH_C[wh])
      +'</div>';
    }).join('')
    +'<div style="font-size:12px;margin-top:10px;padding:8px 10px;background:var(--surf2);border-radius:8px;color:var(--txt2)">'
      +'💡 You close the most tasks during <strong style="color:'+WH_C[bestWH[0]]+'">'+bestWH[0]+'</strong>. Schedule your most important tasks here.'
    +'</div>');

  const dayCard=card('By Day of Week',
    DAYS.map(function(d){
      return'<div style="margin-bottom:6px">'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:2px">'
          +'<span style="font-size:12px;color:var(--txt)">'+d+'</span>'
          +'<span style="font-size:12px;color:var(--txt2)">'+dayCounts[d]+'</span>'
        +'</div>'
        +bar(dayCounts[d],dayTotal,'#3b82f6')
      +'</div>';
    }).join('')
    +'<div style="font-size:12px;margin-top:10px;padding:8px 10px;background:var(--surf2);border-radius:8px;color:var(--txt2)">'
      +'💡 <strong>'+bestDay[0]+'</strong> is your most productive day. Stack your hardest tasks here.'
    +'</div>');

  const catCard=card('By Category',
    sortedCats.map(function(entry){
      const cat=gc(entry[0]);
      return'<div style="margin-bottom:6px">'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:2px">'
          +'<span style="font-size:12px;font-weight:600;color:'+(cat?.c||'var(--txt)')+'">'+( cat?.name||entry[0])+'</span>'
          +'<span style="font-size:12px;color:var(--txt2)">'+entry[1]+'</span>'
        +'</div>'
        +bar(entry[1],catTotal,cat?.c||'#3b82f6')
      +'</div>';
    }).join('')
    +(bestCat&&worstCat&&bestCat[0]!==worstCat[0]
      ?'<div style="font-size:12px;margin-top:10px;padding:8px 10px;background:var(--surf2);border-radius:8px;color:var(--txt2)">'
        +'💡 You complete more <strong style="color:'+(gc(bestCat[0])?.c||'')+'">'+( gc(bestCat[0])?.name||bestCat[0])+'</strong> tasks. Give <strong style="color:'+(gc(worstCat[0])?.c||'')+'">'+( gc(worstCat[0])?.name||worstCat[0])+'</strong> more time — or smaller task sizes.'
      +'</div>'
      :''));

  const focusCard=card('Average Focus Duration',
    '<div style="text-align:center;padding:14px 0">'
      +'<div style="font-size:42px;font-weight:800;color:var(--txt)">'+avgMin+'</div>'
      +'<div style="font-size:13px;color:var(--txt2);margin-top:4px">minutes per completed task</div>'
      +'<div style="font-size:12px;margin-top:14px;padding:8px 10px;background:var(--surf2);border-radius:8px;color:var(--txt2)">'
        +(avgMin<=15?'💡 You work in short bursts. Keep tasks under 20 min for best completion rates.'
          :avgMin<=30?'💡 Your sweet spot is 15–30 min. Pomodoro-style blocks suit you well.'
          :'💡 You take on longer tasks. Try breaking them into 20-min chunks for momentum.')
      +'</div>'
    +'</div>');

  const summary='<div style="background:linear-gradient(135deg,#1e1b4b,#0f172a);border-radius:12px;padding:16px;margin-bottom:12px;color:#fff">'
    +'<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#a5b4fc;margin-bottom:8px">This Week at a Glance</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'
      +'<div><div style="font-size:28px;font-weight:800">'+completed.length+'</div><div style="font-size:11px;color:#a5b4fc">tasks completed</div></div>'
      +'<div><div style="font-size:28px;font-weight:800">'+avgMin+'m</div><div style="font-size:11px;color:#a5b4fc">avg focus</div></div>'
      +'<div><div style="font-size:15px;font-weight:700;color:'+WH_C[bestWH[0]]+'">'+bestWH[0]+'</div><div style="font-size:11px;color:#a5b4fc">peak watch hour</div></div>'
      +'<div><div style="font-size:15px;font-weight:700;color:#60a5fa">'+bestDay[0].slice(0,3)+'</div><div style="font-size:11px;color:#a5b4fc">best day</div></div>'
    +'</div>'
  +'</div>';

  return'<div class="sh"><div><h2>Weekly Insights 📈</h2><p>Based on your completed tasks.</p></div></div>'
    +summary+whCard+dayCard+catCard+focusCard;
}

function renderObStep(){
  var existing=document.getElementById('ob-overlay');
  if(existing)existing.remove();
  var step=OB_STEPS[_obStep];
  if(!step)return;

  var overlay=document.createElement('div');
  overlay.id='ob-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box';

  var progress='';
  for(var i=0;i<OB_STEPS.length;i++){
    progress+='<div style="width:'+(i===_obStep?'20px':'7px')+';height:7px;border-radius:20px;background:'+(i===_obStep?'#c9a84c':'#334155')+';transition:all .3s"></div>';
  }

  var choicesHtml='';

      +step.choices.map(function(ch){
        return'<button onclick="'+ch.action+'" style="width:100%;padding:12px 16px;border-radius:8px;border:1px solid #1e3a5f;background:#0d1f3c;color:#e2e8f0;cursor:pointer;font-size:13px;font-weight:500;text-align:left;display:flex;align-items:center;gap:10px">'+ch.label+'</button>';

    btnsHtml='<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">'
      +'<button onclick="'+step.primary.action+'" style="width:100%;padding:12px;border-radius:8px;border:none;background:#c9a84c;color:#07111e;cursor:pointer;font-size:14px;font-weight:700">'+step.primary.label+'</button>'
      +(step.secondary?'<button onclick="'+step.secondary.action+'" style="width:100%;padding:10px;border-radius:8px;border:1px solid #1e3a5f;background:transparent;color:#7fa8d4;cursor:pointer;font-size:13px;font-weight:500">'+step.secondary.label+'</button>':'')
